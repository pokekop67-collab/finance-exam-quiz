<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>「以上皆非」陷阱題特訓</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --bg-warm: #F0EDE6;
  --bg-card: #FFFFFF;
  --bg-accent: #EDE8DF;
  --text-primary: #2C2C2C;
  --text-secondary: #6B6560;
  --text-muted: #9B9590;
  --accent: #7A6B5D;
  --accent-light: #B8A998;
  --accent-warm: #96806A;
  --border: #E0DBD3;
  --border-light: #EDE8E0;
  --correct: #5A8F6A;
  --correct-bg: #EDF5EF;
  --correct-border: #A8D5B8;
  --wrong: #C4756A;
  --wrong-bg: #FDF5F3;
  --wrong-border: #E8B4AD;
  --serif: 'Noto Serif TC', 'Georgia', serif;
  --sans: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
  --display: 'Cormorant Garamond', 'Noto Serif TC', serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.screen { display: none; }
.screen.active { display: block; }

/* ─── START ─── */
.start-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 24px;
  background: linear-gradient(175deg, #F7F5F0 0%, #EDE8DF 40%, #E5DFD3 100%);
  position: relative;
  overflow: hidden;
}
.start-screen::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(122,107,93,0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(122,107,93,0.03) 0%, transparent 50%);
  animation: floatBg 20s ease-in-out infinite;
}
@keyframes floatBg {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-2%, 2%); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.start-label {
  font-family: var(--display);
  font-size: 13px;
  letter-spacing: 6px;
  color: var(--accent);
  margin-bottom: 28px;
  position: relative; z-index: 1;
  opacity: 0; animation: fadeUp .8s ease .2s forwards;
}
.start-title {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  position: relative; z-index: 1;
  opacity: 0; animation: fadeUp .8s ease .4s forwards;
}
.start-subtitle {
  font-family: var(--serif);
  font-size: clamp(16px, 2.5vw, 22px);
  font-weight: 300;
  color: var(--accent-warm);
  margin-bottom: 36px;
  position: relative; z-index: 1;
  opacity: 0; animation: fadeUp .8s ease .6s forwards;
}

.start-stats {
  display: flex;
  gap: 28px;
  margin-bottom: 20px;
  position: relative; z-index: 1;
  opacity: 0; animation: fadeUp .8s ease .8s forwards;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--display);
  font-size: 36px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1.2;
}
.stat-label { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

.start-compare {
  display: flex;
  gap: 0;
  margin-bottom: 36px;
  position: relative; z-index: 1;
  opacity: 0; animation: fadeUp .8s ease .9s forwards;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border-light);
}
.compare-col {
  padding: 16px 24px;
  text-align: center;
  background: var(--bg-card);
}
.compare-col:first-child { border-right: 1px solid var(--border-light); }
.compare-col .cc-label {
  font-size: 11px; letter-spacing: 1px; color: var(--text-muted);
  margin-bottom: 4px;
}
.compare-col .cc-rate {
  font-family: var(--display);
  font-size: 28px; font-weight: 500;
}
.compare-col .cc-desc { font-size: 11px; color: var(--text-muted); }
.cc-good .cc-rate { color: var(--correct); }
.cc-bad .cc-rate { color: var(--wrong); }

.start-modes {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  position: relative; z-index: 1;
  opacity: 0; animation: fadeUp .8s ease 1s forwards;
}
.mode-btn {
  padding: 16px 32px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--bg-card);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  transition: all .3s ease;
  letter-spacing: .5px;
}
.mode-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 4px 20px rgba(122,107,93,0.1);
  transform: translateY(-2px);
}
.mode-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.mode-btn.primary:hover {
  background: var(--accent-warm);
  border-color: var(--accent-warm);
  box-shadow: 0 4px 20px rgba(122,107,93,0.2);
}
.start-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 24px;
  max-width: 360px;
  line-height: 1.7;
  position: relative; z-index: 1;
  opacity: 0; animation: fadeUp .8s ease 1.2s forwards;
}

/* ─── QUIZ ─── */
.quiz-screen {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 20px 100px;
}
.quiz-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,245,240,0.92);
  backdrop-filter: blur(16px);
  padding: 16px 0;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 32px;
}
.quiz-header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.quiz-progress-text {
  font-family: var(--display);
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 2px;
}
.quiz-score { font-size: 13px; color: var(--accent); font-weight: 500; }
.progress-bar {
  width: 100%; height: 3px;
  background: var(--border-light);
  border-radius: 2px;
  margin-top: 12px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .4s ease;
}

.quiz-badges { margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.quiz-category {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
}
.cat-financial { background: #EBF5FB; color: #2E86C1; }
.cat-ethics { background: #F5EBE0; color: #8B6F47; }

.trap-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
}
.trap-real { background: #FDF5F3; color: var(--wrong); }
.trap-fake { background: #EDF5EF; color: var(--correct); }

.question-text {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  line-height: 1.8;
  color: var(--text-primary);
  margin-bottom: 28px;
}

.options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 20px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--bg-card);
  cursor: pointer;
  transition: all .25s ease;
  text-align: left;
  font-family: var(--sans);
  font-size: 14.5px;
  color: var(--text-secondary);
  line-height: 1.7;
}
.option-btn:hover:not(.disabled) {
  border-color: var(--accent-light);
  background: rgba(122,107,93,0.03);
  transform: translateX(4px);
}
.option-num {
  flex-shrink: 0; width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg-accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  margin-top: 1px;
  transition: all .25s ease;
}
.option-btn.selected { border-color: var(--accent); background: rgba(122,107,93,0.05); }
.option-btn.selected .option-num { background: var(--accent); color: #fff; }
.option-btn.correct { border-color: var(--correct-border); background: var(--correct-bg); }
.option-btn.correct .option-num { background: var(--correct); color: #fff; }
.option-btn.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }
.option-btn.wrong .option-num { background: var(--wrong); color: #fff; }
.option-btn.disabled { cursor: default; pointer-events: none; }
.option-btn.dimmed { opacity: 0.5; }

.explanation {
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 24px;
  border-left: 3px solid;
  opacity: 0; transform: translateY(8px);
  animation: fadeUp .4s ease forwards;
}
.explanation.correct-exp { background: var(--correct-bg); border-color: var(--correct); }
.explanation.wrong-exp { background: var(--wrong-bg); border-color: var(--wrong); }
.explanation-tag { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 8px; }
.correct-exp .explanation-tag { color: var(--correct); }
.wrong-exp .explanation-tag { color: var(--wrong); }
.explanation p { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }

.next-btn {
  display: block; width: 100%; padding: 16px;
  border: none; border-radius: 100px;
  background: var(--accent); color: #fff;
  font-family: var(--sans); font-size: 14px;
  font-weight: 500; cursor: pointer;
  transition: all .3s ease; letter-spacing: 1px;
}
.next-btn:hover {
  background: var(--accent-warm);
  box-shadow: 0 4px 20px rgba(122,107,93,0.2);
}

/* ─── RESULT ─── */
.result-screen {
  min-height: 100vh;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 40px 24px;
  background: linear-gradient(175deg, #F7F5F0 0%, #EDE8DF 40%, #E5DFD3 100%);
}
.result-label {
  font-family: var(--display);
  font-size: 13px; letter-spacing: 6px;
  color: var(--accent); margin-bottom: 24px;
}
.result-score-big {
  font-family: var(--display);
  font-size: 72px; font-weight: 500;
  color: var(--accent); line-height: 1;
  margin-bottom: 8px;
}
.result-total { font-size: 16px; color: var(--text-muted); margin-bottom: 32px; }
.result-message {
  font-family: var(--serif);
  font-size: 22px; font-weight: 500;
  color: var(--text-primary); margin-bottom: 12px;
}
.result-sub {
  font-size: 14px; color: var(--text-secondary);
  max-width: 420px; line-height: 1.8;
  margin-bottom: 40px;
}
.result-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 16px; width: 100%; max-width: 400px;
  margin-bottom: 40px;
}
.result-stat {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 12px; padding: 16px 12px;
}
.result-stat .rs-num {
  font-family: var(--display);
  font-size: 28px; font-weight: 500;
  line-height: 1.2;
}
.result-stat .rs-label { font-size: 11px; color: var(--text-muted); letter-spacing: .5px; }
.rs-correct .rs-num { color: var(--correct); }
.rs-wrong .rs-num { color: var(--wrong); }
.rs-rate .rs-num { color: var(--accent); }
.result-buttons {
  display: flex; flex-direction: column;
  gap: 12px; width: 100%; max-width: 300px;
}
.review-list {
  max-width: 680px;
  margin: 32px auto 0; padding: 0 20px;
  text-align: left; width: 100%;
}
.review-title {
  font-family: var(--serif);
  font-size: 20px; font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 20px; text-align: center;
}
.review-item {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 12px; padding: 20px;
  margin-bottom: 12px;
}
.review-item.ri-correct { border-left: 3px solid var(--correct); }
.review-item.ri-wrong { border-left: 3px solid var(--wrong); }
.review-q { font-size: 14px; color: var(--text-primary); margin-bottom: 8px; line-height: 1.7; }
.review-answer { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.review-answer strong { color: var(--correct); }
.review-answer .your-wrong { color: var(--wrong); }

@media (max-width: 480px) {
  .start-stats { gap: 16px; }
  .stat-num { font-size: 28px; }
  .start-compare { flex-direction: column; }
  .compare-col:first-child { border-right: none; border-bottom: 1px solid var(--border-light); }
  .question-text { font-size: 16px; }
  .option-btn { padding: 14px 16px; font-size: 13.5px; }
  .result-score-big { font-size: 56px; }
}
</style>
</head>
<body>

<!-- ═══ START ═══ -->
<div class="screen active" id="startScreen">
  <div class="start-screen">
    <div class="start-label">Trap Question Training · II</div>
    <h1 class="start-title">「以上皆非」陷阱題特訓</h1>
    <div class="start-subtitle">33 題看穿反向陷阱</div>
    
    <div class="start-stats">
      <div class="stat-item"><div class="stat-num">47</div><div class="stat-label">皆非出現</div></div>
      <div class="stat-item"><div class="stat-num">33</div><div class="stat-label">是陷阱</div></div>
      <div class="stat-item"><div class="stat-num">70%</div><div class="stat-label">陷阱率</div></div>
    </div>

    <div class="start-compare">
      <div class="compare-col cc-good">
        <div class="cc-label">以上皆是</div>
        <div class="cc-rate">86%</div>
        <div class="cc-desc">選了多半對</div>
      </div>
      <div class="compare-col cc-bad">
        <div class="cc-label">以上皆非</div>
        <div class="cc-rate">30%</div>
        <div class="cc-desc">選了多半錯</div>
      </div>
    </div>

    <div class="start-modes">
      <button class="mode-btn primary" onclick="startQuiz('traps')">陷阱 33 題特訓</button>
      <button class="mode-btn" onclick="startQuiz('all47')">全部 47 題（含正確 14 題）</button>
      <button class="mode-btn" onclick="startQuiz('random10')">隨機 10 題快測</button>
      <button class="mode-btn" onclick="startQuiz('financial')">金融常識篇</button>
      <button class="mode-btn" onclick="startQuiz('ethics')">職業道德篇</button>
    </div>
    <div class="start-hint">皆是多半對，皆非多半錯。<br>這裡收錄所有「以上皆非」出現的題目，練到能立刻辨別真偽。</div>
  </div>
</div>

<!-- ═══ QUIZ ═══ -->
<div class="screen" id="quizScreen">
  <div class="quiz-screen">
    <div class="quiz-header">
      <div class="quiz-header-inner">
        <span class="quiz-progress-text" id="progressText">1 / 33</span>
        <span class="quiz-score" id="scoreText">0 正確</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div id="questionArea"></div>
  </div>
</div>

<!-- ═══ RESULT ═══ -->
<div class="screen" id="resultScreen"></div>

<script>
const QUESTIONS = [
  // ══════════════════════════════════════
  //  以上皆非 = 陷阱（錯誤答案）33 題
  // ══════════════════════════════════════

  // 金融常識 9 題
  { id:"F22", cat:"financial", isRealTrap: true,
    text:"何種證券商為發行市場主要參與者？",
    options:["經紀商","承銷商","自營商","以上皆非"],
    answer:1,
    explain:"承銷商是發行市場（初級市場）的主角，負責幫企業銷售新發行的證券。經紀商和自營商主要活躍在次級市場。" },

  { id:"F72", cat:"financial", isRealTrap: true,
    text:"證券投資人及期貨交易人對紛爭之解決機制：",
    options:["只可依金融消費者保護法向評議中心申請評議","只可依證券投資人及期貨交易人保護法向投保中心申請調處、或授權提付仲裁或提起團體訴訟","以上均可選擇尋求解決","以上皆非"],
    answer:2,
    explain:"(1)和(2)都是可行的管道，所以答案是(3)「均可選擇」。這題的「以上皆非」是誘導你忽略(3)這個整合選項。" },

  { id:"F75", cat:"financial", isRealTrap: true,
    text:"上市（櫃）公司之年度財務報告，自101年會計年度開始，最遲應於年度終了後幾個月內公告並申報？",
    options:["二個月","三個月","四個月","以上皆非"],
    answer:1,
    explain:"年度財報最遲「三個月」內公告。這是純記憶題，(1)太短、(3)太長，答案就在選項裡。" },

  { id:"F220", cat:"financial", isRealTrap: true,
    text:"基金經理人掌握增減基金持股比率的時機，這就是一種：",
    options:["積極式(主動式)的資產配置","消極式(被動式)的資產配置","精挑細選證券(Selection)","以上皆非"],
    answer:0,
    explain:"主動調整持股比率＝積極式（主動式）資產配置。被動式是買指數不動、Selection是選個股，兩者都不對。" },

  { id:"F238", cat:"financial", isRealTrap: true,
    text:"投資人如何降低其投資組合之系統風險？",
    options:["系統風險只要透過分散投資風險性資產就可降低","系統風險是不可分散之風險，所以投資組合無法降低系統風險","系統風險是可以透過部份投資無風險性資產來降低","以上皆非"],
    answer:2,
    explain:"系統風險確實「不可分散」，但可以透過配置部分無風險資產（如國庫券）來降低整體組合的系統風險曝露。(1)說分散就能降低是錯的，(2)說完全無法降低也不精確。" },

  { id:"F241", cat:"financial", isRealTrap: true,
    text:"某基金的市場波動度是9.9%，而同一時間市場波動度是9%，則該基金的β值是？",
    options:["1.2","0.09","1.1","以上皆非"],
    answer:2,
    explain:"β = 基金波動度 ÷ 市場波動度 = 9.9% ÷ 9% = 1.1。計算題答案就在選項裡，別被「以上皆非」誘導放棄計算。" },

  { id:"F249", cat:"financial", isRealTrap: true,
    text:"下列敘述，何者為真：A.封閉型基金是在集中市場交易；B.開放型基金（ETF除外）也可以在集中市場交易",
    options:["只有A為真","只有B為真","A與B都為真","以上皆非"],
    answer:0,
    explain:"封閉型基金確實在集中市場交易（A對），但一般開放型基金是向投信公司申購贖回，不在集中市場交易（B錯）。" },

  { id:"F257", cat:"financial", isRealTrap: true,
    text:"以下何者不是共同基金操作手法或目的：",
    options:["獲利目標是要擊敗標竿之報酬率","積極買賣衍生性商品","追求相對報酬","以上皆非"],
    answer:1,
    explain:"共同基金追求相對報酬、目標擊敗標竿，但「積極買賣衍生性商品」是對沖基金的手法，不是一般共同基金的做法。" },

  { id:"F423", cat:"financial", isRealTrap: true,
    text:"下列何者非傷害保險事故之「意外事故」的構成要件？",
    options:["內在原因觸發","意外事故所致","外在原因觸發","以上皆非"],
    answer:0,
    explain:"意外事故的構成要件是「外來、突發、非由疾病引起」。「內在原因觸發」（如疾病）不算意外事故。這是你的保險專業領域。" },

  // 職業道德 24 題
  { id:"E28", cat:"ethics", isRealTrap: true,

    options:["保險商品","基金","推介股票","以上皆非"],
    answer:3,
    explain:"【這題皆非是對的】金融市場常識與職業道德只是「共同科目」，單獨通過不能銷售任何商品，還需要各別的專業證照。" }
];

let currentQuiz = [];
let currentIndex = 0;
let score = 0;
let answers = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(mode) {
  let pool;
  switch(mode) {
    case 'traps': pool = shuffle(QUESTIONS.filter(q => q.isRealTrap)); break;
    case 'all47': pool = shuffle(QUESTIONS); break;
    case 'random10': pool = shuffle(QUESTIONS).slice(0,10); break;
    case 'financial': pool = shuffle(QUESTIONS.filter(q => q.cat === 'financial')); break;
    case 'ethics': pool = shuffle(QUESTIONS.filter(q => q.cat === 'ethics')); break;
    default: pool = shuffle(QUESTIONS);
  }
  currentQuiz = pool;
  currentIndex = 0;
  score = 0;
  answers = [];
  showScreen('quizScreen');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function renderQuestion() {
  const q = currentQuiz[currentIndex];
  const total = currentQuiz.length;
  document.getElementById('progressText').textContent = `${currentIndex+1} / ${total}`;
  document.getElementById('scoreText').textContent = `${score} 正確`;
  document.getElementById('progressFill').style.width = `${(currentIndex/total)*100}%`;

  const catClass = q.cat === 'financial' ? 'cat-financial' : 'cat-ethics';
  const catName = q.cat === 'financial' ? '金融常識' : '職業道德';
  const trapClass = q.isRealTrap ? 'trap-real' : 'trap-fake';
  const trapLabel = q.isRealTrap ? '皆非是陷阱' : '皆非是正確';

  let html = `
    <div class="quiz-badges">
      <span class="quiz-category ${catClass}">${catName}</span>
      <span class="trap-badge ${trapClass}">${trapLabel}</span>
    </div>
    <div class="question-text">${q.text}</div>
    <div class="options-list">`;
  q.options.forEach((opt, i) => {
    html += `<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-num">${i+1}</span><span>${opt}</span></button>`;
  });
  html += `</div><div id="feedback"></div>`;
  document.getElementById('questionArea').innerHTML = html;
}

function selectAnswer(idx) {
  const q = currentQuiz[currentIndex];
  const correct = q.answer;
  const isCorrect = idx === correct;
  if(isCorrect) score++;
  answers.push({q, selected:idx, isCorrect});

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.classList.add('disabled');
    const bIdx = parseInt(btn.dataset.idx);
    if(bIdx === correct) btn.classList.add('correct');
    if(bIdx === idx && !isCorrect) btn.classList.add('wrong');
    if(bIdx !== correct && bIdx !== idx) btn.classList.add('dimmed');
  });

  const expClass = isCorrect ? 'correct-exp' : 'wrong-exp';
  const tag = isCorrect ? '✓ 答對了！' : '✗ 答錯了';
  document.getElementById('feedback').innerHTML = `
    <div class="explanation ${expClass}">
      <div class="explanation-tag">${tag}</div>
      <p>${q.explain}</p>
    </div>
    <button class="next-btn" onclick="nextQuestion()">
      ${currentIndex < currentQuiz.length-1 ? '下一題 →' : '查看結果'}
    </button>`;
  document.getElementById('progressFill').style.width = `${((currentIndex+1)/currentQuiz.length)*100}%`;
}

function nextQuestion() {
  currentIndex++;
  if(currentIndex >= currentQuiz.length) showResult();
  else { renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); }
}

function showResult() {
  const total = currentQuiz.length;
  const wrong = total - score;
  const rate = Math.round((score/total)*100);
  let msg, sub;
  if(rate >= 90) { msg='皆非免疫者'; sub='你已經能精準辨別「以上皆非」的真偽，考試穩了。'; }
  else if(rate >= 70) { msg='判斷力不錯'; sub='大部分能辨別，建議把錯題再練一輪強化記憶。'; }
  else if(rate >= 50) { msg='還需要加強'; sub='「以上皆非」的誘惑和陷阱對你仍有殺傷力，建議搭配解析反覆練。'; }
  else { msg='被皆非支配了'; sub='別灰心，反覆練這些題目，掌握「三個都錯才選皆非」的判斷邏輯。'; }

  let html = `<div class="result-screen">
    <div class="result-label">Training Complete</div>
    <div class="result-score-big">${rate}%</div>
    <div class="result-total">${score} / ${total} 題正確</div>
    <div class="result-message">${msg}</div>
    <div class="result-sub">${sub}</div>
    <div class="result-stats">
      <div class="result-stat rs-correct"><div class="rs-num">${score}</div><div class="rs-label">答對</div></div>
      <div class="result-stat rs-wrong"><div class="rs-num">${wrong}</div><div class="rs-label">答錯</div></div>
      <div class="result-stat rs-rate"><div class="rs-num">${rate}%</div><div class="rs-label">正確率</div></div>
    </div>
    <div class="result-buttons">
      <button class="mode-btn primary" onclick="startQuiz('all47')">再測一次（全47題）</button>
      ${wrong > 0 ? '<button class="mode-btn" onclick="retryWrong()">只做錯題 ('+wrong+' 題)</button>' : ''}
      <button class="mode-btn" onclick="showScreen('startScreen')">返回首頁</button>
    </div>
    ${wrong > 0 ? '<div class="review-list" id="reviewList"></div>' : ''}
  </div>`;
  document.getElementById('resultScreen').innerHTML = html;
  showScreen('resultScreen');

  if(wrong > 0) {
    const el = document.getElementById('reviewList');
    if(el) {
      let rHtml = '<div class="review-title">錯題回顧</div>';
      answers.forEach(a => {
        if(!a.isCorrect) {
          rHtml += `<div class="review-item ri-wrong">
            <div class="review-q">${a.q.text}</div>
            <div class="review-answer">
              <span class="your-wrong">你選：(${a.selected+1}) ${a.q.options[a.selected]}</span><br>
              <strong>正確：(${a.q.answer+1}) ${a.q.options[a.q.answer]}</strong>
            </div></div>`;
        }
      });
      el.innerHTML = rHtml;
    }
  }
}

function retryWrong() {
  const wrongQs = answers.filter(a => !a.isCorrect).map(a => a.q);
  currentQuiz = shuffle(wrongQs);
  currentIndex = 0; score = 0; answers = [];
  showScreen('quizScreen');
  renderQuestion();
}
</script>
</body>
</html>
