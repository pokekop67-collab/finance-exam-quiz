<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務員考照衝刺｜保險實務</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
  
  :root {
    --primary: #667eea;
    --secondary: #764ba2;
    --accent: #f093fb;
    --bg: #f8f9ff;
    --card: #ffffff;
    --text: #2d3748;
    --muted: #718096;
    --correct: #48bb78;
    --wrong: #fc8181;
    --border: #e2e8f0;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  
  .hero {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 40px 20px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    top: -100px; right: -100px;
  }
  .hero h1 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
  .hero p { font-size: 1rem; opacity: 0.85; }
  .hero .stats { 
    display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap;
  }
  .hero .stat {
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.9rem;
  }
  .hero .stat strong { display: block; font-size: 1.5rem; font-weight: 900; }
  
  .controls {
    max-width: 900px;
    margin: -20px auto 0;
    padding: 0 16px;
    position: relative;
    z-index: 10;
  }
  
  .control-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  
  .control-card select, .control-card input {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    cursor: pointer;
    flex: 1;
    min-width: 140px;
  }
  .control-card select:focus, .control-card input:focus {
    border-color: var(--primary);
  }
  
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-secondary { background: var(--bg); color: var(--primary); border: 2px solid var(--primary); }
  .btn-secondary:hover { background: var(--primary); color: white; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { opacity: 0.85; }
  
  .progress-bar {
    max-width: 900px;
    margin: 16px auto 0;
    padding: 0 16px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .bar {
    background: var(--border);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 999px;
    transition: width 0.5s ease;
  }
  
  .quiz-area {
    max-width: 900px;
    margin: 24px auto;
    padding: 0 16px 60px;
  }
  
  .question-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 2px solid transparent;
    transition: all 0.2s;
    display: none;
  }
  .question-card.visible { display: block; }
  .question-card:hover { border-color: var(--primary); }
  .question-card.answered { border-color: var(--correct); }
  
  .q-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .q-num {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .q-chapter {
    background: rgba(99,102,241,0.1);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .q-status {
    margin-left: auto;
    font-size: 1.2rem;
  }
  
  .q-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
  }
  
  .options {
    display: grid;
    gap: 8px;
    margin-bottom: 16px;
  }
  .option {
    padding: 12px 16px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .option:hover { background: #eef2ff; border-color: var(--primary); }
  .option.correct { background: #f0fff4; border-color: var(--correct); color: #22543d; }
  .option.wrong { background: #fff5f5; border-color: var(--wrong); color: #742a2a; }
  .option.selected { border-color: var(--primary); background: #eef2ff; }
  
  .reveal-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reveal-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  
  .answer-block {
    margin-top: 14px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #f0fff4, #e6fffa);
    border: 1.5px solid var(--correct);
    border-radius: 12px;
    display: none;
  }
  .answer-block.show { display: block; }
  .answer-label {
    font-weight: 900;
    color: #22543d;
    font-size: 0.88rem;
    margin-bottom: 6px;
  }
  .explanation {
    font-size: 0.88rem;
    color: #2f855a;
    line-height: 1.7;
  }
  
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  
  .chapter-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 999px;
    border: 2px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 700;
    font-family: inherit;
    transition: all 0.2s;
    color: var(--muted);
  }
  .tab:hover { border-color: var(--primary); color: var(--primary); }
  .tab.active { background: var(--primary); border-color: var(--primary); color: white; }
  
  .score-banner {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
    display: none;
  }
  .score-banner.show { display: block; }
  .score-banner .score-num { font-size: 3rem; font-weight: 900; }
  
  @media (max-width: 600px) {
    .hero h1 { font-size: 1.5rem; }
    .question-card { padding: 16px; }
    .control-card { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>📋 業務員考照衝刺｜保險實務</h1>

  <div class="stats">
    <div class="stat"><strong id="total-count">0</strong>共幾題</div>

    <div class="stat"><strong id="correct-count">0</strong>答對</div>
    <div class="stat"><strong id="accuracy-pct">—</strong>正確率</div>
  </div>
</div>

<div class="controls">
  <div class="control-card">
    <select id="chapter-filter" onchange="filterQuestions()">
      <option value="all">📚 全部章節</option>
    </select>
    <input type="text" id="search-box" placeholder="🔍 搜尋題目關鍵字..." oninput="filterQuestions()" />
    <button class="btn btn-primary" onclick="randomMode()">🎲 隨機出題</button>
    <button class="btn btn-secondary" onclick="resetAll()">🔄 重新開始</button>
    <button class="btn btn-accent" onclick="showAll()">👁️ 全部顯示答案</button>
  </div>
</div>

<div class="progress-bar">
  <div class="progress-info">
    <span id="progress-text">進度 0 / 0</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="bar"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
</div>

<div class="quiz-area">
  <div class="chapter-tabs" id="chapter-tabs"></div>
  <div class="score-banner" id="score-banner">
    <div>🎉 全部作答完成！</div>
    <div class="score-num" id="final-score">0/0</div>
    <div id="final-msg"></div>
  </div>
  <div id="questions-container"></div>
</div>

00 萬為損失 幅度。"}, {"num": 17, "chapter": "第一章", "question": "阿華將其最近購買的一棟房子投保財產保險後，就疏忽房子之維護與管 理，這種風險因素係屬於(1)心理風險(2)實質風險(3)有形風險(4)道德風 險。", "answer": "1", "explanation": "A 客觀風險；B0.326%損失頻率；C100 萬為損失 幅度。 因個人的不小心、冷漠、缺乏注意力，而增加風險 發生的機會，稱之為心理風險(無形風險)。"}, {"num": 18, "chapter": "第一章", "question": "風險(3)基本風險與特定風險(4)客觀風險與主觀風險。 2 風險的分類，依損失的性質可區分為純粹風險與投 機風險。", "answer": "1", "explanation": "因個人的不小心、冷漠、缺乏注意力，而增加風險 發生的機會，稱之為心理風險(無形風險)。"}, {"num": 19, "chapter": "第一章", "question": "風險的分類，依性質可區分為(1)靜態風險與動態風險(2)純粹風險與投機 風險(3)基本風險與特定風險(4)客觀風險與主觀風險。 2 風險的分類，依損失的性質可區分為純粹風險與投 機風險。 廣義的風險管理，除彌補經濟損失外，尚包含儲蓄投資以備未來所需，此 部份之需求就可以利用年金保險、長期壽險等具有下列哪些功能，使個人 及家庭的經濟生活更能獲得保障？A 儲蓄性質保單；B 保單借款；C 保單 復效；D 身故保險金(1)BC(2)AD(3)AB(4)ABCD。", "answer": "3", "explanation": "題目考的是保險的儲蓄功能，故選項只能選擇A 與 B，C 復效係保障的持續擁有；D 身故保險金保障 家庭經濟生活並未保障個人經濟生活"}, {"num": 20, "chapter": "第一章", "question": "", "answer": "3", "explanation": ""}, {"num": 21, "chapter": "第一章", "question": "人身風險事故發生時可能導致A 遺族生活費用增加；B 老年退休費用減 少；C 醫療費用增加；D 收入減少(1)ACD(2)ABCD(3)ABC(4)BCD。 1 B 老年退休費用會增加，因可能需失能或疾病導致 需增添無障礙設施，故退休費用會增加。 下列敘述何者不正確？(1)就全體投保者而言，人壽保險保險費與保險給付 間為交換價值不相等的契約(2)人壽保險之保險費計算，須受政府之嚴格管 制監督(3)同一種保單對不同的購買者可能收取不同的保險費(4)人壽保險 之保險費決定係在實際成本發生之前，採預估方式。", "answer": "1", "explanation": "(1)保險是集合大多數人的力量來分散風險消化損失 的社會互助經濟保障制度，它是根據公平合理的制 度給予他所需要的補償。"}, {"num": 22, "chapter": "第一章", "question": "有關因應新型冠狀病毒傳染之風險管理方法，下列何者錯誤？(1)不到人群 匯集的夜市或觀光景點係採用「避免」(2)勤洗手、戴口罩並遵守社交安全 距離的規定係採用「預防」(3)察覺有發燒、咳嗽等症狀時前往指定醫療院 所進行篩檢並自主健康管理係採用「抑制」(4)購買年金型保險商品係採用 「移轉」。", "answer": "4", "explanation": "(4)購買年金型保險則屬於儲蓄投資以備未來所需之 風險管理方式。"}, {"num": 23, "chapter": "第一章", "question": "道德風險因素之敘述何者正確？A 屬於有形風險因素；B 指因個人不小 心、冷漠導致增加風險事故發生的機會；C 如為領取保險金而縱火的行 為；D 如疏忽維護已投保財產保險之保險標的(1)C(2)AC(3)BD(4)ABD。", "answer": "1", "explanation": "(4)購買年金型保險則屬於儲蓄投資以備未來所需之 風險管理方式。 道德風險因素：指凡促使被保險人意圖不當得利而 故意使損失發生之條件即為道德風險因素。 A 屬於無形風險；B 描述為心理風險；D 描述為心 理風險。\""}, {"num": 24, "chapter": "第一章", "question": "下列敘述，何者不正確(1)投機風險係指事件發生的結果可能會產生獲利 (2)保險的目的，在於補償因偶然事件的發生所導致經濟上的損失(3)保險 所處理的風險，主要是純粹風險(4)純粹風險係指事件的結果不一定只有損 失機會。", "answer": "4", "explanation": "純粹風險係指只有損失機會，而無獲利機會。保險 所處理的風險，主要是純粹風險。"}, {"num": 25, "chapter": "第一章", "question": "風險衡量結果屬於重要的風險，則代表(1)損失頻率分配及幅度分配皆很小 (2)損失頻率分配及幅度分配皆很高(3)損失頻率分配很高及幅度分配很小 (4)以上皆非。", "answer": "3", "explanation": "純粹風險係指只有損失機會，而無獲利機會。保險 所處理的風險，主要是純粹風險。 重要的風險，具備損失頻率分配很高及幅度分配很 小的屬性。"}, {"num": 26, "chapter": "第一章", "question": "風險(4)客觀風險。 3 天然災害/自然風險事故(如地震、海嘯)的風險類別 為客觀、純粹、靜態、基本風險。", "answer": "3", "explanation": "重要的風險，具備損失頻率分配很高及幅度分配很 小的屬性。"}, {"num": 27, "chapter": "第一章", "question": "天然災害如地震不屬於下列何種風險分類(1)純粹風險(2)靜態風險(3)特定 風險(4)客觀風險。 3 天然災害/自然風險事故(如地震、海嘯)的風險類別 為客觀、純粹、靜態、基本風險。", "answer": "", "explanation": ""}, {"num": 28, "chapter": "第一章", "question": "依風險發生的範圍與影響來看，兼有純粹風險與投機風險雙重性質的風險 類別是(1)特定風險(2)靜態風險(3)動態風險(4)基本風險。 事故發生時波及範圍小，只會影響個人而不會影響整個大環境且較容易控 制的風險為(1)基本風險(2)特定風險(3)常屬純粹風險(4)僅第2 及第3 選項 為是。", "answer": "4", "explanation": "事故發生時波及範圍小，較易控制的風險為特定風 險，性質上常屬於純粹風險。"}, {"num": 29, "chapter": "第一章", "question": "一種風險不受人為之故意行為因素影響，可以觀察也可以衡量，認定上不 會因人而有不同結果之風險稱為(1)主觀風險(2)客觀風險(3)投機風險(4)純 粹風險。", "answer": "2", "explanation": "事故發生時波及範圍小，較易控制的風險為特定風 險，性質上常屬於純粹風險。 客觀風險的定義係指實際損失經驗與預期損失經驗 的可能變量，此種風險通常不受人為之故意行為因 素影響。"}, {"num": 30, "chapter": "第一章", "question": "投保人身保險之個人可獲哪些稅法上優惠(1)在一定金額內之滿期保險金不 用課徵遺產稅(2)憑保險費收據可免繳勞保保險費(3)保險費在一定金額內 可自其綜合所得額中扣除(4)即使未指定受益人，死亡保險金亦不納入遺產 稅計算。", "answer": "3", "explanation": "(1)滿期保險金也不用課徵所得稅(2)繳納的保費可 以依法從他的所得額中扣除(4)遺產及贈與稅法也規 定，約定之被保險人死亡時，給付其所指定受益人 之人壽保險金額，不計入遺產總額課稅。"}, {"num": 31, "chapter": "第一章", "question": "部分居民生 命表 (2)壽險業經驗生命表 (3)國民生命表 (4)簡易生命表 3 國民生命表是由內政部以全國國民或地區居民為對 象，依人口普查之統計基礎作成。", "answer": "3", "explanation": ""}, {"num": 32, "chapter": "第二章", "question": "由內政部以全國國民或地區居民為對象，依人口普查之統計基礎作成 (1) 部分居民生 命表 (2)壽險業經驗生命表 (3)國民生命表 (4)簡易生命表 3 國民生命表是由內政部以全國國民或地區居民為對 象，依人口普查之統計基礎作成。 一個投保人壽保險的人，不論在任何意外事故發生時都有經濟上的保障， 這也就是人身保險功能中的(1)後顧無憂，晚景可恃(2)保證信用，有利投 資(3)安定就業，穩定發展(4)以上皆是。", "answer": "2", "explanation": "因有經濟上的保障，因此確定了信用和償債能力。"}, {"num": 33, "chapter": "第二章", "question": "有關保險之敘述何者正確？(1)是一種透過多數人合作以避免風險的經濟保 障制度(2)投保人壽保險的人可以確定她的信用和償還能力(3)是一種風險 避免的方法(4)以上皆是。", "answer": "2", "explanation": "因有經濟上的保障，因此確定了信用和償債能力。 保險是風險轉移，而非避免風險。"}, {"num": 34, "chapter": "第二章", "question": "人身保險對國家有哪些功能？A 透過再保、拓展外交；B 互助共濟、社會 安寧；C 健全經營、整合金融；D 形成資本、以增國富 (1)ACD(2)ABCD(3)BCD(4)ABC。", "answer": "1", "explanation": "保險是風險轉移，而非避免風險。 人身保險對國家有以下功能 形成資本、以增國富 穩定經濟，安定政治 透過再保、拓展外交 健全經營、整合金融。\""}, {"num": 35, "chapter": "第二章", "question": "", "answer": "1", "explanation": ""}, {"num": 36, "chapter": "第二章", "question": "投資型保險商品的設計，可以A 有效對抗通貨膨脹；B 使得個人資金運用 及退休計畫更具彈性；C 降低壽險公司經營風險；D 達到金融市場整合功 能 (1)AB(2)ABD(3)BD(4)ABCD。", "answer": "4", "explanation": "結合證券投資的壽險商品(投資型商品)，利用盈虧 自負、彈性繳費的特性，可以有效對抗通膨，讓資 金運用更彈性，並降低壽險公司的經營風險，且達 到金融市場整合的功能。"}, {"num": 37, "chapter": "第二章", "question": "我國壽險業最新奉准採用作為責任準備金提存標準為 (1)臺灣壽險業第四 回經驗生命 表 (2)臺灣壽險業第五回經驗生命表死亡率百分之九十 (3)臺 灣壽險業第六回經驗生命表 (4)臺灣壽險業第五回經驗生命表", "answer": "3", "explanation": "我國壽險業最新奉准採用作為責任準備金臺灣壽險 業第六回經驗生命表。"}, {"num": 38, "chapter": "第三章", "question": "家庭模式改變，夫妻皆有所得的家庭持續增加，婦女在家庭經濟上掌握更 多權力，婦女壽險市場 (1)躍居主導地位 (2)逐漸受到重視 (3)無多大改變 (4)日漸式微", "answer": "2", "explanation": "我國壽險業最新奉准採用作為責任準備金臺灣壽險 業第六回經驗生命表。 家庭模式改變，夫妻皆有所得的家庭持續增加，婦 女在家庭經濟上掌握更多權力，婦女壽險市場逐漸 受到重視。"}, {"num": 39, "chapter": "第三章", "question": "目前有許多的保險商品是為滿足消費者特殊的需要設計，在消費者的需求 上不僅要求足夠的死亡保障，而且必須依年齡、性別、職業等設計的不同 的保險商品，壽險公司所需採行的措施是將商品 (1)平均化 (2)統一化 (3) 細分化 (4)獨立化", "answer": "3", "explanation": "壽險公司將商品細分化，以滿足消費者特殊的需要 設計。"}, {"num": 40, "chapter": "第三章", "question": "", "answer": "3", "explanation": "壽險公司將商品細分化，以滿足消費者特殊的需要 設計。"}, {"num": 41, "chapter": "第三章", "question": "為給客戶最大的方便及最高的利益，壽險業在經營上應該特別重視 A 加 強人身保險知 識宣導：B 業務員教育訓練：C 提高經營效率，降低成 本：D 提高佣金比例，以安定業 務員之生活 (1)ABCD (2)BCD (3)ABC (4)ACD", "answer": "3", "explanation": "為給客戶最大的方便及最高的利益，壽險業在經營 上應該特別重視加強人身保險知識宣導、業務員教 育訓練、提高經營效率，降低成本。"}, {"num": 42, "chapter": "第三章", "question": "目前國內保險市場經營壽險業務之組織 (1)除股份有限公司外，亦有相互 合作社之組 織型態 (2)目前國內保險市場經營壽險業務之組織 (3)有股份 有限公司或合作社兩種 組織型態 (4)均為股份有限公司", "answer": "4", "explanation": "目前國內保險市場經營壽險業務之組織均為股份有 限公司。"}, {"num": 43, "chapter": "第三章", "question": "保險業如何運用金融科技及大數據技術?A 用行動裝置締結保險契約，簡 化投保：B "num": 84, "chapter": "第四章", "question": "", "answer": "2", "explanation": ""}, {"num": 85, "chapter": "第四章", "question": "有關傳統型年金保險費率計算可使用之預定附加費用率標準，何者正確？ (1)繳費期間未滿十年者，費用率不得超過總保費之10%(2)躉繳者，費用 率不得超過總保費之3%(3)繳費期間滿十五年者，費用率不得超過總保費 之11%(4)繳費期間未滿十五年者，費用率不得超過總保費之15%。", "answer": "3", "explanation": "傳統型年金保險費率計算可使用之預定附加費用率 標準： 躉繳：費用率<總保費5％ 繳費期間未滿10 年：費用率<總保費8.5％ 繳費期間未滿15 年：費用率<總保費9.5％ 繳費期間滿15 年：費用率<總保費11％"}, {"num": 86, "chapter": "第四章", "question": "為了促進人身保險制度能夠健全營運，就必須顧及下列哪幾項要素？A 相 互扶助的觀念；B 公平的危險分擔；C 收支相等原則；D 損失填補原則 (1)ABC(2)AC(3)BC(4)ABCD。", "answer": "1", "explanation": "人身保險構成的三原則：相互扶助的觀念、公平的 危險分擔、收支相等原則。 損害填補原只適用實支實付健康險，指的是被保險 人因事故發生的損失，所獲得的賠償，恰好恢復至 事故發生前。"}, {"num": 87, "chapter": "第四章", "question": "有關人壽保險業經驗生命表，係為下列何者之準繩A 壽險業計算責任準備 金；B 壽險業釐訂保險費率；C 壽險業評價業務營運績效 (1)AB(2)B(3)A(4)ABC。", "answer": "4", "explanation": "人壽保險業經驗生命表，係以壽險業計算責任準備 金、壽險業釐訂保險費率、壽險業評價業務營運績 效為準繩。"}, {"num": 88, "chapter": "第四章", "question": "有關保險費所累積的「責任準備金」之敘述何者錯誤？(1)透過專家的經營 運作，獲利往往較一般利息優厚(2)對保戶而言既是儲蓄又是投資(3)保戶 必須承擔投資風險，沒有確保一定利潤(4)保險公司可用來投資運用孳息。", "answer": "3", "explanation": "(3)責任準備金與投資風險無關。"}, {"num": 89, "chapter": "第四章", "question": "有關分紅保險契約之敘述何者錯誤？(1)契約條文應明訂分紅方式及紅利決 算基準日(2)以紅利購買增額繳清保險的部分，保險公司得依實際狀況決定 分紅與否(3)變更為減額繳清保險後應維持其分紅保單之特性(4)變更為展 期定期保險後應維持其分紅保單之特性。", "answer": "4", "explanation": "(3)責任準備金與投資風險無關。 (4)變更成展期定期保險後，得由各保險公司依實際 狀況決定分紅或不分紅保單。"}, {"num": 90, "chapter": "第四章", "question": "", "answer": "4", "explanation": "(4)變更成展期定期保險後，得由各保險公司依實際 狀況決定分紅或不分紅保單。"}, {"num": 91, "chapter": "第四章", "question": "生存人數；D 年末之生存人數(1)BC(2)BD(3)AC(4)BCD。 1 死亡率計算公式為：年度內之死亡人數/年初之生 存人數。", "answer": "4", "explanation": ""}, {"num": 92, "chapter": "第四章", "question": "死亡率之計算基礎為A 年初之死亡人數；B 年度內之死亡人數；C 年初之 生存人數；D 年末之生存人數(1)BC(2)BD(3)AC(4)BCD。 1 死亡率計算公式為：年度內之死亡人數/年初之生 存人數。 要保人解約對於保險人的影響，何者錯誤？(1)造成逆選擇的不良影響(2) 保險人通常會再酌收費用作為補償(3)解約對於保險人費用分擔未產生任何 影響(4)造成資金運用不利的不良影響。", "answer": "3", "explanation": "提前解約，會對保險公司造成逆選擇、資金運用不 利及費用無法攤回等不良影響，保險公司通常會酌 收費用作為補償。(3)解約對於保險人將產生額外成 本。"}, {"num": 93, "chapter": "第四章", "question": "責 let state = {
  answered: {},
  selected: {},
  currentFilter: 'all',
  searchText: ''
};

function init() {
  // Populate chapter filter
  const chapters = [...new Set(ALL_QUESTIONS.map(q => q.chapter))].sort();
  const select = document.getElementById('chapter-filter');
  const tabs = document.getElementById('chapter-tabs');
  
  // "全部" tab
  const allTab = document.createElement('button');
  allTab.className = 'tab active';
  allTab.textContent = `全部 (${ALL_QUESTIONS.length})`;
  allTab.onclick = () => setChapter('all', allTab);
  tabs.appendChild(allTab);
  
  chapters.forEach(ch => {
    const count = ALL_QUESTIONS.filter(q => q.chapter === ch).length;
    const opt = document.createElement('option');
    opt.value = ch; opt.textContent = `${ch} (${count}題)`;
    select.appendChild(opt);
    
    const tab = document.createElement('button');
    tab.className = 'tab';
    tab.textContent = `${ch} (${count})`;
    tab.dataset.chapter = ch;
    tab.onclick = () => setChapter(ch, tab);
    tabs.appendChild(tab);
  });
  
  document.getElementById('total-count').textContent = ALL_QUESTIONS.length;
  renderQuestions(ALL_QUESTIONS);
}

function setChapter(ch, el) {
  state.currentFilter = ch;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('chapter-filter').value = ch;
  filterQuestions();
}

function getFilteredQuestions() {
  let qs = ALL_QUESTIONS;
  if (state.currentFilter !== 'all') {
    qs = qs.filter(q => q.chapter === state.currentFilter);
  }
  const search = state.searchText.toLowerCase();
  if (search) {
    qs = qs.filter(q => q.question.toLowerCase().includes(search) || 
                        q.explanation.toLowerCase().includes(search));
  }
  return qs;
}

function filterQuestions() {
  state.currentFilter = document.getElementById('chapter-filter').value;
  state.searchText = document.getElementById('search-box').value;
  const tab = document.querySelector(`.tab[data-chapter="${state.currentFilter}"]`) || 
               document.querySelector('.tab');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tab) tab.classList.add('active');
  renderQuestions(getFilteredQuestions());
}

function randomMode() {
  const qs = getFilteredQuestions();
  const shuffled = [...qs].sort(() => Math.random() - 0.5);
  renderQuestions(shuffled);
}

function renderQuestions(qs) {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  
  if (qs.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>找不到符合條件的題目</p></div>';
    updateStats();
    return;
  }
  
  qs.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card visible';
    card.id = `q-${q.num}`;
    if (state.answered[q.num]) card.classList.add('answered');
    
    // Parse options from question text
    const stem = q.question;
    const optionMatch = stem.match(/[\(（]([1-4])[\)）]/g);
    const hasOptions = optionMatch && optionMatch.length >= 2;
    
    let optionsHtml = '';
    if (hasOptions) {
      const parts = stem.split(/(?=[\(（][1-4][\)）])/);
      const qStem = parts[0].replace(/[\(（][1-4][\)）]/g, '').trim();
      const opts = parts.slice(1);
      
      if (opts.length >= 2) {
        optionsHtml = '<div class="options">';
        opts.forEach(opt => {
          const numM = opt.match(/^[\(（]([1-4])[\)）](.*)/s);
          if (numM) {
            const num = numM[1];
            const txt = numM[2].trim();
            const isSelected = state.selected[q.num] === num;
            const isAnswered = state.answered[q.num];
            let cls = 'option';
            if (isAnswered) {
              if (num === q.answer) cls += ' correct';
              else if (isSelected && num !== q.answer) cls += ' wrong';
            } else if (isSelected) cls += ' selected';
            
            optionsHtml += `<div class="${cls}" onclick="selectOption(${q.num}, '${num}', this)">({${num}}) ${txt}</div>`;
          }
        });
        optionsHtml += '</div>';
      }
    }
    
    const answered = state.answered[q.num];
    const answerHtml = `
      <div class="answer-block${answered ? ' show' : ''}" id="ans-${q.num}">
        <div class="answer-label">✅ 正確答案：(${q.answer || '?'})</div>
        <div class="explanation">${q.explanation || '（無詳解）'}</div>
      </div>`;
    
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.num}</div>
        <div class="q-chapter">${q.chapter}</div>
        <div class="q-status" id="status-${q.num}">${answered ? '✅' : ''}</div>
      </div>
      <div class="q-text">${q.question || '（題目文字解析有誤，請參考原始 PDF）'}</div>
      ${optionsHtml}
      <button class="reveal-btn" onclick="toggleAnswer(${q.num})" id="btn-${q.num}">
        ${answered ? '🔽 隱藏答案' : '💡 顯示答案'}
      </button>
      ${answerHtml}
    `;
    
    container.appendChild(card);
  });
  
  updateStats();
}

function selectOption(qNum, optNum, el) {
  if (state.answered[qNum]) return;
  
  // Clear previous selection
  document.querySelectorAll(`#q-${qNum} .option`).forEach(o => {
    o.classList.remove('selected', 'correct', 'wrong');
  });
  
  const q = ALL_QUESTIONS.find(q => q.num === qNum);
  state.selected[qNum] = optNum;
  
  // Mark all options
  document.querySelectorAll(`#q-${qNum} .option`).forEach(o => {
    const oNum = o.textContent.match(/^\(([1-4])\)/)?.[1];
    if (oNum === q.answer) o.classList.add('correct');
    else if (oNum === optNum) o.classList.add('wrong');
  });
  
  state.answered[qNum] = optNum === q.answer ? 'correct' : 'wrong';
  document.getElementById(`status-${qNum}`).textContent = 
    optNum === q.answer ? '✅' : '❌';
  
  // Show answer
  document.getElementById(`ans-${qNum}`).classList.add('show');
  document.getElementById(`btn-${qNum}`).textContent = '🔽 隱藏答案';
  document.getElementById(`q-${qNum}`).classList.add('answered');
  
  updateStats();
}

function toggleAnswer(qNum) {
  const block = document.getElementById(`ans-${qNum}`);
  const btn = document.getElementById(`btn-${qNum}`);
  const isShown = block.classList.contains('show');
  
  if (isShown) {
    block.classList.remove('show');
    btn.textContent = '💡 顯示答案';
  } else {
    block.classList.add('show');
    btn.textContent = '🔽 隱藏答案';
    if (!state.answered[qNum]) {
      state.answered[qNum] = 'revealed';
      document.getElementById(`status-${qNum}`).textContent = '👁️';
      updateStats();
    }
  }
}

function showAll() {
  document.querySelectorAll('.answer-block').forEach(b => b.classList.add('show'));
  document.querySelectorAll('.reveal-btn').forEach(b => b.textContent = '🔽 隱藏答案');
}

function resetAll() {
  state.answered = {};
  state.selected = {};
  filterQuestions();
}

function updateStats() {
  const total = ALL_QUESTIONS.length;
  const answeredNums = Object.keys(state.answered).map(Number);
  const answeredCount = answeredNums.length;
  const correctCount = answeredNums.filter(n => state.answered[n] === 'correct').length;
  
  document.getElementById('answered-count').textContent = answeredCount;
  document.getElementById('correct-count').textContent = correctCount;
  
  const filtered = getFilteredQuestions();
  const filteredAnswered = filtered.filter(q => state.answered[q.num]).length;
  const pct = filtered.length > 0 ? Math.round(filteredAnswered / filtered.length * 100) : 0;
  
  document.getElementById('progress-text').textContent = `進度 ${filteredAnswered} / ${filtered.length}`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('bar-fill').style.width = pct + '%';
  
  if (answeredCount > 0) {
    const acc = Math.round(correctCount / answeredCount * 100);
    document.getElementById('accuracy-pct').textContent = acc + '%';
  }
  
  // Check if all done
  if (filtered.length > 0 && filteredAnswered === filtered.length) {
    const correctInFilter = filtered.filter(q => state.answered[q.num] === 'correct').length;
    const banner = document.getElementById('score-banner');
    banner.classList.add('show');
    document.getElementById('final-score').textContent = 
      `${correctInFilter} / ${filtered.length}`;
    const acc = Math.round(correctInFilter / filtered.length * 100);
    document.getElementById('final-msg').textContent = 
      acc >= 80 ? '🎊 太強了！準備上場！' : acc >= 60 ? '💪 再練幾遍，穩過！' : '📖 需要再複習一下';
  }
}

init();
</script>
</body>
</html>
