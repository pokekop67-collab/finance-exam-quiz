<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>金融市場常識與職業道德 - 考試題庫練習</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
:root{--bg:#0f0f13;--card:#1a1a24;--card2:#222233;--accent:#00b4d8;--accent2:#90e0ef;--green:#00b894;--red:#e17055;--orange:#fdcb6e;--text:#f0f0f5;--text2:#8888aa;--border:#2a2a3e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:800px;margin:0 auto;padding:16px;}
.header{text-align:center;padding:24px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.header h1{font-size:1.5em;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--accent),#48cae4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.header .sub{color:var(--text2);font-size:0.85em;}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--card);border-radius:10px;padding:12px 8px;text-align:center;border:1px solid var(--border);}
.stat-box .num{font-size:1.4em;font-weight:700;}
.stat-box .label{font-size:0.7em;color:var(--text2);margin-top:2px;}
.stat-box.green .num{color:var(--green);}
.stat-box.red .num{color:var(--red);}
.stat-box.orange .num{color:var(--orange);}
.stat-box.purple .num{color:var(--accent2);}
.tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--card);border-radius:12px;padding:4px;}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-size:0.85em;font-weight:500;color:var(--text2);transition:all 0.2s;border:none;background:transparent;font-family:inherit;}
.tab.active{background:var(--accent);color:white;}
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.78em;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.filter-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;transition:all 0.2s;}
.q-card.correct{border-color:var(--green);}
.q-card.wrong{border-color:var(--red);}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.q-num{font-size:0.75em;color:var(--text2);}
.q-tag{font-size:0.7em;padding:3px 10px;border-radius:20px;background:var(--card2);}
.q-tag.金融市場常識{color:#90e0ef;border:1px solid #90e0ef44;}
.q-tag.職業道德{color:#fd79a8;border:1px solid #fd79a844;}
.q-text{font-size:0.95em;line-height:1.7;margin-bottom:16px;font-weight:500;}
.options{display:grid;gap:8px;}
.option{padding:12px 16px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-size:0.88em;line-height:1.5;transition:all 0.15s;background:var(--card2);text-align:left;font-family:inherit;color:var(--text);display:flex;gap:10px;align-items:flex-start;}
.option:hover{border-color:var(--accent);background:#1a2a35;}
.option.correct{background:#00b89422;border-color:var(--green);color:var(--green);}
.option.wrong{background:#e1705522;border-color:var(--red);color:var(--red);}
.option.reveal{background:#ffffff11;border-color:var(--green);color:var(--green);}
.option-label{font-weight:700;min-width:20px;}
.result-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:0.8em;font-weight:700;margin-top:12px;}
.result-badge.correct{background:#00b89422;color:var(--green);}
.result-badge.wrong{background:#e1705522;color:var(--red);}
.nav-bar{display:flex;gap:8px;margin-top:16px;justify-content:center;}
.btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:0.88em;transition:all 0.2s;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{opacity:0.85;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--accent2);color:var(--accent2);}
.progress{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.3s;}
/* Read mode */
.read-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:8px;}
.read-q{font-size:0.9em;margin-bottom:8px;line-height:1.6;}
.read-ans{font-size:0.82em;color:var(--green);font-weight:600;}
.read-choices{font-size:0.8em;color:var(--text2);margin-top:6px;line-height:1.7;}
.empty{text-align:center;padding:40px;color:var(--text2);}
/* Loading */
#loading{text-align:center;padding:60px;color:var(--text2);}
</style>
</head>

  <div style="text-align:center;margin-bottom:16px">

  <div class="stats-bar">

    <div class="stat-box orange"><div class="num" id="s-acc">—</div><div class="label">正確率</div></div>

  <div class="tabs">

    <button class="tab" onclick="switchTab('read')">📖 速讀</button>
    <button class="tab" onclick="switchTab('wrong')">❌ 錯題集</button>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" onclick="setFilter('金融市場常識')">金融市場常識</button>

  <div id="loading">載入題庫中...</div>
  <div id="quiz-area" style="display:none"></div>
</div>

業務執行之結果"],"a":0},{"n":142,"s":"職業道德","q":"金融從業人員不應該有下列何種行為？","o":["以職務上所知悉消息，告知第三人","不 得利用客戶名義或帳戶，為自己或第三人買賣","不得有隱瞞、利誘客戶之行為","接 受客戶委託買賣時，不得以自己之計算為買入或賣出之相對行為"],"a":0},{"n":143,"s":"職業道德","q":"溢收客戶新台幣壹佰元，但是已聯絡不到客戶，請問下列處置何者正確？","o":["捐給慈 善機構","交給主管","充當公費","掛在帳上 11"],"a":3},{"n":144,"s":"職業道德","q":"金融從業人員進行徵授信業務時，下列何者為非？","o":["徵信時須詳實審查客戶財務及 信用狀況","利害關係人授信須符合法令規定","定期辦理覆審","為達成自身績效， 可忽視授信客戶可能潛藏之倒帳風險"],"a":3},{"n":145,"s":"職業道德","q":"金融從業人員於受託執行業務時，下列何者正確？","o":["盡一切可能確認並瞭解客戶的 需求，如同處理自己業務一般","盡全力持守榮譽及廉潔以維護所屬公司之信譽","應遵守專業行為規範","以上皆是"],"a":3},{"n":146,"s":"職業道德","q":"在接受客戶委託時，應將誰的利益置於其他利益之上？","o":["委託的客戶","公司","自 己","其他大客戶"],"a":0},{"n":147,"s":"職業道德","q":"金融從業人員基於職業道德應如何對待客戶，下列何者行為是不對的？","o":["公平對待 所有的客戶","將客戶的利益置於公司利益或員工利益之上","將公司利益或員工利 益置於客戶的利益之上","以客戶最高利益行事"],"a":2},{"n":148,"s":"職業道德","q":"下列何者屬善良管理人之原則？","o":["為客戶適度分散投資風險","集中購買單一投資 商品","以高獲利高風險商品為推介目標","未告知投資風險"],"a":0},{"n":149,"s":"職業道德","q":"金融從業人員應以自己的專業知識替客戶選擇合適的商品，在執行時應遵守之原則 為？","o":["最大誠信原則","從業人員利益最大化原則","金融商品風險最大化原則","以上皆是"],"a":0},{"n":150,"s":"職業道德","q":"金融商品風險高低不同，對屬於保守型之客戶，從業人員應推薦之商品為何？","o":["穩 健保守型商品","高風險高報酬商品","目前公司主力推薦之商品","公司所有之商品"],"a":0},{"n":151,"s":"職業道德","q":"金融從業人員幫客戶遞送契約或申請書時，發現客戶於文件上遺漏簽名，下列行為 何者為非？","o":["通知客戶至公司營業場所親自補簽","不用通知，自行幫客戶簽名","親自送自客戶家中，請客戶親自補簽","與客戶於約定地點，送請客戶親自補簽"],"a":1},{"n":152,"s":"職業道德","q":"金融從業人員辦理投資型金融商品之推介或銷售業務時，應遵循下列何者事項？","o":["應廣泛了解客戶，以期精確銷售或推介適合客戶之商品","應以從業人員自身利益為 優先考量","儘量使用類似大眾所熟悉之他人商標，混淆客戶以提升業績","可利用 公司內部資訊擅自為自己進行交易而謀取利益"],"a":0},{"n":153,"s":"職業道德","q":"金融從業人員辦理衍生性商品業務時，應本持下列何項原則？","o":["誠信原則","守法 原則","善良管理原則","以上皆是"],"a":3},{"n":154,"s":"職業道德","q":"有關金融從業人員辦理全權委託業務，下列陳述何者有誤?","o":["不得從事足以損害委 任人權益之交易","得對無權過問之同仁洩漏客戶資料","不得違反契約、內部作業 規範、內部控制等行為","不得為與委任人有利益衝突之第三人從事代客操作業"],"a":1},{"n":155,"s":"職業道德","q":"金融從業人員辦理衍生性商品業務時，應遵循下列何者事項？","o":["可幫助客戶遞延、 隱藏損失","可幫助客戶粉飾財務報表","可幫助客戶提前認列收入","不得利用衍生 性商品幫助客戶遞延、隱藏損失或虛報、提前認列收入等"],"a":3},{"n":156,"s":"職業道德","q":"有關金融從業人員辦理衍生性商品業務，下列陳述何者有誤?","o":["應充分告知投資人 產品所涉風險","應向投資人說明產品之可能最大損失","應加強對非專業善意投資 人之保護措施","應以從業人員自身利益為優先考量"],"a":3},{"n":157,"s":"職業道德","q":"金融從業人員辦理催收業務時，下列行為何者為非？","o":["應對債務人表明身分","不 得有脅迫、辱罵債務人之不當收債行為","不得對第三人進行催討","得向債務人收 取額外費用 12"],"a":3},{"n":158,"s":"職業道德","q":"金融從業人員辦理催收業務時，下列何者為應遵守之事項？","o":["不得違反公共利益","僅 能對債務人本人及其保證人催收","不得對非債務之第三人干擾或催討","以上皆是"],"a":3},{"n":159,"s":"職業道德","q":"下列那一項為金融從業人員辦理投資型金融商品之推介或銷售業務時，應遵守之事 項？","o":["應避免不當銷售或推介之行為","不得誤導消費者不正確之價值及理財觀念","不得使用類似大眾所熟悉之他人商標，以混淆消費者","以上皆是"],"a":3},{"n":160,"s":"職業道德","q":"金融從業人員辦理衍生性商品業務時，不應有下列何種行為？","o":["於交易契約中揭示 可能發生之風險","對客戶善盡風險告知義務","誤導客戶之情事","提醒客戶承作商 品之重要注意事項"],"a":2},{"n":161,"s":"職業道德","q":"下列關於金融從業人員辦理投資型金融商品之推介或銷售業務時，應遵守之事項何 者正確？","o":["應揭露商品的各項特性及風險","商品設計應符合客戶之風險偏好","推 介適合客戶之商品","以上皆是"],"a":3},{"n":162,"s":"職業道德","q":"金融從業人員執行業務時，應本持下列何者原則？","o":["善良管理原則","保密原則","誠信公正原則","以上皆是"],"a":3},{"n":163,"s":"職業道德","q":"下列陳述何者為金融從業人員應遵守之事項？","o":["不可利用客戶名義為自己從事交易","可利用客戶名義為自己從事交易","可利用客戶名義供他人從事交易","以上皆非"],"a":0},{"n":164,"s":"職業道德","q":"金融從業人員受理開戶時應由客戶提供應備之證件核驗，如客戶拒絕提供者，下列 何者行為是不被允許的？","o":["應予婉拒受理","仍予受理以提升業績","經確實查證 身分屬實後始予辦理","應與客戶充分溝通，請客戶配合證件核驗"],"a":1},{"n":165,"s":"職業道德","q":"金融從業人員辦理全權委託業務，為期精確銷售或推介適合客戶之商品，應廣泛了 解客戶之：","o":["家庭背景","生涯規劃","風險偏好","以上皆是"],"a":3},{"n":166,"s":"職業道德","q":"金融從業人員辦理全權委託業務，下列何者行為是不被允許的？","o":["從事足以損害委 任人權益之交易","從事逾越委任人授權範圍之交易","違反契約、內部作業規範、內 部控制等行為","以上皆是"],"a":3},{"n":167,"s":"職業道德","q":"下列所述金融從業人員辦理全權委託業務應廣泛了解客戶之事項，何者有誤？","o":["投 資需求","投資經驗","是否提供餽贈","財務狀況"],"a":2},{"n":168,"s":"職業道德","q":"有關金融從業人員辦理全權委託業務，下列敘述何者為非？","o":["對於客戶資料，沒有 保密之義務","不可誤導客戶不正確之價值及理財觀念","應充分告知客戶產品之性 質與內容","應避免不當銷售或推介之行為"],"a":0},{"n":169,"s":"職業道德","q":"辦理投資型金融商品推介或銷售業務時，應於受理前進行下列何項程序，以瞭解客 戶並幫助客戶瞭解自身投資屬性及適合商品或投資組合？","o":["請客戶填具客戶資料 表，建檔並妥為保存","瞭解客戶投資經驗及風險偏好","瞭解客戶預計投資期限及 期望報酬","以上皆是"],"a":3},{"n":170,"s":"職業道德","q":"金融從業人員遇有存戶遺忘或未及時領回銀行存摺時，應採取下列何措施？","o":["可代 客保管存摺","應即設簿登記，交指定主管人員集中保管","不發函或電告通知客戶 僅需等待洽領","以上皆非"],"a":1},{"n":171,"s":"職業道德","q":"有關金融從業人員辦理全權委託業務，下列敘述何者為非？","o":["應遵守相關法令規定","不可利用委任人之交易帳戶，為自己交易","可將委任操作契約，轉讓他人","不 可將已成交之買賣委託，由委任人名義改為其他第三人 13"],"a":2},{"n":172,"s":"職業道德","q":"客戶申辦業務檢附之文件內含瑕疵時，下列敘述何者正確？","o":["應確實檢視，審慎評 估處理方式","應視與客戶之交情決定受理與否","仍照常予辦理，並向客戶示意要 求其提供酬謝金或封口費","以上皆非"],"a":0},{"n":173,"s":"職業道德","q":"王大明是一位證券分析人員，因為在餐廳吃飯時偶然聽到日日紅公司員工的談話， 回辦公室後就把分析報告中對日日紅公司股票的建議由買進改為賣出。王大明違反 了什麼原則？","o":["保密原則","公平原則","專業原則","忠實誠信原則"],"a":2},{"n":174,"s":"職業道德","q":"金融從業人員為提供投資人良好的服務，下列敘述何者有誤？","o":["應瞭解並遵守相關 法令之規定，不得有違反或幫助他人違反法令之行為","應確實掌握客戶之資力、投 資經驗與目的，以提供適當之服務，謀求客戶之最大利益","應盡善良管理之責任及 注意，代客戶保管有價證券或其他資產","應妥慎保管客戶資料，禁止洩露機密資訊 或有不當使用之情事"],"a":2},{"n":175,"s":"職業道德","q":"金融從業人員從事全權委託投資業務，不得為下列何種行為？","o":["直接或間接提供 或接受金錢或其他利益","無故洩漏公司基金或全權委託帳戶之機密","使人誤信能 保證本金之安全或保證獲利者","以上皆是"],"a":3},{"n":176,"s":"職業道德","q":"金融從業人員從事全權委託投資業務，如發現客戶（委任人）有下列何種情形時， 應拒絕簽訂全權委託投資契約？","o":["係未成年人未有法定代理人者","受破產之宣告 未經復權者","係法人或其他機構，卻未能提出該法人或該機構出具之授權證明者","以上皆是"],"a":3},{"n":177,"s":"職業道德","q":"金融從業人員欲從事全權委託投資業務者，於簽訂全權委託投資契約前，下列敘述 何者為正確？","o":["指派專人與客戶討論，充分瞭解其資力、投資經驗、投資目的或 需求","向客戶告知相關法令限制並詳細說明全權委託投資之相關事項，並交付全權 委託投資說明書","如擬從事證券相關商品交易，應再交付客戶全權委託期貨暨選擇 權交易風險預告書","以上皆是"],"a":3},{"n":178,"s":"職業道德","q":"天心證券投資信託公司簽訂全權委託契約時，應於契約載明？","o":["負有保密義務","盡善良管理人之注意義務","對委任事務之報告義務","以上皆是"],"a":3},{"n":179,"s":"職業道德","q":"金融從業人員從事保險業務招攬時，於下列何者情形不負通知義務?","o":["為他方所知 者","為他方所不知者","已發生者","自己所知者"],"a":0},{"n":180,"s":"職業道德","q":"保險商品銷售時，下列何者應於保險商品簡介及要保書首頁之明顯處，以鮮明字體標 示？","o":["查閱公司資訊公開說明文件之方式","公司總經理","公司地址","保險費率"],"a":0},{"n":181,"s":"職業道德","q":"下列何者屬於金融從業人員招攬保險，利用其身分從事業務上的不當行為？","o":["招攬 過程對客戶有恐嚇、威脅之言語或行動，或有肢體上暴行，經查證屬實者","協助要 求醫師開立錯誤或內容不實之診斷及處置證明，或不當誘使要保人或被保險人要求 醫師開立錯誤或內容不實診斷及處置證明","未親晤客戶致未能取得保戶親簽之要 保相關文件","以上皆是"],"a":3},{"n":182,"s":"職業道德","q":"金融從業人員在從事保險招攬時應充分瞭解要保人及被保險人之事項，其內容至少 應包含？","o":["要保人及被保險人之基本資料","要保人與被保險人及被保險人與受益 人之關係","要保人及被保險人是否符合投保之條件","以上皆是"],"a":3},{"n":183,"s":"職業道德","q":"就身心障礙人士的投保需求，逕行拒絕受理、拒絕協助送件或勸退，會受到何種處 分？","o":["停止招攬 3 個月","停止招攬 6 個月","停止招攬 10 個月","停止招攬 1 年 14"],"a":0},{"n":184,"s":"職業道德","q":"金融從業人員招攬保險時不應告知要保人下列那些事項？","o":["可延欠保費","可退佣","可折讓","以上皆是"],"a":3},{"n":185,"s":"職業道德","q":"金融從業人員招攬保險業務時應告知要保人投保應注意事項，下列何者為非？","o":["要 保人親自填寫並簽章","如何逃稅","若要保人或被保險人為未成年人，需經其法定 代理人同意，並於要保書上簽章","應據實說明"],"a":1},{"n":186,"s":"職業道德","q":"金融從業人員對保險要保書的各項詢問說明，應如何要求客戶？","o":["可避重就輕","就個人隱私可不必回答","可任由其自由回答","應據實說明"],"a":3},{"n":187,"s":"職業道德","q":"金融從業人員從事保險招攬時，有誠實填寫招攬報告書的義務，下列何者為招攬報 告書應包含的內容：","o":["招攬經過","要保人及被保險人是否投保其他商業保險","家 中主要經濟來源者","以上皆是"],"a":3},{"n":188,"s":"職業道德","q":"金融從業人員有下列哪種情況之一時，不可登錄為保險業務員；如果已登錄者，所屬公 司應通知各有關公會註銷其登錄：","o":["申請登錄之文件有虛偽之記載者","曾犯偽造文書、 侵占、詐欺、背信罪，經宣告有期徒刑以上之刑確定，尚未執行完畢，或執行完畢、緩 刑期滿或赦免後尚未逾三年者","受破產之宣告，尚未復權者","以上皆是"],"a":3},{"n":189,"s":"職業道德","q":"金融從業人員為客戶解說開戶文件時，以下敘述何者正確?","o":["避免提及交易風險， 以免嚇跑客戶","必須告知相關交易流程","先請客戶簽署開戶契約，日後有機會再 向客戶詳細解說","告知客戶交易的最大風險僅限於手續費"],"a":1},{"n":190,"s":"職業道德","q":"金融從業人員在向客戶預告交易風險時，以下敘述何者正確?","o":["買空賣空交易最適 合家徒四壁的人，因為可以一夕致富","建議客戶萬一面臨追繳時，可以先以信用卡 預借現金向銀行週轉應急","告知客戶交易的最大風險僅限於手續費的損失","提醒 客戶當行情劇烈波動時，其本金有可能完全損失"],"a":3},{"n":193,"s":"職業道德","q":"金融從業人員在向客戶辦理開戶作業時，應告知下列那些事項?","o":["為 避免錯誤，接單之業務員可在電話中覆誦張三的委託內容，無誤後再填寫委託書交 付執行","成交後，由該金融服務業接單之業務員，以電話向張三進行成交回報並錄 音即可，毋須再寄送交易報告書給張三","該金融服務業應將張三之交易報告書，依 張三之電話指示交付或寄送，不必依契約約定方式進行","該金融服務業已向張三進 行成交回報及寄送交易報告書，善盡充分告知之義務，因此毋須再定期交付或寄送 對帳資料給張三，避免浪費資源"],"a":0},{"n":194,"s":"職業道德","q":"金融服務業對客戶有告知義務與通知責任，下列敘述何者正確?","o":["應對須告知及通 知事項儘速忠實告知","可自行事先與客戶約定代為處理，毋須另行通知","若主管 指示毋須告知，則不告知客戶","只告知有利於客戶之事項"],"a":0},{"n":195,"s":"職業道德","q":"金融從業人員向客戶進行顧問業務招攬行為時，下列敘述何者妥適?","o":["提供精美贈 品，勸誘客戶當場簽約及繳付顧問費用","應提供客戶合理之契約審閱期間","可向 客戶提供金融商品明確之價位預測，以博取客戶之好感，有利於日後簽訂委任契約","以某位簽約客戶最近 1 星期內獲利 20﹪之個案，作為宣傳之主要訴求 15"],"a":1},{"n":196,"s":"職業道德","q":"金融服務業於接受客戶委任簽訂全權委託契約前，下列那一事項毋須先向客戶說 明?","o":["公司之背景","每一位交易決定人員之學經歷與操作績效","某位客戶控告公 司不當運用其所存入之委任資金，一審判處公司勝訴，但客戶不服上訴，目前仍在 法院審理中","金融商品於特定價位買賣保證獲利"],"a":3},{"n":197,"s":"職業道德","q":"某金融服務業甲之交易決定人員李經理，預計於農曆年後跳槽至乙公司任職，下列 敍述何者正確?","o":["李經理通知所有委任客戶，與甲公司辦理解約，並於過完年後委 由乙公司全權處理交易事宜","李經理直接將所有委任客戶之帳務，轉交另一位交易 決定人員吳經理繼續處理","甲公司事先告知委任客戶，並由委任客戶決定是否與甲 公司解約，或同意委由其他交易決定人員繼續操作","李經理將所有委任客戶之留倉 部位予以平倉，結算損益，並靜待委任客戶決定是否解約或同意委由其他交易決定 人員繼續操作"],"a":2},{"n":198,"s":"職業道德","q":"若原服務客戶之業務員離職，但客戶仍有未完成之委託事項，則接任之業務員，何 者作為較適當?","o":["告知客戶，由其處理未完成之委託事項","不須通知客戶，自行處 理未完成之委託事項","待客戶察覺再告知，否則毋須告知","客戶察覺亦毋需告知， 以避免客戶流失"],"a":0},{"n":199,"s":"職業道德","q":"依證券投資人及期貨交易人保護法規定，證券投資人有下列何種情形，保護機構財 團法人證券投資人及期貨交易人保護中心得動用保護基金償付之？","o":["證券投資人 買賣有價證券違約交割而受有損失者","證券投資人於所委託之證券商因財務困難 失卻清償能力而違約時，其於證券交易市場買賣有價證券並已完成交割義務者","證 券投資人買賣有價證券受有損失者","證券投資人買賣有價證券因重大損失而要求 精神補償者"],"a":1},{"n":200,"s":"職業道德","q":"證券商辦理財富管理業務，為防範內線交易及利益衝突，對於辦理財富管理業務人 員之規範，下列何者為正確？","o":["不得接受客戶不合法交易","從客戶獲知其買賣某 標的商品之相關訊息，有利益衝突或不當得利之虞者，不得從事該等標的之買賣","應明確告知客戶執行財富管理業務人員之所屬部門，不得有混淆客戶之行為","以上 皆為正確"],"a":3},{"n":201,"s":"職業道德","q":"為防範利益衝突及保護營業秘密，證券商之董事、監察人及受僱人員等內部人員獲 悉承銷部門出售其包銷取得之股票或自營部門欲為買賣股票種類者，下列敘述何者 為正確？","o":["於承銷部門出售或自營部門買賣前，不得為同種類股票之買賣委託","為服務客戶，立刻將此消息告知主要客戶先為買賣同種類股票","自己或通知親朋好 友先為買賣同種類股票","立刻報告直屬主管因應處理"],"a":0},{"n":202,"s":"職業道德","q":"證券商之業務人員發現客戶的交易資料有異常時，應該如何處理？","o":["為了避免上級 責怪，自己私下改正","一方面告知主管，另一方面則與客戶做確認","與客戶確認即 可","若不影響整體作業的流程，為了避免麻煩，可以忽略它"],"a":1},{"n":203,"s":"職業道德","q":"對於證券商之業務人員執行業務而言，下列敘述何者正確？","o":["為了自己前途著想， 可以把 A 公司機密帶去 B 公司，以獲取更高的職位","只要不要太張揚，可以利用 公司未公開的資訊，以家人的戶頭投資來獲利","若遇總體經濟環境不佳等因素，使 得客戶資產的規模縮水，基於善良管理原則，仍要告知客戶","有時接受供應商的招 待，也算是一種正常的交際活動 16"],"a":2},{"n":204,"s":"職業道德","q":"證券商辦理財富管理業務，對客戶之收費應如何處理？","o":["列為公司機密","提供財 富管理服務實際收取之手續費、推介銷售商品獲取之佣金及其他名義費用向客戶充 分告知","將牌告之收費標準充分揭露","客戶有詢問時才告知大概情形"],"a":1},{"n":205,"s":"職業道德","q":"證券經紀商接受客戶委託買賣有價證券，於成交後，證券業務人員應即時回報客戶， 作成買賣報告書交付客戶，每月編製對帳單分送客戶，其主要目的為：","o":["增加公司 員工的工作內容","創造社會的工作機會","確認交易及買賣委託之完成","維持與客 戶的友好關係"],"a":2},{"n":206,"s":"職業道德","q":"金融從業人員執行事務明知有下列事項應告知客戶，何者為是？","o":["對於契約之重大 條款認知錯誤","對於業務執行之重大事項認知錯誤","對於財產管理之重大事項認 知錯誤","以上皆是"],"a":3},{"n":207,"s":"職業道德","q":"金融從業人員處理事務應盡善良管理人之注意義務，下列何者為錯誤的行為？","o":["告 知客戶投資運用之風險","告知客戶應給付相關款項及費用","未告知客戶處理業務 有利益衝突","告知客戶公司相關資料"],"a":2},{"n":208,"s":"職業道德","q":"金融從業人員處理管理運用業務如涉及有價證券之投資應揭露風險，以下何者為錯 誤的？","o":["應依產品特性揭露投資風險","屬信託財產運用範圍無須揭露風險","應於 交付客戶之公開說明書中揭露風險","應揭露業務所涉及之各類風險"],"a":1},{"n":209,"s":"職業道德","q":"金融從業人員告知客戶投資風險，以下何者為是？","o":["無須提供相關書面資料","應 代為填寫瞭解客戶作業之資料","以招攬業務必須同時說明其風險","太複雜之投資 風險無須告知"],"a":2},{"n":210,"s":"職業道德","q":"金融從業人員辦理業務，對於報酬及費用之告知，以下何者是錯誤的？","o":["無法說明之報 酬及費用，應由客戶詢問再行告知","應告知客戶各項相關報酬及費用及其收取方式","相關報酬及費用之收取應秉公平與誠信原則","辦理業務前或同時應告知客戶"],"a":0},{"n":211,"s":"職業道德","q":"金融從業人員辦理業務如需告知客戶公司相關資料，得以提供公司之相關資料為何？","o":["公司及其相關分支機構或代理機構之營業地址、聯絡電話","代表公司執行業務的人 員之姓名或職稱","代表公司可能與客戶聯繫的人員之姓名或職稱","以上皆是"],"a":3},{"n":212,"s":"職業道德","q":"金融從業人員為客戶管理運用資產應告知客戶相關資訊，以下何者為錯誤的？","o":["應 定期告知財產目錄","應將客戶之資產運用情形告知其他客戶","應定期告知財產損 益情況","應定期告知財產管理運用紀錄"],"a":1},{"n":213,"s":"職業道德","q":"金融從業人員處理管理運用業務之通知與報告義務為何？","o":["應就事務之處理情形 定期報告客戶","應依契約約定為必要之通知","應公告事項應依相關規定辦理","以 上皆是"],"a":3},{"n":214,"s":"職業道德","q":"金融從業人員以電子媒體方式與客戶聯繫業務，下列何者是錯誤的？","o":["應逐案先經 主管機關核准","應確保傳輸安全","應確保收受者確實收受聯繫之內容","應先取得 客戶同意"],"a":0},{"n":215,"s":"職業道德","q":"依法令規定應於提供客戶相關文件中揭露風險警語，下列何者無須揭露警語？","o":["行 銷文件","印鑑卡","公開說明書","投資說明書"],"a":1},{"n":216,"s":"職業道德","q":"金融從業人員與客戶簽訂契約，以下敘述何者為是？","o":["於訂約前並應先行提供契約 或文件內容予客戶閱覽","應盡合理注意使客戶於簽訂契約前有充分機會考慮條款","應就客戶所提出疑義詳細說明之","以上皆是 17"],"a":3},{"n":217,"s":"職業道德","q":"金融從業人員應提供客戶充足且必要之資訊，須告知客戶投資之風險及其所從事投 資之決定或交易過程。此為以下何項原則？","o":["資訊公開原則","能力原則","保密原 則","客觀性原則"],"a":0},{"n":218,"s":"職業道德","q":"金融從業人員應秉持下列何種原則以提供客戶充足必要之資訊，告知客戶投資之風 險及從事投資決定或交易過程之相關資訊，並向客戶快速揭露最新之資訊？","o":["專業 誠信原則","資訊公開原則","善良管理原則","守法原則"],"a":1},{"n":219,"s":"職業道德","q":"金融從業人員面臨市場競爭時，何者不是正確的表現？","o":["告知承作短期票券或債券 交易之客戶，市場利率近期之波動情形","誠實告知客戶，公司及同業之間金融商品 報價之差異","為達公司獲利目標，不擇手段欺瞞客戶所有訊息","針對客戶屬性，建 議其承作短期票券或債券之交易"],"a":2},{"n":220,"s":"職業道德","q":"何者不是身為專業金融從業人員之表現？","o":["在考量公司及自身利益下，不須告知客 戶其可能面臨之投資風險","客觀分析適合客戶屬性之投資商品","告知客戶所需之 各項商品風險與報酬","當客戶投資標的產生劇幅波動時，主動告知"],"a":0},{"n":221,"s":"職業道德","q":"若有客戶詢問某項商品資訊時，下列何者為不恰當行為？","o":["拒絕提供或隱瞞市場上 相關商品之訊息","在自身專業能力內，提供客戶該項商品之完整資訊","客觀分析 該項商品可能面臨的風險","主動積極提供相關商品之資訊"],"a":0},{"n":222,"s":"職業道德","q":"從業人員提供客戶充足必要的資訊，告知客戶投資的風險及從事投資決定或交易過 程之實質資訊等，是屬於下列何種職業道德原則？","o":["客觀原則","資訊公開原則","利益衝突原則","保密原則"],"a":1},{"n":223,"s":"職業道德","q":"有關公司之重大訊息，應：","o":["於公司未公開前提供給客戶","基於合法方式取得後提供 給客戶","於公司未公開前促使他人利用該訊息獲私利","將此訊息運用於非法用途上"],"a":1},{"n":224,"s":"職業道德","q":"從業人員接受客戶的委託後應符合資訊公開原則來提供服務，何謂資訊公開原則？","o":["提供客戶充足必要、投資可能的風險及投資決定等相關資訊","為提供最佳的服 務，可將所有的資訊均反應給客戶","將所有未公開的資訊提供給客戶作內線交易","將客戶的資料提供給相關合作廠商"],"a":0},{"n":225," "],"a":3},{"n":273,"s":"職業道德","q":"客戶李四有一筆定存 500 萬元到期，欲從事商品投資，金融從業人員應：","o":["建議李 四申購高額手續費之商品為自己賺取獎金","依李四需求，建議客戶申購適合自己的 商品","視公司本月主推商品為何，建議李四申購該商品","如這個月已達到業績目 標，勸誘李四下個月再申購"],"a":1},{"n":274,"s":"職業道德","q":"下列何者是證券商之業務人員執行業務公平對待客戶應秉持的原則？","o":["優先考慮 自己的業績","協助客戶炒作股價","應本誠實及信用原則","完全維護公司利益"],"a":2},{"n":275,"s":"職業道德","q":"證券商辦理財富管理業務，下列敘述何者為正確？","o":["係指針對高淨值客戶，透過業 務人員，依據客戶需求，提供資產配置或財務規劃等顧問諮詢或金融商品銷售業務， 以及以信託方式為客戶進行財務規劃、執行或辦理資產配置","證券商經營財富管理 業務應符合規定資格條件並經證券主管機關核准","證券商人員辦理財富管理業務， 應具備財富管理業務人員之資格條件；如涉及其他金融特許事業之規範者，其人員 之資格條件，應另依各業之規定辦理","以上皆是"],"a":3},{"n":276,"s":"職業道德","q":"證券商辦理財富管理業務，下列何者為證券商為防範內線交易及利益衝突之機制？","o":["有關業務人員直接或間接接受客戶或第三人之饋贈應訂定規範標準或管理措施","辦理財富管理業務之人員，不得接受客戶不合法交易，從客戶獲知其買賣某標的 商品之相關訊息，有利益衝突或不當得利之虞者，不得從事該等標的之買賣","加強 控管辦理財富管理業務之人員，不得與客戶約定分享利益或承擔損失，直接或間接 要求、期約或收受不當之金錢、財物或其他利益，致影響其專業判斷與職務執行之 客觀性","以上皆是"],"a":3},{"n":277,"s":"職業道德","q":"證券商辦理財富管理業務推廣時，下列敘述何者為正確？","o":["加強對客戶宣導金融常識， 提升客戶風險辨識能力，俾利建立正確理財觀念","證券商宜採防止財富管理業務人員 收受佣金回扣，或接受招待等不當利益之措施","證券商宜採防止財富管理業務人員未 經客戶授權，擅自為客戶進行交易，或私自挪用客戶款項之措施","以上皆是 22"],"a":3},{"n":278,"s":"職業道德","q":"對於證券商之業務人員而言，下列敘述何者正確？","o":["由於獲悉某上市公司內部未公 開訊息，然受限於在證券商上班，因此，只能利用人頭戶來買賣該公司股票以獲取 利益","對於客戶資產帳面價值的增減，為了不讓客戶壓力太大，善意的謊言是必要 的","若客戶答應，除了公司契約外，私下亦可與客戶另訂一份","以上皆非"],"a":3},{"n":279,"s":"職業道德","q":"證券商之業務人員執行業務應本誠實及信用原則，下列何者為其本於職業道德而不 得有之行為？","o":["辦理受託買賣有價證券時，有隱瞞、詐欺或其他足以致人誤信之行 為","以他人或親屬名義供客戶申購、買賣有價證券","接受客戶委託買賣有價證券 時，同時以自己之計算為買入或賣出之相對行為","以上皆是"],"a":0},{"n":280,"s":"職業道德","q":"一個具有誠信的證券商及其從業人員，其基本該遵守的行為規範為何？","o":["服務誠信","財務與公司的紀錄誠信","善盡保密之責","以上皆是"],"a":3},{"n":281,"s":"職業道德","q":"對證券商及其業務人員而言，下列何者屬於「正當利益」？","o":["佣金收入","私下收受 一袋的黃金","私下收受供應商的回扣","與客戶間私下簽約的利益"],"a":0},{"n":282,"s":"職業道德","q":"為促進證券業遵循法規及落實金融消費者保護，下列何者為證券業及其業務人員向 客戶提供衍生性金融商品交易服務公平對待客戶應秉持之原則？","o":["應以善良管理 人之注意義務及忠實義務，本誠實信用原則為之","客戶為自己的親朋好友，因此釋 放出未公開資訊供其投資參考","對於與法律相關的文件，為保護客戶予以銷毀及竄 改","為服務及保護客戶，提供客戶經過美化的績效報告"],"a":0},{"n":283,"s":"職業道德","q":"證券商之業務人員執行業務應本誠實及信用原則，下列何者為其本於職業道德而不 得有之行為？","o":["以職務上所知悉之消息，從事上市或上櫃有價證券買賣之交易活動","利用客戶名義或帳戶買賣有價證券","洩漏客戶委託事項及其他職務上所獲悉之 秘密","以上皆是"],"a":3},{"n":284,"s":"職業道德","q":"證券商之業務人員執行業務應本誠實及信用原則下列敘述，何者為正確？","o":["考量客 戶的身體不好，當管理資產發生減損時，選擇不告知","為了獲取更高利益，可以私 下與客戶訂立契約","對客戶作贏利之保證或分享利益之證券買賣","受理辦妥受託 契約之客戶買賣有價證券"],"a":3},{"n":285,"s":"職業道德","q":"證券商之業務人員執行業務應本誠實及信用原則，下列何者為其本於職業道德而不得有 之行為？","o":["依據法令規定執行業務","招攬、媒介、促銷未經核准之有價證券或其衍生 性商品","依據客戶委託事項及條件，執行有價證券之買賣","受理客戶本人開戶"],"a":1},{"n":286,"s":"職業道德","q":"證券商之業務人員執行業務應本誠實及信用原則，下列何者為其本於職業道德而不 得有之行為？","o":["挪用或代客戶保管有價證券、款項、印鑑或存摺","向不特定多數人 推介買賣特定之股票","利用客戶名義或帳戶買賣有價證券","以上皆是"],"a":3},{"n":287,"s":"職業道德","q":"金融從業人員應忠實執行業務，以下何種行為是錯誤的？","o":["不得因執行業務而享有 個人不當利益","故意設計交易行為以掩飾利害關係人交易","不得對客戶有虛偽、 詐欺行為","不得對客戶有足致客戶誤信之行為"],"a":1},{"n":288,"s":"職業道德","q":"金融從業人員從事信託業務，以下何種行為是錯誤的?","o":["具運用決定權人，如有不 法之利益時，應拒絕投資運用","提供客戶內線交易訊息","明知不適當之投資，不得 故意建議客戶投資","有不法利益，不得故意建議客戶進行交易"],"a":1},{"n":289,"s":"職業道德","q":"金融從業人員為客戶管理運用財產，管理運用之利益應如何處理？","o":["不得以任何名 義享有利益","得與他人交換而享有利益","得與客戶以代付差旅費方式分享利益","得與客戶約定收益共享或損失分擔 23"],"a":0},{"n":290,"s":"職業道德","q":"金融從業人員執行業務，以下何種行為是正確的？","o":["有偽造之行為","有詐欺之行 為","有足致客戶誤信之行為","應秉忠實信用原則處理事務"],"a":3},{"n":291,"s":"職業道德","q":"金融從業人員不得有下列何者足致客戶誤信之行為？","o":["偽造相關文件","故意誤導 客戶所投資運用標的之風險","故意誤導客戶收取之費用及其付款方式","以上皆是"],"a":3},{"n":292,"s":"職業道德","q":"金融從業人員執行業務何種行為符合誠實原則？","o":["對於客戶未來投資報酬，故意提 供不適當之預測","誤導客戶可能之績效","對所投資產品之價值正確詳實記錄","誤 導客戶所投資運用標的之風險"],"a":2},{"n":293,"s":"職業道德","q":"以下敘述何者為非？","o":["信託關係是高度信賴關係，客戶辦理業務首重公司信用","委託投資關係有賴客戶對公司管理資產能力之肯定","辦理業務應先爭取業績，無須 告訴客戶相關風險","辦理業務應維護消費者權益"],"a":2},{"n":294,"s":"職業道德","q":"應以誠信之態度提供專業服務，誠信係由誠實與公正所組合，不能附屬於個人利益， 以上敘述屬於何項原則？","o":["資訊公開原則","誠信原則","客觀性原則","能力原則"],"a":1},{"n":295,"s":"職業道德","q":"金融從業人員對不當利益應：","o":["可接受招待","不可收現金，有價證券則不限","不 得接受","可收禮品"],"a":2},{"n":296,"s":"職業道德","q":"金融服務業稽核人員得兼任下列何種職務？","o":["銀行存款櫃檯人員","證券商債券交 易員","保險公司核保人員","以上皆非"],"a":3},{"n":297,"s":"職業道德","q":"下列何者為正當行為？","o":["利用本公司或個人名義與客戶間有款券借貸關係或挪用 情事、為款券借貸之媒介","代理客戶保管存摺、印鑑或有價證券","未經核准，不得 全權代理客戶買賣有價證券","利用為客戶操作金融商品之便，為自身利益作價"],"a":2},{"n":298,"s":"職業道德","q":"下列何者為金融從業人員應有之行為？","o":["私自從事未經主管機關核准之業務","故 意隱瞞有重大喪失債信情事","隱匿尚有未執行完畢之刑事責任","不得私自於同業 兼任相關職務"],"a":3},{"n":299,"s":"職業道德","q":"金融從業人員不得有下列何種行為？","o":["參加專業證照之考試以提昇自身素質","配 合政府金融政策，促進經濟發展，善盡社會責任","利用客戶名義或帳戶，為自己從 事交易","以上皆是"],"a":2},{"n":300,"s":"職業道德","q":"金融從業人員與客戶間之往來：","o":["不得接受禮品或收取任何有價值物品","可收禮 品","可收現金","可收現金及禮品"],"a":0},{"n":302,"s":"職業道德","q":"金融從業人員應遵守忠實義務原則，故：","o":["仍可從事內線交易","禁止短線交易，禁 止不當得利","應與客戶發生衝突","不一定要遵守法規"],"a":1},{"n":303,"s":"職業道德","q":"金融機構對交易對手承諾事項負有進行交易之義務，係基於下列何種原則？","o":["專業 原則","保密原則","忠實誠信原則","管理謹慎原則"],"a":2},{"n":304,"s":"職業道德","q":"對公司有控制能力之法人股東，應訂定相關之執行職務守則以為遵循，此為擔任董事、 監察人之何種義務？","o":["忠實與注意義務","保密義務","善良管理義務","守法義務"],"a":0},{"n":305,"s":"職業道德","q":"對公司有控制能力之法人股東或其代表人，於參加股東會應本於何項原則，行使其 投票權？","o":["誠信原則","能力原則","善良管理原則","守法原則 24"],"a":0},{"n":306,"s":"職業道德","q":"金融從業人員應遵守善良管理原則，故應盡善良管理人之責任及注意義務。以下何 者為是？","o":["不管客戶風險","不提供客戶服務","對客戶說謊","為客戶適度分散風 險，並提供最佳之專業服務"],"a":3},{"n":307,"s":"職業道德","q":"身為金融從業人員應保持尊嚴，不得有玷辱職業信譽之任何行為，且與委託人間應 有之約定，應如何應對？","o":["可以違反","視情況違反","不得違反","以上皆非"],"a":2},{"n":308,"s":"職業道德","q":"下列何者係金融從業人員秉持誠實信用原則之行為？","o":["假借銀行存款名義招攬保 險","以高預定利率作不實比較，誘使消費者抱持錯誤認知而購買保險","不以單獨 強調或與其他金融商品比較之方式誤導消費者","以上皆是"],"a":2},{"n":309,"s":"職業道德","q":"客戶將資產委託給金融從業人員從事投資，身為一位優秀的金融從業人員，應為公 司及客戶盡何種責任及義務？","o":["善良管理人之責任及注意義務","提供內線交易","隨時透露客戶財產狀況給其他人","以上皆非"],"a":0},{"n":310,"s":"職業道德","q":"關於金融從業人員執行業務時，下列敍述何者正確？","o":["勸誘客戶解約他公司之商品","將他公司之商品作不公平之比較","不散播不實言論及文宣","販售非經主管機關 核准之商品"],"a":2},{"n":311,"s":"職業道德","q":"金融從業人員若有代為收付金錢之行為者應遵守下列何項行為規範？","o":["收現但轉 以自己之支票付款","收到客戶款項應馬上歸繳公司","收到隔幾天再給公司","存於 自己帳戶再處理"],"a":1},{"n":312,"s":"職業道德","q":"金融從業人員銷售無形的金融商品，因商品無樣品可試用，必須透過從業人員說明，下 列敘述何者為非？","o":["對商品內容應多做說明使客戶了解","應遵守誠實信用原則","商品 已售出，可以不必再理會客戶","不斷地充實本身的專業知識，提供更好的服務"],"a":2},{"n":313,"s":"職業道德","q":"有關忠實義務原則下列何者正確？","o":["客戶利益優先","衝突避免、禁止短線交易","禁止不當得利、公平處理","以上皆是"],"a":3},{"n":314,"s":"職業道德","q":"金融從業人員對於公司之相關資產，不應採取何種態度？","o":["以非法手段取得後成為 私人財產","使用於正當目的","無論有形或無形資產皆有責任加以保護","不得疏忽 大意或浪費"],"a":0},{"n":315,"s":"職業道德","q":"金融從業人員在銷售金融商品時，應對銷售之商品詳細說明，不得為業績而隱藏不 告知金融商品應有之風險，係屬何種原則？","o":["誠實信用原則","內線交易原則","服 務原則","善良風俗原則"],"a":0},{"n":316,"s":"職業道德","q":"金融從業人員基於招攬業務時，應秉持誠實信用原則，下列行為何者不屬誠實信用 原則？","o":["客戶對商品有不懂之處應再仔細說明","商品一旦售出，即使客戶對商品 內容有疑問也置之不理","客戶交給我們的資料，不可隨意散播","以上皆是"],"a":1},{"n":317,"s":"職業道德","q":"金融從業人員對於客戶資料，不應有下列何種行為？","o":["妥為保管","不得出售","應 有保密之義務","提供同業參考"],"a":3},{"n":318,"s":"職業道德","q":"信用卡發卡機構應約束業務代表不得從事下列行為？","o":["故意毀損同業之申請書架","故意破壞同業之各項宣傳品","洩露信用卡申請人之個人資料","以上皆是"],"a":3},{"n":319,"s":"職業道德","q":"金融機構登載及製播廣告，不得有下列何款行為？","o":["損害同業信譽之廣告","使用 類似大眾所熟悉之他人商標，以混淆消費者","誤導消費者不正確之價值及理財觀念","以上皆是 25"],"a":3},{"n":320,"s":"職業道德","q":"金融從業人員對於客戶資料處理方式，以下何者為非？","o":["不得對外任加討論","不 得任意對外發表","得對無權過問之同仁洩漏","不得擅自利用客戶資料為自己進行 交易而謀取利益"],"a":2},{"n":321,"s":"職業道德","q":"金融從業人員得以何種名義，向顧客收受不當佣金、酬金？","o":["個人","經理","主管 機關","以上皆非"],"a":3},{"n":322,"s":"職業道德","q":"金融從業人員不宜參與下列行為或交易？","o":["利用短線操作參與投機性之證券交易","與 其他非個人財力所及之有關投機性之交易","藉親友之名義從事交易","以上皆是"],"a":3},{"n":323,"s":"職業道德","q":"金融從業人員應依何項考量辦理徵信？","o":["誠信公正原則","個人好惡","公司規模大 小","政商關係良好與否"],"a":0},{"n":324,"s":"職業道德","q":"金融從業人員辦理全權委託業務應遵守事項，下列敘述何者為非？","o":["得向顧客收受 不當佣金、酬金","應避免不當銷售或推介之行為","不得向他人出售、洩漏客戶資料","應遵守相關法令規定"],"a":0},{"n":325,"s":"職業道德","q":"金融從業人員應尊重消費者合法權益，當其權益受到侵害時，應如何處理？","o":["不予受理","請客戶自行負擔損失","秉誠信原則妥適處理","應視與客戶之交情決定受理與否"],"a":2},{"n":326,"s":"職業道德","q":"金融從業人員辦理授信業務，以下敘述何者正確？","o":["與客戶洽談應保持懇切之態度","應本平等互惠及誠信公平原則","將有關約定事項載明於書面，並讓客戶充分瞭 解","以上皆是"],"a":3},{"n":327,"s":"職業道德","q":"金融從業人員在向客戶推介或銷售金融商品時，以下敘述何者有誤？","o":["不得委託無 相關金融證照之人員從事之","應審酌客戶年齡等情況予以推介或銷售適當之金融 商品","善盡充分告知投資風險內容之職責","為賺取佣金，儘量勸誘客戶於短期間 內，以多次贖回、再申購金融商品之方式"],"a":3},{"n":328,"s":"職業道德","q":"信用卡發卡機構辦理催收欠款業務時，以下敘述何者正確？","o":["不得違反公共利益","不得以損害他人為主要目的","應依誠實及信用原則行使權利","以上皆是"],"a":3},{"n":329,"s":"職業道德","q":"信用卡發卡機構對於信用卡業務需要所登載及製播廣告，應遵守下列何者事項？","o":["避免造成消費者有不當擴張個人信用之價值觀","必須依據法令規範確實登載規定 警語","必須充分揭露費用及利率","以上皆是"],"a":3},{"n":330,"s":"職業道德","q":"金融從業人員於推介或銷售投資型金融商品時，應依下列原則辦理？","o":["應本最大誠 信及充分揭露原則","不得藉主管機關對金融商品之核准、核備或備查，而使消費者 認為政府已對該金融商品提供保證","不得對於過去之業績作誇大不實之宣傳，或對 同業為攻訐之廣告","以上皆是"],"a":3},{"n":331,"s":"職業道德","q":"投信投顧從業人員為廣告、公開說明會及其他營業促銷活動時，不得有下列何種行 為?","o":["藉主管機關對某項產品或業務之核准，作為證實該申請事項或誤導投資人認 為主管 "僅得擇一擔任，以避免利益衝突","依其個人意願"],"a":2},{"n":346,"s":"職業道德","q":"金融從業人員同時兼有保險代理人、經紀人資格者，是否可同時申請二者執業證 書？","o":["可以","為避免利益衝突，僅得擇一","視情況而定","依其個人意願 27"],"a":1},{"n":347,"s":"職業道德","q":"金融從業人員為公司內部人員執行證券期貨經紀業務時，為避免利益衝突：","o":["應優 先執行公司內部人員之委託","應依公司內部人員及客戶委託時間之先後順序執行","應依委託金額多寡決定執行順序","應由金融從業人員自行決定"],"a":1},{"n":348,"s":"職業道德","q":"張三因職務得知公司即將與某公司合併為一則大利多消息，下列何種行為較適當：","o":["利用他人名義大筆買進公司股票","私下告知客戶該項訊息，使其蒙利","以配偶 名義大筆買進公司股票","在消息未公開前或公開後 18 小時內，不得自行或以他人 名義買入公司股票"],"a":3},{"n":349,"s":"職業道德","q":"金融服務機構之自營部門與經紀業務部門：","o":["應個別獨立作業，且業務資訊不可互 為流用","不須個別獨立作業，惟業務資訊不可互為流用","應個別獨立作業，惟業務 資訊可互為流用","不須個別獨立作業，且業務資訊可互為流用"],"a":0},{"n":350,"s":"職業道德","q":"當金融從業人員張三的客戶在未告知其不滿的情況下，轉向李四交易時，張三應：","o":["醜化客戶，告訴李四，該客戶是位麻煩人物","聯合其他同事排擠李四，讓李四離 職","試圖了解原因並虛心改進，以提升服務品質","醜化李四，向主管告狀，宣稱李 四行為惡劣"],"a":2},{"n":351,"s":"職業道德","q":"金融從業人員張三這個月的業績只差 500 萬元就達到業績目標，為能達到門檻領到 目標獎金，張三應採用下列何種方式較為適當：","o":["勸誘客戶李四申購商品並保證獲 利","商請另一位從業人員轉單給自己，約定獎金分享","借用客戶名義申購商品，領 到獎金再贖回","積極拓展業務、爭取客戶，以達到業績目標"],"a":3},{"n":352,"s":"職業道德","q":"金融從業人員因職務關係獲悉足以影響金融商品價格未公開之重大消息時：","o":["應即 以書面報告並列管保密","應廣為眾知，造福親朋好友","應立即為客戶交易，牟取其 最大利益","應立即利用他人名義交易，牟取個人最大利益"],"a":0},{"n":353,"s":"職業道德","q":"金融從業人員執行業務時，下列敘述何者不當?","o":["應善加利用職務所得訊息，為本 身牟取利益","不以職務所得訊息，為本身牟取利益","應以客戶利益優先，不以個人 業績為考量","不以本身利益仲介客戶從事非法交易"],"a":0},{"n":355,"s":"職業道德","q":"金融從業人員獲悉已影響相關客戶利益之訊息時：","o":["依客戶之重要性決定是否通知","依與客戶之交情決定是否通知","不須做任何處理","應盡可能公平合理的通知每 一位客戶"],"a":3},{"n":356,"s":"職業道德","q":"下列何者不是金融服務事業之從業人員關於職業道德的基本條件？","o":["法令規章 遵循","專業之資格、技能、態度、與服務","擅長交際應酬","品德、誠信、責任、 與保密"],"a":2},{"n":357,"s":"職業道德","q":"若發生金融服務業之業務人員對其與客戶之利益衝突或不同客戶間之利益衝突情 事時，應如何處理：","o":["以個別客戶對公司之貢獻度為依據","以契約約定為依據","以多數客戶之利益為依據","以損益標準為處理原則"],"a":1},{"n":358,"s":"職業道德","q":"金融服務業之業務人員面對本身業績與公司規定衝突時，應該如何面對？","o":["為了本 身業績考量，可以忽略它","以公司的規定為主","先把公司提供的金融商品或服務 銷售出去，再向上級反應","以上皆非 28"],"a":1},{"n":359,"s":"職業道德","q":"在證券業所提供的業務服務過程中，下列那種情事不屬於利益衝突的範圍？","o":["符合 法令之受託買賣上市櫃股票交易","提供給客戶之金融商品或服務，與公司有直接或 間接之不合規利益","未經公司同意，擅自雇用自己的親友在公司任職","未依公司 規定在外自行開業或兼任其他職務"],"a":0},{"n":360,"s":"職業道德","q":"防止利益衝突是從事金融服務業職業道 ":"金融從業人員對於經手業務所得知之客戶訊息，應抱持如何態度始屬適當？","o":["可在 市場上交換獲取利益","反正我不洩露，別人也會洩露","本於職業道德，應予維護","視狀況而定"],"a":2},{"n":420,"s":"職業道德","q":"金融從業人員基於保密原則：","o":["應注意對帳單寄送時客戶資料之隱密性，以保障客 戶權益","以電子郵件方式寄對帳單者，應比照網路交易認證機制，透過憑證機構之 資料加密等功能，始得傳送予客戶","非依法令所為之查詢，不得洩露客戶委任事項 及其他業務上所獲悉之秘密","以上皆是"],"a":3},{"n":421,"s":"職業道德","q":"金融服務業如經客戶同意以電子郵件方式寄送對帳單者：","o":["應比照網路交易認證機 制，須透過憑證機構之資料加密等功能，始得傳送予期貨交易人","經客戶同意，不 需網路交易認證機制，只需有客戶電子郵件信箱即可寄送","電子郵件寄送方式，只 要能取得客戶的電子郵件閱讀回條，即可不需網路交易認證機制","為預防電腦駭客 取得客戶資料，不可以電子郵件方式寄送對帳單"],"a":0},{"n":422,"s":"職業道德","q":"金融服務事業基於金控共同行銷策略：","o":["不須經客戶同意，可將客戶之基本資料、 財務資料相互利用","必須經客戶同意，方可將客戶之基本資料、財務資料相互利用","若未經客戶同意，僅可將客戶之基本資料相互流利用，財務資料不可利用","若未 經客戶同意，僅可將其客戶之財務資料相互流利用，基本資料不可利用"],"a":1},{"n":423,"s":"職業道德","q":"對於客戶之申訴或檢舉案件，下列敘述何者適當?","o":["以積極主動的態度面對及妥善 處理","對於申訴或檢舉人之姓名、地址須予以保密","以言詞提出申訴或檢舉之案 件，應留存談話紀錄","以上皆是 33"],"a":3},{"n":424,"s":"職業道德","q":"對於金融從業人員應有之態度，下列敘述何者正確?","o":["應妥慎保管客戶資料，除依 法令所為之查詢外，不得洩露客戶委託事項","不得利用職務之便，洩露或利用公司 及客戶之資料圖利","不得利用或竊用他人電子帳號及密碼，為任何業務或非業務行 為","以上皆是"],"a":3},{"n":425,"s":"職業道德","q":"當金融從業人員知悉客戶未經授權利用他人名義從事商品交易時：","o":["應接受其委託 並為其保守秘密","在客戶承諾補具授權書的情況下，先接受其委託進行交易","拒 絕接受其委託進行交易","可有條件地接受其委託進行交易"],"a":2},{"n":426,"s":"職業道德","q":"金融服務業寄送客戶買賣報告書時，何者敘述適當?","o":["基於保密，應依約定方式交 付客戶本人","基於保密，一律由客戶親至公司領取","可由業務員代領","以上皆非"],"a":0},{"n":427,"s":"職業道德","q":"金融服務業對於其客戶個人資料之處理方式，何者敘述有誤?","o":["依照個人資料保護 法辦理","可放置公開場所，以便其他同仁隨時連絡服務","須經客戶同意，方可將客 戶之基本資料、財務資料通用","資訊人員應對客戶資料具保密之義務"],"a":1},{"n":428,"s":"職業道德","q":"金融從業人員應本保密原則，忠實執行業務，何者敘述有誤?","o":["可提供客戶委託之 事項予依法進行調查之主管機關或檢調單位","如經客戶同意，可將客戶之基本資 料、財務資料互為通用","可為了保護個人隱私，以非真實姓名從事金融商品交易分 析","未能出示身分證明文件者，可拒絕就其個人資料申請查詢"],"a":2},{"n":429,"s":"職業道德","q":"金融服務業之委任客戶 A 君之配偶，若未經授權要求提供 A 君之買賣報告書供其 參考：","o":["不可提供 A 君之買賣報告書給其配偶","可提供 A 君之買賣報告書給其配 偶","需 A 君之配偶填寫申請書並簽名才可以提供","僅能陪同 A 君之配偶現場閱覽"],"a":0},{"n":430,"s":"職業道德","q":"下列何者不是金融服務業之從業人員必須禁止的行為？","o":["交付給客戶公司未公佈的財 報","交付給客戶公司依法已公開的資訊","交付給客戶公司的商業機密","以上皆非"],"a":1},{"n":431,"s":"職業道德","q":"基於職務的關係而獲得的客戶資料，金融服務業之從業人員應該如何做才正確？","o":["由於大環境不佳，基於自己未來生活著想，可以將客戶資料轉賣給別人","必須忠 於保密原則，絕不對外洩露","隨意丟棄，不整理","以上皆是"],"a":1},{"n":432,"s":"職業道德","q":"證券商基於防制洗錢及打擊資恐目的，需要持續監控客戶之帳戶及其交易，下列何 者屬於疑似洗錢、資恐或武擴客戶帳戶類的交易態樣？","o":["無正當理由開立多個帳 戶，且實質受益人為同一人者","客戶係屬重要政治性職務人員，但意圖規避正確且 完整的填寫申請表格，或未充分說明其資金或有價證券之來源正當性者","以不同公 司名義但皆有相同之法定代表人或有權簽署人，開立數個帳戶者","以上皆是"],"a":3},{"n":433,"s":"職業道德","q":"證券商之從業人員，如發現公司內部有違反法令規章或職業道德之情事時，下列何 者是最好的作法？","o":["與自己沒有利害關係，假裝沒有看到","私下告訴同業的朋友","立刻向公司總經理或董事長或其他適當人員呈報","直接向檢調機關檢舉"],"a":2},{"n":434,"s":"職業道德","q":"證券商基於防制洗錢及打擊資恐目的，需要持續監控客戶之帳戶及其交易，下列何 者屬於疑似洗錢、資恐或武擴交易類的交易態樣？","o":["新開戶或一定期間內無交易之 帳戶突然大額交易者","客戶突然大額匯入或買賣冷門、小型或財務業務不佳之有價 證券，且無合理原因者","無正當理由短期內連續大量買賣特定股票者","以上皆是"],"a":3},{"n":435,"s":"職業道德","q":"有關證券商管理相關法令對保密及不得為之行為規範，誰應該遵守？","o":["證券商之負 責人","證券商之業務人員","證券商本身","以上皆是 34"],"a":3},{"n":436,"s":"職業道德","q":"下列何者屬於證券商的商業機密，身為公司的員工，不可對第三者透露？","o":["客戶及 其買賣交易證券的相關資料","公司名稱、營業處所、聯絡電話、電子郵件信箱等資 料","公司官方網站提供的資訊","以上皆是"],"a":0},{"n":437,"s":"職業道德","q":"關於證券之從業人員職業道德行為之保密規範，下列敘述何者為非？","o":["未經主管機 關同意，不得對執行職務無關之人洩漏主管機關金融檢查報告","出席公司股東會領 取該公司議事手冊或年報","不得洩漏或交付依洗錢防制法規定向法務部調查局申 報疑似洗錢交易案件相關資料","證券商對於非應依法令所為之查詢，不得洩漏客戶 委託事項及其他業務上所獲悉之秘密"],"a":1},{"n":438,"s":"職業道德","q":"金融從業人員辦理業務應予保密，下列何者為非?","o":["客戶資料","商品機密","公司業 務機密","業務簡介"],"a":3},{"n":439,"s":"職業道德","q":"金融從業人員辦理業務對客戶資料之保密，以下何者為非？","o":["客戶基本資料無須保密","客戶帳務資料應予保密","客戶信用資料應予保密","客戶投資及保險資料應予保密"],"a":0},{"n":440,"s":"職業道德","q":"為保護客戶資料，以下措施何者是錯誤的？","o":["應使用安全的軟硬體設備以安全傳輸","應建立防火牆機制防止非法存取","應限制客戶登錄公司網站","應依業務權責限 制使用資料人員"],"a":2},{"n":442,"s":"職業道德","q":"從事電話行銷行為時，應主動提供下列何訊息讓受話人知悉?","o":["所屬公司名稱","發 話人可供識別的代碼及姓氏","發話目的","以上皆應提供"],"a":3},{"n":443,"s":"職業道德","q":"金融從業人員使用公司機密文件，以下何者有誤？","o":["如非必要應儘量免用或減少副 本","機密文書誤繕誤印之廢紙應予回收再利用","非經權責主管人員核准，不得攜 出辦公處所","會議使用之機密資料，會議結束應當場收回"],"a":1},{"n":444,"s":"職業道德","q":"金融從業人員受託管理客戶財產時應注意保密事項，以下何者是錯誤的？","o":["管理決 策執行過程應保守秘密","受託交易之執行應保守秘密","受託操作績效佳之交易決 策應供自營部位參考","管理決策與交易之執行嚴禁洩露或不當使用"],"a":2},{"n":445,"s":"職業道德","q":"公司委任第三人處理相關事務，受任第三人應注意下列保密事項，何者為錯誤？","o":["客戶資料得提供關係企業促銷業務","客戶資料不得外洩","客戶資料不得不當利用","客戶資料之使用應建立內部控制機制"],"a":0},{"n":446,"s":"職業道德","q":"以下所述有關客戶資訊之使用，何者是錯誤的？","o":["於公司 ","q":"保險契約簽訂後，契約雙方應遵守規範下列何者正確？","o":["遵守簽訂條件和條款","切實履行各自的義務和責任","明確被保險人利益受到法律保護","以上皆是"],"a":3},{"n":482,"s":"職業道德","q":"無行為能力或限制行為能力之人申請登錄保險業務員下列處理何者正確？","o":["可予 登錄","不予登錄","經特准可予登錄","可自由決定登錄"],"a":1},{"n":483,"s":"職業道德","q":"有重大喪失債信情事尚未了結或了結後尚未逾三年之已登錄保險業務員，應作何處 置？","o":["維持登錄","若申請登錄，應不予登錄；已登錄者，所屬公司應通知各有關公 會註銷登錄","撤銷或維持登錄均可","經允許可維持登錄"],"a":1},{"n":484,"s":"職業道德","q":"金融從業人員銷售保險商品之招攬廣告，除應遵守相關法令外，並應遵守什麼規 定？","o":["商場守則","商場資訊","保險業相關自律規範","以上皆是"],"a":2},{"n":485,"s":"職業道德","q":"下列有關金融從業人員從事保險招攬所用的文宣、廣告、簡介、商品說明書及建議 書等文書，何者為是？","o":["應標明所屬公司之名稱","內容應與保險公司報經主管機 關審查通過之保險單條款、費率及要保書等文件相符","經所屬公司核可同意使用， 其內容並應符合主管機關訂定之資訊揭露規範","以上皆是"],"a":3},{"n":486,"s":"職業道德","q":"金融從業人員從事保險業務招攬，主張損害補償原則，主要理由為何？","o":["預防道德 危險發生","預防損害發生","預防不當得利發生","以上皆是"],"a":2},{"n":487,"s":"職業道德","q":"金融服務業及其受僱人員不得有下列何者行為?","o":["違反法令或相關規章之情事","違反公司內部規定之情事","破壞同業和諧及公共利益之情事","以上皆是"],"a":3},{"n":488,"s":"職業道德","q":"金融從業人員於執行業務時，下列敘述何者正確?","o":["不得同意或默許他人使用自己 之名義執行業務","經主管要求，得同意他人使用自己之名義執行業務","為公司業 績考量，得默許他人使用自己之名義執行業務","未考取執照前，得借用其他業務員 名義執行業務"],"a":0},{"n":493,"s":"職業道德","q":"金融從業人員為了吸引並留住客戶：","o":["未完成開戶手續者","經評估逾越其交易能力而無法提供適當擔保者","不適合該金 融商品交易者","以上皆是"],"a":3},{"n":494,"s":"職業道德","q":"金融從業人員應確實遵守法令規範，如有觸法經主管機關發函要求暫停職務者，則 下列行為何者適當?","o":["為不影響客戶權益，照常執行業務","依法暫停執行業務並自 我改進","借用其他業務人員之名義執行業務","以未收到發函為藉口，拒絕暫停執 行業務 38"],"a":1},{"n":495,"s":"職業道德","q":"金融從業人員於執行工作時，如發現其他人員有不法情事，何者敘述適當?","o":["應通 報內部權責單位處理","基於保密原則，假裝若無其事","當機立斷，直接請其改正","與其交換條件，牟取自身利益"],"a":0},{"n":496,"s":"職業道德","q":"從事證券及金融相關專門職業，有那些特性 ?","o":["維持高度職業倫理道德的承諾","強制性再教育訓練的專業要求","利他主義態度的普及","以上皆是"],"a":3},{"n":497,"s":"職業道德","q":"對於一個證券或金融從業人員而言，下列何者為最重要的因素？","o":["服裝儀容","職 業道德","人脈","家世背景"],"a":1},{"n":498,"s":"職業道德","q":"證券商之業務人執行務應本誠實及信用原則，下列何者是其本於職業道德而不得有 之行為？","o":["約定與客戶共同承擔買賣有價證券之交易損失，而從事證券買賣","對 於客戶買賣證券之委託成交立刻回報","客戶開戶時必須向客戶說明契約內容的重 要事項","以公司及業務人員之名義接受客戶委託買賣證券"],"a":0},{"n":499,"s":"職業道德","q":"下列何者為證券主管機關對於證券商負責人與業務人員管理的規範事項？","o":["證券 商之業務人員應參加證券主管機關或其指定機構辦理之職前訓練與在職訓練","禁 止證券商負責人與業務人員利用職務之機會，從事虛偽、詐欺或其他足致他人誤信 之活動","執行業務之人員應符合主管機關規定之資格條件","以上皆是"],"a":3},{"n":500,"s":"職業道德","q":"為促進證券業遵守法規及落實金融消費者保護，證券商業務人銷售衍生性金融商品 不得有下列何者行為？","o":["與客戶約定分享利益或承擔損失，直接或間接要求、期約 或收受不當之金錢、財物或其他利益","擅自修改或製作相關標準文件交付予客戶","擅自為客戶進行交易，或私自挪用客戶款項","以上皆是"],"a":3},{"n":501,"s":"職業道德","q":"下列何者是證券商訂定衍生性金融商品銷售人員之行為與操守準則應包含之事 項?","o":["不得與客戶約定投資收益分享或損失分攤之承諾","規範禁止收受或提供不 當報酬或饋贈","不得以任何方式向客戶提供建議買賣訊息","以上皆是"],"a":3},{"n":502,"s":"職業道德","q":"為促進證券業遵循法規及落實金融消費者保護之公平對待客戶原則，證券商從事結 構型商品之銷售或提供相關資訊及行銷文件不得有下列何種情形？","o":["使人誤信能 保證本金之安全或保證獲利","提供贈品或以其他利益勸誘他人購買結構型商品","誇大過去之業績或攻訐同業之陳述","以上皆是"],"a":3},{"n":503,"s":"職業道德","q":"下列何者是證券商及其從業人員執行業務關於職業道德的行為規範？","o":["對客戶提 供金融商品與服務應注意誠信與公平交易","保護並適當使用公司資產","執行業務 必須遵循法令規章","以上皆是"],"a":3},{"n":504,"s":"職業道德","q":"下列何者不是證券商及其從業人員執行業務關於職業道德的行為規範？","o":["執行業 務避免利益衝突","下班後與親朋好友或同學餐敘","不洩露公司及客戶的機密資料","遵照法令及公司管理規章的規定執行業務"],"a":1},{"n":505,"s":"職業道德","q":"下列關於職業道德的敘述何者為正確？","o":["消極的職業道德指的是，若有社會大眾或 同事監督時能履行職業道德，無人監督或個人獨自承擔工作任務時就放鬆對自己職 業道德的約束","被動地遵從職業道德，指的是在客觀行為人的思想深處或個人意識 中有職業道德的約束，能夠在關鍵時候體現職業道德精神","主動地遵從職業道德， 將職業道德作為自己的一種人生境界，一種人生價值，一種靈魂深處的“剛性”約束","以上皆是 39"],"a":3},{"n":506,"s":"職業道德","q":"如何判斷證券商的業務人員是否具有職業道德？","o":["持有多種證券、期貨、或銀行、 保險的專業證照","不論是否執行業務或在何時何地，均能遵守法規與自律原則","擁有高額的營業業績並領取高額的營業獎金","擁有廣闊的政商及人際關係"],"a":1},{"n":507,"s":"職業道德","q":"下列何者屬於證券商及其從業人員執行業務應遵守的執業道德規範？","o":["忠實執行 工作，並以事實為根據","以政府的法令及公司內部管理規章的規定為準則，嚴明紀 律，保守機密","公司與員工、員工與員工、公司與客戶、員工與客戶間互相尊重， 相互配合","以上皆是"],"a":3},{"n":508,"s":"職業道德","q":"證券商之從業人員日常執行業務應該遵守何種規定？","o":["遵守政府的相關法令規定","若遇到利益衝突事項，應主動向上級報告","遵守公司所制訂的內部管理規章制 度","以上皆是"],"a":3},{"n":509,"s":"職業道德","q":"資本市場是信用市場，市場參與者相互間的信用是市場存在的基礎及價值，因此， 證券交易法對於破壞市場信用的行為，通常會處以最嚴厲的處分，下列何者不屬於 破壞市場信用的行為？","o":["內線交易","人為操縱股價","員工加班不依法給加班費","有價證券之募集、發行、私募或買賣有虛偽、詐欺或其他足致他人誤信之行為"],"a":2},{"n":510,"s":"職業道德","q":"下列何者非為充實與增進證券及金融業務人員專業的作法？","o":["參加軍事訓練","參 加公司內部舉辦或外部專業機構辦理之職前訓練","持續定期參加公司內部舉辦及 外部專業機構辦理之在職訓練","各種相關證券及金融業專業證照之取得"],"a":0},{"n":511,"s":"職業道德","q":"下列何者為確保證券商從業人員在公司遵守法令執行業務的作法？","o":["設置法令遵 循單位專責負責推動","對公司員工施以適當合宜的法規訓練","內部稽核單位將公 司法令遵循制度執行情形列入查核","以上皆是"],"a":3},{"n":512,"s":"職業道德","q":"以下敘述何者為是？","o":["法規過於專業，經辦人員毋須了解法規","公司主管要求時， 經辦再更新法規即可","經辦人員應隨時注意業務相關法規之更新","以上皆非"],"a":2},{"n":513,"s":"職業道德","q":"下列何者須符合法定之人員資格條件？","o":["信託業務人員","信託管理人員","信託督 導人員","以上皆是"],"a":3},{"n":514,"s":"職業道德","q":"有關人員資格之規定，以下所述何者為錯誤的？","o":["信託業僱用業務人員雖未符合資 格得予試用","信託業僱用新員工時應考量是否具有資格","信託業應取得新進員工 符合資格證明文件","未符合相關資格不得調派擔任信託業務人員"],"a":0},{"n":515,"s":"職業道德","q":"以下何者非屬自律範圍？","o":["核准營業項目","廣告自律規範","會員財務或業務之查 核及輔導","訂定各業自律公約"],"a":0},{"n":516,"s":"職業道德","q":"違反會員自律公約之處置，下列何者為非？","o":["先請示主管機關，核准後再處置","由 各業公會依規定辦理","依自律公約規定處分","處分報經各公會理事會決議後執行 並報知主管機關"],"a":0},{"n":517,"s":"職業道德","q":"違反會員自律公約之處分，以下何者為非？","o":["處以違約金","停止其應享有之部分 或全部權益","責令會員對其所屬人員為適當之處分","終止會員營業執照"],"a":3},{"n":518,"s":"職業道德","q":"金融從業人員基於職務關係而獲悉與業務相關，但尚未公開之重大消息時，應如何 處理?","o":["可事前散發消息給客戶","只洩露給親朋好友","不得為自己、客戶、其他第 三人利用該未公開之重大消息獲利","自己私下獲利"],"a":2},{"n":519,"s":"職業道德","q":"金融從業人員應遵守守法原則，故：","o":["可從事內線交易","不得有違反或幫助他人違 反法令之行為","可洩露客戶資料","可違反相關規定 40"],"a":1},{"n":520,"s":"職業道德","q":"下列何者不得擔任票券金融公司之董事或經理人？","o":["該票券金融公司監察人二親 等以內之血親","該票券金融公司監察人一親等姻親","該票券金融公司監察人之配 偶","以上皆是"],"a":3},{"n":521,"s":"職業道德","q":"下列何者不屬於洗錢防制法所稱金融機構？","o":["票券金融公司","證券集中保管事業","人力銀行","信用卡公司"],"a":2},{"n":522,"s":"職業道德","q":"金融從業人員在工作場所，下列何者行為不在限制範圍內？","o":["恐嚇","合作","歧視","騷擾"],"a":1},{"n":523,"s":"職業道德","q":"金融從業人員之職業道德不包含下列何者？","o":["保護公司資產","保守客戶秘密","個 人利益至上","誠信、客觀"],"a":2},{"n":524,"s":"職業道德","q":"何者為金融從業人員應有之表現？","o":["知悉公司有重大舞弊案件，應循正當管道向上 級通報","從事不當授信、涉及嚴重違反授信原則之業務","知悉公司財務及業務重大 缺失，未向公司內部稽核部門報告","為自己或第三人不法之利益，損害公司之利益"],"a":0},{"n":525,"s":"職業道德","q":"身為金融從業人員應共同信守基本之職業道德不包括下列何者？","o":["守法原則","誠 實原則","主觀性原則","保密原則"],"a":2},{"n":526,"s":"職業道德","q":"金融從業人員依據洗錢防制法之規定，不得有下列何種行為？","o":["掩飾或隱匿因自己 或他人重大犯罪所得財物或財產上利益者","收受、搬運、寄藏或收買他人因重大犯 罪所得財物或財產上利益者","洩露或交付關於申報疑似洗錢交易或洗錢犯罪嫌疑 之文書、圖畫、消息或物品者","以上皆是"],"a":3},{"n":527,"s":"職業道德","q":"金融從業人員應如何強化自身之法律知識且養成自律精神？","o":["不定期檢視相關法 令之規定，留意是否有更改與增訂之法律規範","參與同業公會所舉辦之在職訓練","秉持守法、誠信原則，在所從事之業務行為上建立誠信與專業精神","以上皆是"],"a":3},{"n":528,"s":"職業道德","q":"金融從業人員之自律行為何者為非？","o":["未經許可，不得在公司工作時間內，兼任公 司以外之任何職務","對於公司各項文件、函電、簿冊、圖表、典章制度、公物等， 得以攜出並對外談論","對職務上所獲悉之任何未經公司同意公開之營業資訊負有 絕對保密義務","非經主管許可，不得擅自對外發表任何有關公司業務之意見"],"a":1},{"n":529,"s":"職業道德","q":"金融服務業內部應加強宣導職業道德觀念，並且鼓勵員工於懷疑或發現有人違反法 令規章或道德行為準則時之處理，下列何者不適當？","o":["隱忍不報","向監察人報告","向經理人報告","向內部稽核主管報告"],"a":0},{"n":530,"s":"職業道德","q":"金融從業人員為發揚自律精神，應共同信守之規範，下列何者除外？","o":["董監事對與 本人有利害關係之交易，自行迴避","對客戶之資料，除基於法令規定外，應保守秘 密","爭取業務時，與相關公司或人員間有不當利益之約定或收受","不以脅迫、利誘 或其他不正當方式，獲取其他同業之行銷機密或其交易人相對資料"],"a":2},{"n":531,"s":"職業道德","q":"關於金融服務業從事授信業務之規範，下列敘述何者有誤？","o":["對於授信客戶，應本 公平誠信及權利義務對等原則，將有關約定事項訂明於契約並告知之","對授信案件 應力求公正客觀並兼顧自身利益與社會公益","對人員之晉用應循正當途徑延攬，並 長期有計畫培訓，以充實專業知識，並提高素質","為保障自身利益，對授信客戶重 大不良訊息不宜互相通報"],"a":3},{"n":532,"s":"職業道德","q":"欲從事未經主管機關核定之業務時，應如何辦理？","o":["報請公會備查後辦理","俟呈 報董事會通過後辦理","經股東大會通過後即可辦理","經主管機關核准後方得辦理 41"],"a":3},{"n":533,"s":"職業道德","q":"金融相關從業人員之資格條件，下列何項不在優先考慮範圍之內?","o":["品德","專業","相關經驗","性別"],"a":3},{"n":534,"s":"職業道德","q":"金融從業人員於尚未符合相關人員資格時：","o":["可經辦各項業務","代理經辦相關業 務","不得經辦相關業務","於能力範圍內，仍可執行相關業務"],"a":2},{"n":535,"s":"職業道德","q":"關於金融從業人員之道德規範，下列敘述何者為正確？","o":["因為自身的安危，即使知 道直屬主管違反法規也不能越級報告","為了同事間和諧的氣氛，我應該將同事私下 向客戶收受回扣的事保密","雖然金融從業人員必須保守客戶的秘密，但若家人需 要，可以透露一些無所謂","對於客戶的無禮要求，仍然必須依公司規定辦理"],"a":3},{"n":536,"s":"職業道德","q":"金融從業人員基於職務之故而獲悉與業務相關尚未公開之重大消息時，應如何處 理？","o":["利用所得之資訊為自己取得最佳之利益","將該未公開資訊提供給自己的客 戶，以牟取利益","基於職業道德規範，重大消息未公開之前不應利用該資訊獲取利 益，且資訊之運用須符合法令規定","利用此未公開資訊為自己、客戶或自己的親友 作內線交易以獲取利益"],"a":2},{"n":537,"s":"職業道德","q":"金融從業人員發現公司內部有涉嫌違反法紀活動時，需透過正當管道向主管機關舉 發，下列何者為非法活動？","o":["內線交易","盜用資金","洗錢","以上皆是"],"a":3},{"n":538,"s":"職業道德","q":"近年來隨著對公眾利益的保護增加，從業人員除應遵守相關法律規範外，另有何種 規範相應而生並隨之增加，其旨在藉由本業自我約束力量使市場秩序更臻完善?","o":["自律規範","作業標準","罰款","擔保"],"a":0},{"n":539,"s":"職業道德","q":"金融從業人員得遵守下列單位所訂規範？","o":["從業人員自律規範","政府機關命令","公司規章","以上皆是"],"a":3},{"n":540,"s":"職業道德","q":"懲戒違反道德行為準則之員工時，應有下列何者考量？","o":["逕行公開譴責","逕行吊 銷或撤銷相關資格者，不得於媒體公告之，以保障其工作權及隱私權","應給予申復 機會及救濟管道","以上皆是"],"a":2},{"n":541,"s":"職業道德","q":"道德行為規範應包括何種原則？","o":["守法原則、誠信原則、自律原則","保密原則、能 力原則、資訊公開原則","客戶利益優先原則、利益衝突原則、禁止不當得利原則","以上皆是"],"a":3},{"n":542,"s":"職業道德","q":"金融從業人員在自己的工作領域中，應：","o":["專注自己及他人之升遷","不參加公司的 教育訓練","不斷加強自己的專業知識","不涉獵本業以外之相關知識"],"a":2},{"n":543,"s":"職業道德","q":"道德行為規範適用之事業體為何？","o":["限於上市櫃公司","限於金融產業","限於營利 事業","各種事業體均得適用"],"a":3},{"n":544,"s":"職業道德","q":"各公司道德行為準則規範之適用層級何者正確？","o":["董事長","總經理層級以上","部 門主管以上","有為公司管理事務及簽名權利之人"],"a":3},{"n":545,"s":"職業道德","q":"對於一個真正專業人員的特質，下列敘述何者正確？","o":["具有專業才識","遵守最高 執業倫理道德標準","具備「慈善」的基本優點及「愛」的觀點","以上皆是"],"a":3},{"n":546,"s":"職業道德","q":"下列有關金融從業人員之敘述何者正確？","o":["向客戶據實告知商品相關內容","不得 為所屬公司授權範圍以外之任何承諾","對因執行業務所取得之機密資料應遵守資 料保護相關法令規定","以上皆是"],"a":3},{"n":547,"s":"職業道德","q":"若僅通過金融市場常識與職業道德考試則可銷售下列何種金融商品？","o":["保險商品","基金","推介股票","以上皆非 42"],"a":3},{"n":548,"s":"職業道德","q":"金融從業人員要落實公平待客原則，必須先奠定從業人員認定公平待客之重要性， 首要將下列何者列為宗旨","o":["優先保障公司權益","優先保障集團利益","優先保障金 融消費者利益","以上皆是"],"a":2},{"n":549,"s":"職業道德","q":"有關金融從業人員辦理投資型金融商品推介或銷售業務時，下列敘述何者正確？","o":["應保護投資者合法權益","應遵守相關法令規定","推廣文宣應清楚、公正及不誤導 投資人","以上皆是"],"a":3},{"n":550,"s":"職業道德","q":"對於金融從業人員之行為，下列何者為非？","o":["不應利用公司內部資訊為自己謀取利 益","可與客戶約定分享利益或共同承擔損失","不可利用客戶帳戶或名義為自己從 事交易","不可將他人或自己帳戶供客戶從事交易"],"a":1},{"n":551,"s":"職業道德","q":"對於金融從業人員之行為規範，下列何者正確？","o":["不得涉及賭博情事","應避免不 當的交際應酬","應避免不當的餽贈","以上皆是"],"a":3},{"n":552,"s":"職業道德","q":"金融從業人員對於往來客戶，於符合法令規定之範圍內，下列作為何者為是？","o":["提 供客戶充足之資訊，以便其充分瞭解公司業務","當客戶合法權益受到侵害時，應正 面回應，並作妥適之處理","確實依據相關法令、公司章程之規定，忠實履行職務","以上皆是"],"a":3},{"n":553,"s":"職業道德","q":"信用卡發卡機構辦理催收欠款業務時，下列何項為應遵守之事項？","o":["不得違反公共 利益","僅能對債務人本人及其保證人催收","不得對非債務之第三人之干擾或催討","以上皆是"],"a":3},{"n":554,"s":"職業道德","q":"信用卡發卡機構之行銷人員從事下列行為何者不正確？","o":["自行勾選未經客戶同意 申請之卡片","確認客戶申請之卡片","確認客戶資料無誤才送件","確認申請人本人 身分，以免冒名申請"],"a":0},{"n":555,"s":"職業道德","q":"銀行辦理催收業務時，下列敘述何項為非？","o":["不得違反公共利益","僅能對債務人 本人及其保證人催收","應有保密之義務","得對非債務之第三人干擾或催討"],"a":3},{"n":556,"s":"職業道德","q":"有關金融從業人員辦理衍生性金融商品業務應遵守事項，下列敘述何者有誤？","o":["應 提供客戶有關商品之產品內容、交易條件及特性","應說明客戶投資本商品可能之預 期收益","應於交易契約中揭示可能發生之風險，對客戶善盡風險告知義務","可與 客戶約定分享利益或共同承擔損失"],"a":3},{"n":557,"s":"職業道德","q":"有關金融從業人員辦理衍生性金融商品業務，應提醒客戶於交易前充分瞭解之事 項，下列何者為正確？","o":["商品之性質","相關之財務、會計、稅制或法律等事宜","自行審度本身財務狀況及風險承受度","以上皆是"],"a":3},{"n":558,"s":"職業道德","q":"下列關於金融從業人員辦理投資型金融商品推介或銷售業務時，下列應遵守之事項 何者有誤？","o":["依據客戶風險之承受度提供客戶適當之商品","避免不當銷售或推介 之行為","不可販售客戶資料，惟可提供給自己親友開設的公司參考","廣泛了解客 戶之家庭背景、生涯規劃"],"a":2},{"n":559,"s":"職業道德","q":"金融從業人員辦理投資型金融商品推介或銷售業務時，為避免糾紛，應遵守下列何 種事項？","o":["應以善良管理人之注意義務及忠實義務，本誠實信用原則執行業務","應依據客戶風險之承受度銷售或推介客戶適當之商品或投資組合","不得銷售或推 介逾越客戶財力狀況或合適之投資範圍以外之商品","以上皆是 43"],"a":3},{"n":560,"s":"職業道德","q":"金融從業人員辦理徵信工作，以下敘述何者有誤？","o":["徵信人員應依誠信公正原則， 辦理徵信工作","為謀徵信工作迅速完成，徵信單位對於經常往來客戶，毋需再辦理 徵信","徵信人員對徵信資料應依法嚴守秘密","辦理徵信，除另有規定外，應以直接 調查為主，間接調查為輔"],"a":1},{"n":561,"s":"職業道德","q":"金融從業人員於推介或銷售投資型金融商品時，不得有下列何者行為？","o":["向業者收 受佣金回扣","未經客戶授權，擅自為客戶進行交易","私自挪用客戶款項","以上皆是"],"a":3},{"n":562,"s":"職業道德","q":"金融從業人員遇客戶結購外幣現鈔或旅行支票時，以下敘述何者正確？","o":["結購外幣 現鈔或旅行支票後，請客戶當面點清","提醒客戶妥為保管，以免被竊或遺失","請客 戶將旅行支票與購買合約書分開保管，避免兩者同時被竊或遺失而無法申請掛失","以上皆是"],"a":3},{"n":563,"s":"職業道德","q":"證券投信投顧公會會員自律公約，適用於：","o":["投信投顧業務人員","投顧事業負責人","證券投資信託事業","以上皆是"],"a":3},{"n":564,"s":"職業道德","q":"金融服務業應共同信守的基本業務經營原則是：","o":["專業原則","保密原則","公平競 爭原則","以上皆是"],"a":3},{"n":565,"s":"職業道德","q":"下列何者不得接受上市、上櫃公司、證券承銷商所提供利益或其它利益?","o":["各金融 事業公會會員","金融事業負責人","金融從業人員","以上皆是"],"a":3},{"n":566,"s":"職業道德","q":"投顧事業業務廣告如違反相關規範，投信投顧公會應進行查證，對於涉有違反規範 之情事者將如何處理？","o":["提證期局審議","提消保會議處","直接報金管會","提公 會自律委員會審議"],"a":3},{"n":568,"s":"職業道德","q":"以下哪一行為不違反投信投顧會員自律公約？","o":["基金經理人接受客戶旅遊招待","證券分析人員根據未公開訊息做出投資建議","新進的全權委託經理人依據報載及 從友人同事處所得訊息管理代操資金","以在投信投顧公會登記的名稱進行業務招 攬，並提供公司經主管機關核准之營業執照字號"],"a":3},{"n":569,"s":"職業道德","q":"下列何者不違反投信投顧公會會員自律公約？","o":["向上市公司募集基金，並將經理之 基金投資於該上市公司股票","不洩露所管理的基金或委任人委任事項的相關資訊","向上櫃公司募集基金，且承諾將該資金投資於該上櫃公司服票","在未經核准前， 接受客戶預約認購基金"],"a":1},{"n":570,"s":"職業道德","q":"金融從業人員自律規範中，有關個人交易須申報的帳戶規範對象為：","o":["以自己名義 開立之帳戶","配偶之帳戶","配偶利用他人名義持有者之他人帳戶","以上皆是"],"a":3},{"n":571,"s":"職業道德","q":"吳自強是一位證券分析人員，他從上市公司 ABC 的員工處得知 ABC 產品設計發生 重大瑕疵，並且主要客戶因此已經取消大部分的訂單。吳自強發現該消息尚未公佈， 吳自強應該：","o":["立即向公司指定人員或部門提出書面報告","透露消息給報章雜誌 媒體","依據公平公正原則通知所有客戶","通知親朋好友放空該 ABC 公司股票"],"a":0},{"n":572,"s":"職業道德","q":"為了保護金融消費者權益，讓金融消費爭議能公平、合理、有效的處理，下列何者 是最重要且為金融業務整合性的專業法律？","o":["金融消費者保護法","消費者保護法","個人資料保護法","證券投資人及期貨交易人保護法 44"],"a":0},{"n":573,"s":"職業道德","q":"下列何者是屬於金融消費者保護法所謂的金融消費爭議，而受金融消費者保護法的 保護？","o":["金融消費者與金融服務業間因商品或服務所生之刑事爭議","金融消費者 與金融服務業間因商品或服務所生之民事爭議","金融消費者與金融服務業間因商 品或服務所生之刑事及民事爭議","金融消費者與金融服務業間所生之任何爭議"],"a":1},{"n":574,"s":"職業道德","q":"下列何者為受金融消費者保護法保護之接受金融服務業提供金融商品或服務的金 融消費者？","o":["專業投資機構","符合一定財力或專業能力之自然人或法人","前述兩 項以外的一般自然人或法人","任何接受金融服務業提供金融商品或服務之金融消 費者"],"a":2},{"n":575,"s":"職業道德","q":"證券商接受法人、其他機構或特定自然人授權買賣有價證券，為避免交易紛爭及業 務人員操縱舞弊，下列何者不是證券商應注意的事項?","o":["應提供特別資訊與服務","應確保客戶委託係依公平及衡平方式予以執行","應注意依相關規定適當保存完善 之執行委託紀錄及交易憑證","應確定經紀部門及自營部門間應有適當之防火牆"],"a":0},{"n":576,"s":"職業道德","q":"依證券交易法規定，證券商非加入證券商同業公會不得開業，而加入證券商同業公 會必須簽署會員自律公約並承諾共同信守之。證券商經營有價證券經紀業務，下列 何者不是應共同信守的基本要求 ?","o":["不得散布不實資訊，誤導投資大眾","不得策 動他人聯手炒作股票","不得從事非法之股票仲介交易","散播不實言論，中傷其他 會員"],"a":3},{"n":577,"s":"職業道德","q":"為公平合理、迅速有效處理金融消費爭議，以保護金融消費者權益，下列何者為依 金融消費者保護法設立之金融消費爭議處理機構？","o":["財團法人證券投資人及期貨 交易人保護中心","財團法人金融消費評議中心","財團法人中華民國證券暨期貨市 場發展基金會","行政院消費者保護會"],"a":1},{"n":578,"s":"職業道德","q":"金融服務業從事廣告、業務招攬及營業促銷活動，不得有下列何種情事？","o":["違反法 令、主管機關之規定或自律規範","虛偽、不實、隱匿、或其他足致他人誤信","損害 金融服務業或他人營業信譽","以上皆是"],"a":3},{"n":579,"s":"職業道德","q":"依證券交易法規定，證券商非加入證券商同業公會不得開業，而加入證券商同業公 會必須簽署會員自律公約並承諾共同信守之。證券商經營有價證券經紀業務，下列 何者不是應共同信守的基本要求 ?","o":["對客戶提供、揭露之資訊可依客戶之重要程度 而有特殊不同之待遇","應主動發掘或舉發內部業務人員之違規事件﹔對同業之違 規行為，若知情者，亦應主動檢舉","應盡協助維護市場交易秩序及防杜不法交易之 義務","應落實洗錢防制注意事項及徵信制度"],"a":0},{"n":580,"s":"職業道德","q":"金融服務業從事廣告、業務招攬及營業促銷活動，不得有下列何種情事？","o":["故意截 取報章雜誌不實之報導作為廣告內容","對於業績及績效作誇大之宣傳","使用之文 字或訊息內容使人誤信能保證本金之安全或保證獲利","以上皆是"],"a":3},{"n":581,"s":"職業道德","q":"證券商業務人員辦理衍生性金融商品交易業務，於交易相對人要求確認其身分時， 應如何處理 ?","o":["請客戶自行打電話給公司確認","應配合出示身分證明文件或識別 證件","立刻報警處理","不予理會，要辦不辦隨客戶便"],"a":1},{"n":582,"s":"職業道德","q":"金融消費者向財團法人金融消費評議中心申請金融消費爭議之評議，下述何種情形 將會被決定不受理？","o":["未先向金融服務業申訴","非屬金融消費爭議","申請已逾法 定期限","以上皆是 45"],"a":3},{"n":583,"s":"職業道德","q":"財團法人金融消費評議中心對金融服務業與金融消費者間之金融消費爭議所作出 的評議決定書，經送經法院核可者，其法律效力如何？","o":["與民事確定判決有同一之 效力","金融服務業與金融消費者事後可再進行協商","金融服務業得就該事件再次 申請評議","金融服務業事後後悔，可不接受評議決定"],"a":0},{"n":584,"s":"職業道德","q":"證券商為證券市場的重要專業中介機構，是受高度監理的行業，基於公平、誠實、 守信、透明原則從事證券商業活動。為落實誠信經營，並防範不誠信行為，下列何 者屬於證券商規範從業人員於執行業務時應注意的事項 ?","o":["禁止公司人員直接或 間接提供、收受、承諾或要求不正當利益","應避免與涉有不誠信行為之代理商、供 應商、客戶或其他商業往來對象從事商業交易","禁止提供或承諾任何疏通費","以 上皆是"],"a":3},{"n":585,"s":"職業道德","q":"下列何者是屬於金融消費者保護法所稱的金融服務業？","o":["證券業","銀行業","期貨 業","以上皆是"],"a":3},{"n":586,"s":"職業道德","q":"金融消費爭議當事人、爭議處理機構及其人員，對於金融消費爭議事件所提出之申 請、各種資料、協商讓步事項或評議過程有保密之義務，在何種狀況下，才可予以 公開？","o":["已經公開者","依法令規定可公開者","經當事人同意者","以上皆是"],"a":3},{"n":587,"s":"職業道德","q":"下列何者是證券商之業務人員執行業務符合法令規定之行為 ?","o":["與客戶約定替其 操作股票，且每獲利達特定額度即可進行分潤","不代客戶保管存摺、印鑑、蓋妥章 之空白取款條","辦理上市承銷案之詢價圈購配售作業，利用他人帳戶認購上開股 票，並於上市首 5 日賣出","為避免客戶發生違約交割，代為媒介他人借貸所需款 項，以便交割"],"a":1},{"n":588,"s":"職業道德","q":"財團法人金融消費評議中心對於金融消費者申請評議之金融消費爭議案件，有那些 處理機制？","o":["未先向該金融服務業經申訴的申請案，先移請該金融服務業先行處理","試行調處","進行評議","以上皆是"],"a":3},{"n":589,"s":"職業道德","q":"金融服務業招攬、播放廣告及進行業務招攬或營業促銷活動時，下列敘述何者為正 確？","o":["對金融消費者所負擔之的義務不得低於所廣告之內容及進行業務招攬或營 業促銷活動時對金融消費者所提示之資料或說明","不得有虛偽、詐欺、隱匿或其他 足致他人誤信之情事","應確保其廣告內容之真實","以上皆為正確"],"a":3},{"n":590,"s":"職業道德","q":"金融服務業對金融消費者進行金融教育宣導，下列敘述何者為正確？","o":["不得引薦個 別金融商品或服務","對金融消費者說金融商品或服務已獲主管機關核准或備查所 以保證安全無虞","對應經而未經主管機關核准或備查之金融商品或服務預為宣傳 促銷","使用能保證本金之安全或保證獲利之文字或訊息內容"],"a":0},{"n":591,"s":"職業道德","q":"金融服務業從事廣告、業務招攬及營業促銷活動，依法皆受到主管機關的監督管理， 下列利用何種傳播媒體、宣傳工具或方式屬之？","o":["電腦、傳真、電話、手機簡訊、 廣播、跑馬燈","宣傳單、布條、招牌、公車或其他交通工具上之廣告","與公共領域 相關之網際網路、電子郵件及電子視訊等","以上皆是"],"a":3},{"n":592,"s":"職業道德","q":"金融服務業從事廣告、業務招攬及營業促銷活動，下列敘述何者不是正確的作法？","o":["應訂定宣傳資料製作規範與散發公布之控管流程","宣傳資料於對外使用前，應 按業務種類，先行審核","全權交付廣告公司處理就可以，有問題由廣告公司負全責","應先確認內容無不當、誤導金融消費者、違反法令後始得對外使用 46"],"a":2},{"n":593,"s":"職業道德","q":"金融服務業所提供之金融商品或服務，下列何者不屬於金融消費者保護法所稱之投 資型金融商品或服務？","o":["信託業辦理特定金錢信託業務或特定有價證券信託業務， 受託投資國內外有價證券、短期票券或結構型商品","受託買賣非集中市場交易且具 衍生性商品性質之外國有價證券業務","受託買賣國內集中交易或櫃檯買賣市場之 黃金業務及銀行辦理與客戶間之黃金現貨買賣及保管業務","證券投資信託基金及 境外基金"],"a":2},{"n":594,"s":"職業道德","q":"金融服務業與金融消費者訂立提供金融商品或服務之契約前，下列敘述何者為正 確？","o":["應充分了解金融消費者之相關資料，以確保該商品或服務對金融消費者之適 合度","應向金融消費者充分說明該金融商品、服務及契約之重要內容，並充分揭露 其風險","金融服務業對於金融消費者個人資料之蒐集、處理及利用者，應向金融消 費者充分說明個人資料保護之相關權利，以及拒絕同意可能之不利益","以上皆是"],"a":3},{"n":595,"s":"職業道德","q":"證券商之業務人員執行業務應本誠實及信用原則，下列何者不是其本於職業道德而不 得有之行 function init() {
  ALL_Q = Q_DATA;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  applyFilter();
}

function applyFilter() {
  if (curFilter === 'all') filtered = [...ALL_Q];
  else if (curFilter === 'wrong') filtered = ALL_Q.filter(q => wrongSet.has(q.n + '_' + q.s));
  else filtered = ALL_Q.filter(q => q.s === curFilter);
  idx = 0;
  render();
}

function setFilter(f) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach((b,i) => {
    b.classList.toggle('active', b.textContent.includes(f) || (f==='all' && b.textContent==='全部'));
  });
  applyFilter();
}

function shuffle() {
  filtered.sort(() => Math.random() - 0.5);
  idx = 0;
  render();
}

function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['quiz','read','wrong'][i] === tab);
  });
  if (tab === 'wrong') { curFilter = 'wrong'; applyFilter(); return; }
  if (curFilter === 'wrong') { curFilter = 'all'; applyFilter(); return; }
  render();
}

function updateStats() {
  document.getElementById('s-total').textContent = ALL_Q.length;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrongSet.size;
  document.getElementById('s-acc').textContent = total > 0 ? Math.round(correct/total*100)+'%' : '—';
}

function render() {
  updateStats();
  const area = document.getElementById('quiz-area');
  if (curTab === 'read') { renderRead(area); return; }
  if (filtered.length === 0) {
    area.innerHTML = '<div class="empty">沒有題目可顯示</div>';
    return;
  }
  const q = filtered[idx];
  const key = q.n + '_' + q.s;
  const ans = answered[key];

  let optHTML = q.o.map((opt, i) => {
    let cls = 'option';
    if (ans !== undefined) {
      if (i === q.a) cls += ' correct';
      else if (i === ans && ans !== q.a) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="answer(${i})" ${ans!==undefined?'disabled':''}><span class="option-label">(${i+1})</span>${opt}</button>`;
  }).join('');

  let resultHTML = '';
  if (ans !== undefined) {
    if (ans === q.a) resultHTML = '<div class="result-badge correct">✓ 答對了！</div>';
    else resultHTML = `<div class="result-badge wrong">✗ 答錯，正確答案是 (${q.a+1})</div>`;
  }

  const pct = filtered.length > 1 ? (idx/(filtered.length-1)*100) : 100;

  area.innerHTML = `
    <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="text-align:right;font-size:0.78em;color:var(--text2);margin-bottom:8px">${idx+1} / ${filtered.length}</div>
    <div class="q-card ${ans!==undefined?(ans===q.a?'correct':'wrong'):''}">
      <div class="q-meta">
        <span class="q-num">題 ${q.n}</span>
        <span class="q-tag ${q.s}">${q.s}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optHTML}</div>
      ${resultHTML}
    </div>
    <div class="nav-bar">
      <button class="btn btn-outline" onclick="go(-1)" ${idx===0?'disabled':''}>← 上一題</button>
      ${ans===undefined?`<button class="btn btn-outline" onclick="skip()">跳過</button>`:''}
      <button class="btn btn-primary" onclick="go(1)" ${idx===filtered.length-1?'disabled':''}>下一題 →</button>
    </div>`;
}

function answer(i) {
  const q = filtered[idx];
  const key = q.n + '_' + q.s;
  if (answered[key] !== undefined) return;
  answered[key] = i;
  total++;
  if (i === q.a) correct++;
  else wrongSet.add(key);
  render();
}

function skip() { go(1); }
function go(d) { idx = Math.max(0, Math.min(filtered.length-1, idx+d)); render(); }

function renderRead(area) {
  if (filtered.length === 0) { area.innerHTML = '<div class="empty">沒有題目</div>'; return; }
  const html = filtered.map(q => `
    <div class="read-card">
      <div class="q-meta">
        <span class="q-num">題 ${q.n}</span>
        <span class="q-tag ${q.s}">${q.s}</span>
      </div>
      <div class="read-q">${q.q}</div>
      <div class="read-choices">${q.o.map((o,i)=>`(${i+1}) ${o}`).join('　')}</div>
      <div class="read-ans">▶ 答案：(${q.a+1}) ${q.o[q.a]}</div>
    </div>`).join('');
  area.innerHTML = html;
}

window.onload = init;
</script>
</body>
</html>
