:root{--p:#e53e3e;--s:#dd6b20;--bg:#f8f9fc;--card:#fff;--border:#e2e8f0;}

.wi-num{font-size:.72rem;font-weight:900;color:#c53030;margin-bottom:3px;}
.wi-q{font-size:.82rem;color:#2d3748;line-height:1.5;}

(2)當t≧10，（解約金)t＝(保單價值準備金)t│(二)繳費期滿後：(解約金)t＝ (保單價值準備金)t"}, {"num": "59", "chapter": "第四章", "answer": 1, "question": "自民國88年起簽發之人壽保險單，有關解約金，下列何者敘述正確？A躉繳之解約金等於保單價值準備 金；B分期付款期滿期約金等於保單價值準備金；C躉繳解約金小於保單價值準備金；D分期付款期滿解 約金小於保單價值準備金", "options": ["AB", "CD", "AD", "BC"], "explanation": "自民國八十八年起簽發之人壽保險單。 一、躉繳保險單:(解約金)t=(保單價值準備金)t 二、分期繳費保險單: (一)繳費期間內: 1.當繳費年期(n)<10者,(解約金)t=(保單價值準備金)tx(0.85+0.15xt/n) 2.當繳年期(n)>=10者, (1)當t<10,(解約金)t=(保單價值準備金)tx(0.85+0.15xt/10) (2)當t>=10,(解約金)t=(保單價值準備金)t"}, {"num": "66", "chapter": "第四章", "answer": 4, "question": "利率變動型年金乙型於給付期間，保戶可領取之年金金額與下列何者無關", "options": ["預定死亡率", "宣告利率 預定利率 (4)預定附加費用率", "", "預定附加費用率"], "explanation": "(二)繳費期滿後:(解約金)t=(保單價值準備金)t (3) 乙型給付期的重要因素：預定死亡率、預定利率、宣告利率。宣告利率為第二年 的調整係數帶入的。"}, {"num": "71", "chapter": "第四章", "answer": 2, "question": "有關解約金敘述何者正確？A躉繳保單之解約金等於保單價值準備金；B分期繳費保單繳費期滿後之解約 金等於保單價值準備金；C躉繳保單之解約金小於保單價值準備金；D分期繳費保單繳費期滿後之解約金 小於保單價值準備金", "options": ["BC", "AB", "AD", "CD。"], "explanation": "C躉繳保單之解約金等於保單價值準備金；D分期繳費保單繳費期滿後之解約金等 於保單價值準備金。"}, {"num": "72", "chapter": "第四章", "answer": 1, "question": "依生命表顯示30歲女性死亡率是千分之三，若有一千名30歲女性各投保2千萬一年期的死亡保險，則： A每位女性保費是由投保人比例負擔為每人6萬；B每人應收保費係依據收支相等原則來計算；C保險入應 支出的死亡保險金額總計為6千萬；D一年間死亡人數為6人", "options": ["ABC", "BC", "BD", "AC。"], "explanation": "D死亡率會因性別、職業、健康狀況、體格有所影響，並非絕對人數。"}, {"num": "75", "chapter": "第四章", "answer": 3, "question": "首度將台灣壽險業經驗生命表區分為男、女性，並於民國78年6月奉准採用作為責任準備金提存標準的 是台灣壽險業", "options": ["第四回經驗生命表", "第五回經驗生命表", "第三回經驗生命表", "第二回經驗生命表"], "explanation": "民國78年6月奉准採用作為責任準備金提存標準的是台灣壽險業第三回經驗生命 表。"}, {"num": "81", "chapter": "第四章", "answer": 3, "question": "1千名45歲的男人各投保1千萬元的死亡保險(保險期間1年)，生命表顯示45歲男人的死亡率是千分之4， 則每人的保險費是", "options": ["5千元", "5萬元", "4萬元", "4千元。"], "explanation": "依收支相等原則，全體保戶保費總額=全體受益人的保險金額 保險金總額=1,000萬*(1,000人*0.004)=4,000萬 保戶每人保險費=4,000萬/1,000人=4萬"}, {"num": "91", "chapter": "第四章", "answer": 4, "question": "自民國94年1月1日起至101年6月30日銷售之傳統年金保險計算保險費之預定危險發生率，採用之年金 生命表以死亡率多少為基礎？", "options": ["80%~100%", "90%", "100%~120%", "由各公司依主管機關規定自行訂 定。"], "explanation": "自民國94年1月1日起至101年6月30日銷售之傳統年金保險計算保險費之預定危險 發生率，是以年金生命表為基礎，由各公司自行決定。"}, {"num": "92", "chapter": "第四章", "answer": 1, "question": "死亡率之計算基礎為A年初之死亡人數；B年度內之死亡人數；C年初之生存人數；D年末之生存人數", "options": ["BC", "BD", "AC", "BCD。"], "explanation": "死亡率計算公式為：年度內之死亡人數/年初之生存人數。"}, {"num": "97", "chapter": "第四章", "answer": 3, "question": "人身保險業自92年元月起銷售之人壽保險單，計算保險費率之生命表為", "options": ["臺灣壽險業第三回經驗生命表 死亡率百分之九十", "以調降保險費率至90%計之", "得自行決定", "臺灣壽險業第三回經驗生命表。"], "explanation": "92/1/1 起銷售的人壽保險單，保險公司得自行決定使用第三回或第四回的生命表 計算保險費率。"}, {"num": "113", "chapter": "第五章", "answer": 2, "question": "關於傷害失能 11 級 79 項新增第 80 項，以下敘述何者正確？", "options": ["鼻未缺損，而鼻機能暫時遺存顯著障害 者", "鼻未缺損，而鼻機能永久遺存顯著障害者", "鼻有缺損，而鼻機能暫時遺存顯著障害者", "鼻有缺損 ，而鼻機能永久遺存顯著障害者"], "explanation": "108年新增鼻末缺損、但鼻機能永久顯著障害者，屬第11級失能會理賠5%，該給 付標準自109年1月1日起增為第80項。"}, {"num": "121", "chapter": "第五章", "answer": 2, "question": "有關全民健康保險敘述何者正確？A保險事故包含疾病、傷害、生育；B以強制投保為原則；C主管機關 為中央健康保健署；D保險人為衛生福利部", "options": ["ABCD", "AB", "ABD", "B。 訓練"], "explanation": "C主觀機關為衛生福利部、D保險人為衛生福利部中央健康保險署。 自民國84/3/1起因實施全民健康保險，全民健保中公務員保險項目中的生育、疾"}, {"num": "122", "chapter": "第五章", "answer": 3, "question": "下列何者為公務人員保險在全民健康保險實施後不給付項目", "options": ["殘廢", "死亡", "養老", "疾病 講義 p.82 依國家發展委員會人口推估報告書之說明，何者有誤？(1)我國已邁入高齡社會(2)我國將進入超高齡社會 (3)仰賴人口係指0至14歲的人口(4)青壯年人口係指15歲至64歲的人口。"], "explanation": "病、傷害等給付於民國84/3/1在全民健康保險開辦後已予終止，並由全民健保辦 理該項業務。 仰賴人口為0-14歲及65歲以上人口合計"}, {"num": "123", "chapter": "第五章", "answer": 2, "question": "長期照顧保險之被保險人經專科醫師診斷後判定符合長期照顧狀態者給予保險給付，而長期照顧狀態係 指被保險人符合？", "options": ["持續6個月以上失智且依臨床失智量表評估達中度以上者", "依巴氏量表判定3個月內 有移位、如廁及沐浴等3項障礙者", "依臨床專業評量表診斷判定5個月內有進食及移位等2項障礙者", "以 上皆是。"], "explanation": "(1)不得高於6個月(3)要有3項障礙者以上"}, {"num": "131", "chapter": "第五章", "answer": 3, "question": "有關旅行平安保險何者正確？A醫療費用之給付包含日額型及實支實付型；B發生意外傷害醫療時，給付 最高以保險金額1/10為限；C屬於國際性保險，承保對象以實際從事旅遊的國內、國外旅客為限；D保險 期間原則上最長以180天為限，旅客如有需要經保險公司同意可延長", "options": ["BC", "ABD", "BCD", "ACD。"], "explanation": "A醫療費用之給付以實支實付為限。"}, {"num": "133", "chapter": "第五章", "answer": 3, "question": "有關政府推動的長期照顧保險，何者錯誤？", "options": ["屬於一種福利政策且為基本保障，可考慮加保一般商業長 期照顧保險商品", "由政府、雇主及民眾共同負責保險費", "屬於強制性社會保險，保險人為衛生福利部", "目前提供的服務皆屬實物給付。"], "explanation": "長期照顧保險保險人為中央健康保險署。"}, {"num": "134", "chapter": "第五章", "answer": 3, "question": "以下何者為微型保險所指之經濟弱勢或特定身分者？A依農民健康保險條例投保農民健康保險之被保險 人；B符合社會救助法規定低收入戶或中低收入戶之家庭成員；C符合身心障礙者權益保障法定義之身心 障礙者；D符合老人福利法規定領取中低收入老人生活津貼之老人", "options": ["ABC", "ABD", "ABCD", "BCD。"], "explanation": "以上皆為微型保險所指之經濟弱勢或特定身分者。"}, {"num": "142", "chapter": "第五章", "answer": 4, "question": "現行長期照顧保險有關認知功能障礙之認定，何者正確？", "options": ["被保險人經專科醫師診斷判定該障礙為終身 無法治癒者，仍受限於免責期間的約定", "認知功能障礙常運用簡易智能測驗（MMSE）進行評估", "被保 險人依臨床失智量表（CDR）評估達嚴重程度以上者", "被保險人經專科醫師診斷判定達5個月以上仍為 持續失智狀態。"], "explanation": "(1)被保險人經專科醫師診斷辦定該障礙為終身無法治癒者，不受限於免責期間的 約定(2)認知功能障礙常運用簡易智能測驗（MMSE）進行評估-108年11月金管會 取消(3)被保險人依臨床失智量表（CDR）評估達中度程度以上者(4)被保險人經專 科醫師診斷判定達5個月以上仍為持續失智狀態-不得高於6個月。"}, {"num": "144", "chapter": "第五章", "answer": 3, "question": "勞工保險之普通事故保險費，被保險人應負擔之比率為", "options": ["0%", "30%", "20%", "10%。"], "explanation": "勞工保險之普通事故保險費之被保險人負擔20%、雇主負擔70%、政府負擔 10%。"}, {"num": "153", "chapter": "第五章", "answer": 2, "question": "勞工保險之職業災害保險給付項目不包括A傷病及醫療；B失業及年老；C失能及死亡；D生育及避孕", "options": ["AB", "BD", "ABC", "AD。"], "explanation": "勞工保險之職業災害保險給付項目為職災、傷病、失能、死亡。"}, {"num": "163", "chapter": "第五章", "answer": 4, "question": "利率變動型年金乙型在年金給付開始第一次，以當時何者換算年金金額。", "options": ["年齡", "年金生命表", "預定 利率", "以上皆是。"], "explanation": "乙型給付期的重要因素：預定死亡率、預定利率、宣告利率。宣告利率為第二年 的調整係數帶入的，考題問第一次，所以答案為預定利率、預定死亡率。死亡率 在考題上可能為年金生命表、年紀、性別。"}, {"num": "164", "chapter": "第五章", "answer": 3, "question": "依國家發展委員會人口推估報告書之說明，下列何者有誤？", "options": ["我國自民國107年起邁入高齡社會", "預估 於民國114年將進入超高齡社會", "仰賴人口係指0至14歲的人口", "青壯年人口係指15歲至64歲的人口。(3)仰賴人口：0-14歲以及65歲以上人口。"], "explanation": ""}, {"num": "167", "chapter": "第五章", "answer": 3, "question": "長期照顧保險之被保險人經專科醫師診斷後依診斷書判定符合長期照顧狀態者，給予保險給付，所謂長 期照顧狀態係指被保險人經專科醫師診斷符合下列哪些情形者", "options": ["持續6個月以上失智並有分辨上障礙且 依臨床失智量表評估中等以上", "依臨床專業評量表診斷判定5個月內有進食及移位障礙", "依巴氏量表判 定3個月內有移位、如廁及沐浴等3項障礙", "以上皆是。"], "explanation": "所謂長期照顧狀態係指被保險人經專科醫師診斷符合下列二項情形之一者，1.生理 功能障礙：指被保險人經專科醫師依巴氏量表診斷判定不得高於6個月以上，其進 食、移位、如廁、沐浴、平地行動及更衣等六項日常生活自理能力持續存有3項以 上障礙。2.認知功能障礙：指被保險人經專科醫師依巴氏量表診斷判定不得高於6 個月以上，仍維持續失智狀態，並有時間、場所及人物三項分辨障礙之2項分辨障 礙"}, {"num": "170", "chapter": "第五章", "answer": 2, "question": "所謂團體一年定期壽險之「平均保險費率」是依A被保險團體的危險程度；B每一被保險員工的年齡；C 每一被保險員工的保險金額；D每一被保險員工的性別；所計算出的保險費總和除以全體被保險員工保 險金額總和計算", "options": ["ABD", "BCD", "ABCD", "ABC。"], "explanation": "所謂團體一年定期壽險之「平均保險費率」是按訂定本契約或續保時，依要保人 的危險程度及每一被保險人的性別、年齡、保險金額所算出的保險費總和除以全 體被保險人保險金額總和計算。 『被保險團體』的危險程度→應改為『要保人』 答案為2"}, {"num": "172", "chapter": "第五章", "answer": 2, "question": "依據「保險業辦理微型保險業務應注意事項」規定，微型保險附加費用率上限為", "options": ["純保費之10%", "總保 費之15%", "純保費之15%", "總保費之10%。"], "explanation": "依據「保險業辦理微型保險業務應注意事項」規定，微型保險附加費用率上限為 總保費之15%。"}, {"num": "180", "chapter": "第五章", "answer": 3, "question": "年金給付開始日為民國94年以前之利率變動型年金保險，下列何者可能被引用作為計算保險費之基礎？", "options": ["年金生命表死亡率之90%", "年金生命表死亡率之130%", "年金生命表死亡率之110%", "年金生命表死 亡率之70%。"], "explanation": "94年以前以年金生命表死亡率之100%-120%為基礎。"}, {"num": "181", "chapter": "第五章", "answer": 1, "question": "利率變動型年金甲型於給付期間，保戶可領取之年金金額與下列何者有關：A預定死亡率；B預定附加費 用率；C預定利率；D宣告利率", "options": ["AC", "AB", "AD", "ABC。"], "explanation": "利率變動型年金甲型於給付期間，是以預定死亡率、預定利率來換算定額年金。"}, {"num": "186", "chapter": "第五章", "answer": 4, "question": "利率變動型年金甲型在年金給付開始時，以當時之", "options": ["預定利率", "年金生命表", "年齡", "以上皆是 換算定 額年金。"], "explanation": "利率變動型年金甲型：年金給付開始時，以當時之預定死亡率(年齡、性別、年金 生命表)、及預定利率換算定額年金。"}, {"num": "193", "chapter": "第五章", "answer": 1, "question": "有關小額終老保險何者正確？A主約、附約的預定附加費用率皆不得超過總保費之10%；B保險費約為其 他終身壽險的七成左右；C主約、附約個別被保險人之投保年齡加計繳費期間之數值最高皆不超過90；D 主約、附約皆不得有增額或加倍給付之設計，並以承保單一保險事故為限", "options": ["BCD", "ABC", "ABCD", "BC。"], "explanation": "正確答案是1 A.附約預定附加費用率不得超過總保費之15%"}, {"num": "202", "chapter": "第六章", "answer": 4, "question": "下列何者非壽險公司承保新契約時契約選擇之程序？", "options": ["業務員的選擇", "核保人員的選擇", "公司體檢醫 師的選擇", "生存調查人員的選擇。"], "explanation": "壽險公司承保新契約時，契約選擇的程序可以分為三個階段(一)業務員的選擇(二) 公司體檢醫師的選擇(三)核保人員的選擇。"}, {"num": "214", "chapter": "第六章", "answer": 2, "question": "下列何者正確？A要保人如尚未成年，皆須經過法定代理人簽章同意契約始生效；B被保險人之職業須確 實填寫；C要保人或被保險人不能親自填寫者，保險契約得由業務員代為填寫再由保戶親自簽名；D保險 契約保戶親自簽名處如為保戶親自按摺印，其意思表示及效力與親簽一樣", "options": ["ABD", "BD", "BC", "ABC。"], "explanation": "A未成年人已婚者，為有行為能力之人C如要保人或被保險人不能親自填寫，得由 其家屬代寫，但要註明經過，填寫完成，仍應由要保人及被保險人親自簽章。"}, {"num": "239", "chapter": "第七章", "answer": 4, "question": "人身保險業初年度保費收入之行銷通路來源占率由大至小順序為", "options": ["壽險公司、保險經紀人/代理人、銀 行保險、其他通路", "銀行保險、壽險公司、其他通路、保險經紀人/代理人", "銀行保險、壽險公司、保 險經紀人/代理人、其他通路", "壽險公司、銀行保險、保險經紀人/代理人、其他通路。"], "explanation": "人身保險業初年度保費收入之行銷通路來源占率：壽險公司49.13%>銀行保險 36.58%>保險經紀人/代理人14.28%>其他通路(截至112/12)。"}, {"num": "256", "chapter": "第七章", "answer": 3, "question": "壽險行銷通路若分為仲介行銷及直接行銷，下列何者係屬直接行銷通路？A郵寄行銷；B電話行銷；C職 域或關係企業行銷；D架設網路平台行銷", "options": ["AB", "ABD", "ABCD", "BC。 某甲投保每年複利增值3%之二十年期養老保險，保額20萬元，某甲在投保後第二年死亡，則其可獲得 附錄 的死亡保險金為(1)206,000(2)20萬(3)218,545(4)212,180 元。"], "explanation": "直接通路： 賣方主動-郵寄、電話行銷、職域或關係企業 行銷、架設網路平台 買方主動-語音電話、網路、櫃台行銷、電視 行銷 保險金算法為 20萬*1.03*1.03=212,180"}];
let mode='quiz', cur=0, answered=0, correctCnt=0, wrongIdxList=[];
let reviewQueue=[], reviewAnswered=0, reviewCorrect=0;

function setMode(m){
  mode=m;
  document.getElementById('modeBadge').textContent=m==='quiz'?'📝 測驗模式':'🔁 錯題練習';
}
function resetStats(total){
  answered=0;correctCnt=0;
  document.getElementById('totalQ').textContent=total;
  ['doneQ','correctQ','wrongQ'].forEach(id=>document.getElementById(id).textContent=0);
}
function updateProg(idx,total,done){
  const pct=Math.round(done/total*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progText').textContent=`第 ${idx+1} / ${total} 題　完成 ${pct}%`;
}
function getQ(){return mode==='quiz'?ALL_Q[cur]:ALL_Q[reviewQueue[cur]];}

function renderQ(){
  document.getElementById('mainWrap').innerHTML='';
  const q=getQ();
  const labels=['(1)','(2)','(3)','(4)'];
  const total=mode==='quiz'?ALL_Q.length:reviewQueue.length;
  const revBadge=mode==='review'?'<span class="q-badge qb-rev">🔁 錯題練習</span>':'';
  const optsHtml=q.options.map((o,i)=>
    `<div class="opt" id="opt${i}" onclick="choose(${i+1})">
       <span class="opt-label">${labels[i]}</span><span>${o||'（選項）'}</span>
     </div>`
  ).join('');
  document.getElementById('mainWrap').innerHTML=`
    <div class="q-card">
      <div class="q-meta">
        <span class="q-badge qb-num">題 ${q.num}</span>
        <span class="q-badge qb-ch">${q.chapter}</span>
        ${revBadge}
      </div>
      <div class="q-text">${q.question}</div>
      <div class="opts" id="opts">${optsHtml}</div>
      <div id="afterZone"></div>
    </div>`;
  updateProg(cur,total,mode==='quiz'?answered:reviewAnswered);
}

function choose(sel){
  const q=getQ();
  const corr=q.answer;
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  document.getElementById('opt'+(sel-1)).classList.add(sel===corr?'correct':'wrong');
  if(sel!==corr) document.getElementById('opt'+(corr-1)).classList.add('show-correct');
  const zone=document.getElementById('afterZone');
  // 詳解只在錯題練習模式，答完後才插入 DOM
  if(mode==='review' && q.explanation){
    const box=document.createElement('div');
    box.className='explain-box';
    box.textContent=q.explanation;
    zone.appendChild(box);
  }
  const row=document.createElement('div');
  row.className='btn-row';
  const total=mode==='quiz'?ALL_Q.length:reviewQueue.length;
  const isLast=cur>=total-1;
  if(mode==='quiz'){
    answered++;if(sel===corr)correctCnt++;else wrongIdxList.push(cur);
    document.getElementById('doneQ').textContent=answered;
    document.getElementById('correctQ').textContent=correctCnt;
    document.getElementById('wrongQ').textContent=wrongIdxList.length;
    updateProg(cur,total,answered);
    const btn=document.createElement('button');
    btn.className='btn btn-p';
    btn.textContent=isLast?'查看成績 🏆':'下一題 →';
    btn.onclick=()=>{isLast?showResult():(cur++,renderQ());};
    row.appendChild(btn);
  }else{
    reviewAnswered++;if(sel===corr)reviewCorrect++;
    document.getElementById('doneQ').textContent=reviewAnswered;
    document.getElementById('correctQ').textContent=reviewCorrect;
    document.getElementById('wrongQ').textContent=reviewAnswered-reviewCorrect;
    updateProg(cur,total,reviewAnswered);
    const btn=document.createElement('button');
    btn.className='btn btn-p';
    btn.textContent=isLast?'查看成績 🏆':'下一題 →';
    btn.onclick=()=>{isLast?showReviewResult():(cur++,renderQ());};
    row.appendChild(btn);
  }
  zone.appendChild(row);
}

function showResult(){
  const pct=Math.round(correctCnt/ALL_Q.length*100);
  const [em,lbl]=pct>=90?['🏆','優秀！']:pct>=70?['👍','良好']:pct>=50?['📚','需加強']:['💪','繼續努力'];
  let wrongHtml='';
  if(wrongIdxList.length){
    wrongHtml=`<div class="wrong-section"><div class="wrong-title">❌ 答錯 ${wrongIdxList.length} 題</div>`+
      wrongIdxList.map(i=>{
        const q=ALL_Q[i];
        return `<div class="wrong-item">
          <div class="wi-num">題 ${q.num} · ${q.chapter}</div>
          <div class="wi-q">${q.question.substring(0,80)}${q.question.length>80?'…':''}</div>
          <div class="wi-ans">✅ 正確：(${q.answer}) ${(q.options[q.answer-1]||'').substring(0,40)}</div>
        </div>`;
      }).join('')+'</div>';
  }
  document.getElementById('mainWrap').innerHTML=`
    <div class="result-card">
      <div class="result-score">${pct}%</div>
      <div class="result-label">${em} ${lbl}</div>
      <div class="result-sub">答對 ${correctCnt} / ${ALL_Q.length} 題</div>
      <div class="result-btns">
        <button class="btn btn-s" onclick="startQuiz()">🔄 重新測驗</button>
        ${wrongIdxList.length?`<button class="btn btn-p" onclick="startReview()">🔁 練習錯題（${wrongIdxList.length}題）</button>`:''}
      </div>
      ${wrongHtml}
    </div>`;
}

function showReviewResult(){
  const pct=Math.round(reviewCorrect/reviewQueue.length*100);
  const [em,lbl]=pct>=90?['🏆','全掌握了！']:pct>=70?['👍','大部分搞懂']:['📚','再練一次'];
  document.getElementById('mainWrap').innerHTML=`
    <div class="result-card">
      <div class="result-score">${pct}%</div>
      <div class="result-label">${em} ${lbl}</div>
      <div class="result-sub">錯題練習：答對 ${reviewCorrect} / ${reviewQueue.length} 題</div>
      <div class="result-btns">
        <button class="btn btn-s" onclick="startQuiz()">🔄 重頭測驗</button>
        <button class="btn btn-p" onclick="startReview()">🔁 再練一次錯題</button>
      </div>
    </div>`;
}

function startQuiz(){
  setMode('quiz');cur=0;wrongIdxList=[];resetStats(ALL_Q.length);renderQ();
}
function startReview(){
  reviewQueue=wrongIdxList.slice();
  setMode('review');cur=0;reviewAnswered=0;reviewCorrect=0;
  resetStats(reviewQueue.length);renderQ();
}
startQuiz();
</script>
</body>
