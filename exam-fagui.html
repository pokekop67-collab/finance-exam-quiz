<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務員考照衝刺｜保險法規</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
  
  :root {
    --primary: #11998e;
    --secondary: #38ef7d;
    --accent: #0fd850;
    --bg: #f8f9ff;
    --card: #ffffff;
    --text: #2d3748;
    --muted: #718096;
    --correct: #48bb78;
    --wrong: #fc8181;
    --border: #e2e8f0;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  
  .hero {
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    color: white;
    padding: 40px 20px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    top: -100px; right: -100px;
  }
  .hero h1 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
  .hero p { font-size: 1rem; opacity: 0.85; }
  .hero .stats { 
    display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap;
  }
  .hero .stat {
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.9rem;
  }
  .hero .stat strong { display: block; font-size: 1.5rem; font-weight: 900; }
  
  .controls {
    max-width: 900px;
    margin: -20px auto 0;
    padding: 0 16px;
    position: relative;
    z-index: 10;
  }
  
  .control-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  
  .control-card select, .control-card input {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    cursor: pointer;
    flex: 1;
    min-width: 140px;
  }
  .control-card select:focus, .control-card input:focus {
    border-color: var(--primary);
  }
  
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-secondary { background: var(--bg); color: var(--primary); border: 2px solid var(--primary); }
  .btn-secondary:hover { background: var(--primary); color: white; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { opacity: 0.85; }
  
  .progress-bar {
    max-width: 900px;
    margin: 16px auto 0;
    padding: 0 16px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .bar {
    background: var(--border);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 999px;
    transition: width 0.5s ease;
  }
  
  .quiz-area {
    max-width: 900px;
    margin: 24px auto;
    padding: 0 16px 60px;
  }
  
  .question-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 2px solid transparent;
    transition: all 0.2s;
    display: none;
  }
  .question-card.visible { display: block; }
  .question-card:hover { border-color: var(--primary); }
  .question-card.answered { border-color: var(--correct); }
  
  .q-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .q-num {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .q-chapter {
    background: rgba(99,102,241,0.1);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .q-status {
    margin-left: auto;
    font-size: 1.2rem;
  }
  
  .q-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
  }
  
  .options {
    display: grid;
    gap: 8px;
    margin-bottom: 16px;
  }
  .option {
    padding: 12px 16px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .option:hover { background: #eef2ff; border-color: var(--primary); }
  .option.correct { background: #f0fff4; border-color: var(--correct); color: #22543d; }
  .option.wrong { background: #fff5f5; border-color: var(--wrong); color: #742a2a; }
  .option.selected { border-color: var(--primary); background: #eef2ff; }
  
  .reveal-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reveal-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  
  .answer-block {
    margin-top: 14px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #f0fff4, #e6fffa);
    border: 1.5px solid var(--correct);
    border-radius: 12px;
    display: none;
  }
  .answer-block.show { display: block; }
  .answer-label {
    font-weight: 900;
    color: #22543d;
    font-size: 0.88rem;
    margin-bottom: 6px;
  }
  .explanation {
    font-size: 0.88rem;
    color: #2f855a;
    line-height: 1.7;
  }
  
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  
  .chapter-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 999px;
    border: 2px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 700;
    font-family: inherit;
    transition: all 0.2s;
    color: var(--muted);
  }
  .tab:hover { border-color: var(--primary); color: var(--primary); }
  .tab.active { background: var(--primary); border-color: var(--primary); color: white; }
  
  .score-banner {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
    display: none;
  }
  .score-banner.show { display: block; }
  .score-banner .score-num { font-size: 3rem; font-weight: 900; }
  
  @media (max-width: 600px) {
    .hero h1 { font-size: 1.5rem; }
    .question-card { padding: 16px; }
    .control-card { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>📋 業務員考照衝刺｜保險法規</h1>

  <div class="stats">
    <div class="stat"><strong id="total-count">0</strong>共幾題</div>
    <div class="stat"><strong id="answered-count">0</strong>已作答</div>
    <div class="stat"><strong id="correct-count">0</strong>答對</div>
    <div class="stat"><strong id="accuracy-pct">—</strong>正確率</div>
  </div>
</div>

<div class="controls">

    <select id="chapter-filter" onchange="filterQuestions()">
      <option value="all">📚 全部章節</option>

    <input type="text" id="search-box" placeholder="🔍 搜尋題目關鍵字..." oninput="filterQuestions()" />
    <button class="btn btn-primary" onclick="randomMode()">🎲 隨機出題</button>
    <button class="btn btn-secondary" onclick="resetAll()">🔄 重新開始</button>
    <button class="btn btn-accent" onclick="showAll()">👁️ 全部顯示答案</button>
  </div>
</div>

<div class="progress-bar">
  <div class="progress-info">
    <span id="progress-text">進度 0 / 0</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="bar"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
</div>

<div class="quiz-area">
  <div class="chapter-tabs" id="chapter-tabs"></div>
  <div class="score-banner" id="score-banner">
    <div>🎉 全部作答完成！</div>
    <div class="score-num" id="final-score">0/0</div>

  </div>
  <div id="questions-container"></div>
</div>

const ALL_QUESTIONS = [{"num": 1, "chapter": "第一章", "question": "", "answer": "4", "explanation": "要保人對於下列各人之生命或身體有保險利益： 1.本人或其家屬 2.生活費或教育費所仰給之人 3.債務人 4.為本人管理財產或利益之人 (A)為債權人，對其無生命或身體無保險利益(B)為 本人(C)債務人。"}, {"num": 2, "chapter": "第一章", "question": "張三為要保人，對下列何者生命或身體有保險利益？A 借錢給張三的李 四；B 張三本人；C 欠張三錢的王老五 (1)A (2)BC (3)AB (4)ABC", "answer": "2", "explanation": "保險法第146 條之4 規定：保險業資金依前項規 定辦理國外投資總額，由主管機關視各保險業之經 營情況核定之，最高不得超過各該保險業資金百分 之四十五。"}, {"num": 3, "chapter": "第一章", "question": "依保險法第146 條之4 規定保險業辦理國外投資總額最高不得超過各該 保險業百分之？(1)35% (2)15% (3)45% (4)30% 保險業得以共保方式承保情形有 A 基於公共利益考量；B 配合政策需 要；C 能有效提升對投保大眾服務；D 有關巨災損失保險 (1)ABC (2)ABCD (3)ABD (4)BCD", "answer": "2", "explanation": "保險法第144-1 條規定：有下列情形之一者，保 險業得以共保方式承保： 一、有關具災損失之保險者 二、配合政策需要者 三、基於公共利益之考量者 四、能有效提升對投保大眾之服務者 五、其他經主管機關核准者"}, {"num": 4, "chapter": "第一章", "question": "", "answer": "2", "explanation": ""}, {"num": 5, "chapter": "第一章", "question": "以未滿15 歲之未成年人投保含死亡給付之傳統型人壽保險契約，於滿15 歲前身故者，保險公司應(1)返還帳戶價值(2)返還保單價值準備金(3)不得 超過遺產及贈與稅法第17 條有關遺產稅喪葬費用之一半(4)依約給付保險 金", "answer": "3", "explanation": "C 業務員不得代為填寫保險契約及代客戶簽名 保險法第107 條規定：以未滿十五歲之未成年人 為被保險人訂立之人壽保險契約，除喪葬費用之給 付外，其餘死亡給付之約定於被保險人滿十五歲時 始生效力。前項喪葬費用之保險金額，不得超過遺 產及贈與稅法第十七條有關遺產稅喪葬費扣除額之 一半。"}, {"num": 6, "chapter": "第一章", "question": "有關受益人規定何者正確 A 因保險給付不同可區分為滿期、身故、失能 或醫療、年金 及紅利等受益人：B 為人身保險契約關係人：C 保險事故 發生時有權受領保險金，而失能保險金之受益人不以被保險人為限：D 與要保人對被保險人需有保險利益 (1)ABD (2)ABCD (3)BCD (4)AB", "answer": "4", "explanation": "C 示範條款規定：失能及醫療保險之受益人以被保 險本人為限，且事後不得加以更改。 D 受益人之指定或變更屬要保人之權利，無人數及 對象之限制。"}, {"num": 7, "chapter": "第一章", "question": "", "answer": "4", "explanation": "保險法第121 條規定：受益人故意致被保險人於 死或雖未致死者，喪失其受益權。因此保險公司仍 需給付全額失能保險金。"}, {"num": 8, "chapter": "第一章", "question": "受益人謀害被保險人未致死僅致失能，則保險公司給付 (1)保單價值準備 金 (2)全額失能保險金 (3)全部已繳保險費 (4)失能保險金 1/2 有關保險法之規定何者正確？ (1)人身保險契約得為指示式或無記名式 (2)除要保人 外，其餘利害關係人不得向保險人請求保險契約謄本 (3)受 益人有疑議時，其保險金額作為被保險人遺產 (4)本法之強制規定不得以 契約變更之，但有利於被保險人者不在 此限", "answer": "4", "explanation": "保險法第121 條規定：受益人故意致被保險人於 死或雖未致死者，喪失其受益權。因此保險公司仍 需給付全額失能保險金。 (1)保險法第49 條規定：保險契約除人身保險外， 得為指示式或無記名式。 (2)保險法第44 條規定：利害關係人，均得向保險 人請求保險契約謄本。 (3)保險法第45 條規定：受益人有疑義時，推定要 保人為自己之利益而訂定。"}, {"num": 9, "chapter": "第一章", "question": "有關保險利益原則之敘述，何者為非？(1)又稱為可保利益原則(2)存在目 的系避免賭博行為發生(3)要保人對於為其管理財產之人具有保險利益(4) 債權人對債務人之保險利益沒有限制。", "answer": "4", "explanation": "(4)債務人，債權人僅能於債務人所欠的債務金額內 具有保險利益。"}, {"num": 10, "chapter": "第一章", "question": "", "answer": "4", "explanation": "(4)債務人，債權人僅能於債務人所欠的債務金額內 具有保險利益。"}, {"num": 11, "chapter": "第一章", "question": "有關保險利益之敘述，何者有誤？(1)凡基於有效契約而生之利益，得為 保險利益(2)被保險人死亡，保險契約除另有訂定外，仍為繼承人之利益 而存在(3)合夥人為被保險人時，其中一人讓與保險利益於他人者，保險 契約失其效力(4)要保人對於因財產上之現有利益而生之期待利益，有保 險利益。", "answer": "3", "explanation": "(3)合夥人或共有人聯合為被保險人時，其中一人或 數人讓與保險利益於他人者，保險契約不因之而失 效。"}, {"num": 12, "chapter": "第一章", "question": "死亡保險金受益人為被保險人配偶王大華，被保險人亡故前已離婚且再 婚，則被保險人死亡時該死亡保險金歸(1)前配偶王大華(2)要保人或其他 應得之人(3)被保險人遺產(4)再婚之配偶。", "answer": "1", "explanation": "此案屬於受益人有確定者，則被保險人死亡時該死 亡保險金歸此約定受益人。"}, {"num": 13, "chapter": "第一章", "question": "有關代位原則敘述何者錯誤？(1)財產保險適用(2)因為人身無價，故人壽 保險不適用(3)又稱為權利代位(4)保險人於賠償後須經被保險人同意始得 代位行使被保險人對於第三人之請求權。", "answer": "4", "explanation": "此案屬於受益人有確定者，則被保險人死亡時該死 亡保險金歸此約定受益人。 (4)保險人於賠償後，可直接向加害第三人要求賠 償。"}, {"num": 14, "chapter": "第一章", "question": "各項保險給付之受益人，何者錯誤？(1)滿期保險金受益人由要保人指 定，變更時由要保人申請(2)紅利給付之受益人皆為要保人(3)醫療給付之 受益人以被保險人為限，且不得事後加以變更(4)身故保險金如作為被保 險人遺產，依民法繼承順位分配。", "answer": "2", "explanation": "(4)保險人於賠償後，可直接向加害第三人要求賠 償。 (2)若紅利未特別指定予何人，紅利原則上應由要保 人領取。"}, {"num": 15, "chapter": "第一章", "question": "有關最大誠信原則何者正確？A 契約訂立時要保人或被保險人應將有關的 重要事實告訴保險人；B 業務員應於親晤被保險人後誠實填報業務員報告 書；C 要保人違反告知義務時保險人得解除契約；D 為維護契約安定性， 如保險事故發生保險人才知要保人違反告知義務時，且危險發生基於未說 明事實者，仍不得解除契約(1)ABC(2)ABCD(3)AC(4)ACD", "answer": "3", "explanation": "(2)若紅利未特別指定予何人，紅利原則上應由要保 人領取。 B 業務員於親晤被保險人後誠實填報業務員報告書 不屬於最大誠信原則；D 為維護契約安定性，如保 險事故發生保險人才知要保人違反告知義務時，且 危險發生基於未說明事實者，得解除契約"}, {"num": 16, "chapter": "第一章", "question": "有關要保人何者為非？(1)須投保時填寫要保書並善盡告知、通知保險公 司保險事故發生之義務(2)向保險人申請訂立保險契約之人(3)有指定各項 保險金受益人、申請保險單借款及聲明保費自動墊繳之權利(4)以上皆 是。", "answer": "3", "explanation": "失能保險金、醫療保險金、年金保險金之受益人皆 為被保險人本人。"}, {"num": 17, "chapter": "第一章", "question": "", "answer": "3", "explanation": "失能保險金、醫療保險金、年金保險金之受益人皆 為被保險人本人。"}, {"num": 18, "chapter": "第一章", "question": "何者非要保人可指定受益人領取之保險金?A 失能保現金；B 醫療保險 金；C 終身壽險保險金；D 年金保險金(1)BCD(2)ACD(3)ABD(4)AB 3 失能保險金、醫療保險金、年金保險金之受益人皆 為被保險人本人。", "answer": "", "explanation": ""}, {"num": 19, "chapter": "第一章", "question": "有關要保人之敘述何者正確?A 保險契約當事人；B 自然人；C 機關行 號；D 對保險對象需具有保險利益(1)CD(2)ABCD(3)ABD(4)BCD。 2 ABCD 皆正確。 (1)無效(2)失其效力(3)需債務人同意後才有效(4)有效。 4 債權人未經債務人書面承認而逕以債務人為被保險 人訂立之年金保險契約有效。", "answer": "", "explanation": ""}, {"num": 20, "chapter": "第一章", "question": "債權人未經債務人書面承認而逕以債務人為被保險人訂立之年金保險契約 (1)無效(2)失其效力(3)需債務人同意後才有效(4)有效。 4 債權人未經債務人書面承認而逕以債務人為被保險 人訂立之年金保險契約有效。 有效契約有保險利益(3)不得為保險利益(4)以上皆是。 1 保險法第20 條規定，於有效契約而生之利益，亦 得為保險利益。", "answer": "", "explanation": ""}, {"num": 21, "chapter": "第一章", "question": "依保險法第20 條規定基於有效契約而生之利益(1)得為保險利益(2)僅得對 有效契約有保險利益(3)不得為保險利益(4)以上皆是。 1 保險法第20 條規定，於有效契約而生之利益，亦 得為保險利益。 下列何者錯誤？(1)失能保險金的受益人原則上為被保險人本人，如要變 更須在保險事故發生前(2)要保人可隨時終止保險契約(3)受益人應在知悉 保險事故發生後，於法定或契約約定期間內通知保險公司，並檢具所需文 件申領保險金(4)受益人係經要保人指定，享有保險金請求權的人。", "answer": "1", "explanation": "被保險人若身體遭受失能必須就醫治療時，為使失 能保險金能確實作為支應被保險人因失能所引起的 各項費用，所以失能保險之受益人以被保險人本人 為限，且不得加以變更。"}, {"num": 22, "chapter": "第一章", "question": "有關主力近因原則之敘述，何者正確？A 類似民法上的相當因果關係；B 常用於傷害保險與健康保險之賠償責任認定；C 導致被保險人死亡原因有 2 個以上，而每個原因有因果關係雖有中斷，其最先發生原因仍為主力近 因；D 即指最直接或最接近被保險人死亡的原因 (1)ABD(2)ABCD(3)AB(4)BC。", "answer": "3", "explanation": "主力近因是指致被保險人死亡或受傷最主要或有效 的原因，而不是最直接或最接近的原因，類似民法 中的因果關係，假設原因有2 個以上，且每個原因 之間有因果關係且未中斷時，則以最先發生並造成 一連串事故之原因為主力近因。"}, {"num": 23, "chapter": "第一章", "question": "受益人經指定後(1)經被保險人同意於保險事故發生前得變更受益人(2)不 得再變更受益人(3)於保險事故發生前得變更受益人(4)於保險事故發生後 得變更受益人。", "answer": "1", "explanation": "受益人經要保人指定後，要保人在保險事故發生 前，仍得以契約或遺囑處分之。要保人行使變更受 益人之處分權時，應通知保險公司並檢附被保險人 同意書。"}, {"num": 24, "chapter": "第一章", "question": "張三以自己為要保人，對下列何者之生命或身體無保險利益：A 借錢給 張三的李四；B 張三本人；C 欠張三錢的王老五(1)A(2) AC(3)ABC(4)BC。", "answer": "1", "explanation": "要保人對於下列個人之生命或身體有保險利益： 本人或家屬、生活費或教育費養給之人、債務人、 為本人管理財產獲利益之人。"}, {"num": 25, "chapter": "第一章", "question": "", "answer": "1", "explanation": ""}, {"num": 26, "chapter": "第一章", "question": "依保險法第17 條之規定，要保人或被保險人，對於保險標的物無保險利 益者，保險契約(1)有效(2)無效(3)失其效力(4)以上皆非。 3 要保人或被保險人，對於保險標的物無保險利益 者，保險契約失其效力。 依據保險法規定，要保人的權力包含A 變更失能及醫療保險金之受益 人；B 行使契約撤銷權；C 申請契約變更；D 申請保險單借款、聲明續期 保險費自動墊繳(1)ABCD(2)ABD(3)ABC(4)BCD。", "answer": "4", "explanation": "A 失能及醫療保險金之受益人以被保險人本人為 限，且不得事後加以變更。"}, {"num": 27, "chapter": "第一章", "question": "某甲為支應其子某乙之學費向丙銀行貸款，請問下列何者對某甲具有保險 利益？A 甲；B 乙；C 丙銀行；D 某甲投保的保險公司 (1)BCD(2)AB(3)ABC(4)A。", "answer": "3", "explanation": "A 失能及醫療保險金之受益人以被保險人本人為 限，且不得事後加以變更。 甲提供乙學費，甲即為乙生活費或教育費所仰給之 人，則乙對甲有保險利益；丙銀行借款給甲，甲是 債務人，丙是債權人，債權人對債務人有保險利 益。Ａ甲對自己有保險利益；Ｂ乙對甲有保險利 益；Ｃ丙銀行是債權人，對甲也有保險利益"}, {"num": 28, "chapter": "第一章", "question": "對於要保人的敘述，何者錯誤(1)要保人訂立保險契約不得委由代理人代 理(2)要保人可以為自然人或法人(3)要保人負有交付保險費之義務(4)要保 人對被保險人須具有保險利益。", "answer": "1", "explanation": "依保險法第46 條：「保險契約由代理人訂立者，應 載明代訂之意旨」之規定辦理，故得委由代理人代 理。"}, {"num": 29, "chapter": "第一章", "question": "", "answer": "1", "explanation": "依保險法第45 條第2 項規定：「受益人有疑義 時，推定要保人為自己之利益而訂立」即由法律推 定以要保人為受益人。"}, {"num": 30, "chapter": "第一章", "question": "按照我國保險法條規定，受益人有疑義時，推定誰為受益人？(1)要保人 (2)被保險人(3)被保險人之法定繼承人(4)以上三者皆可。 有關保險受益人之規定，何者正確？A 因保險給付不同可區分為滿期、身 故、失能或醫療、年金及紅利等受益人；B 為人身保險契約關係人；C 保 險事故發生時有權受領保險金，而失能保險金之受益人不以被保險人為 限；D 與要保人、被保險人須具有保險利益 (1)BCD(2)AB(3)ABCD(4)ABD。", "answer": "2", "explanation": "依保險法第45 條第2 項規定：「受益人有疑義 時，推定要保人為自己之利益而訂立」即由法律推 定以要保人為受益人。 C 保險事故發生時有權受領保險金，而失能保險金 之受益人僅以被保險人為限；D 要保人只對被保險 人具有保險利益。"}, {"num": 31, "chapter": "第一章", "question": "人壽保險受益人之指定何者正確？A 除自然人外，得指定法人；B 得指定 一人或數人；C 可同時指定自然人及法人；D 訂立保險契約時得僅載明確 定受益人之方法(1)ABCＤ(2)ABC(C)BD(4)ABD。", "answer": "2", "explanation": "指定時不限於指出受益人之姓名，即以類名指定亦 可，如配偶、子女。"}, {"num": 32, "chapter": "第一章", "question": "", "answer": "2", "explanation": "指定時不限於指出受益人之姓名，即以類名指定亦 可，如配偶、子女。"}, {"num": 33, "chapter": "第一章", "question": "下列何者不是保險契約之成立要件(1)受益人與被保險人間須有保險利益 (2)意思表示一致(3)要保人須具有行為能力(4)支付對價。 1 (1)要保人與被保險人間須有保險利益。 管理財產或利益之人(4)生活費或教育費所收受之人。 4 要保人對於生活費或教育費所仰給之人有保險利 益。", "answer": "", "explanation": ""}, {"num": 34, "chapter": "第一章", "question": "要保人對下列何者之生命或身體，無保險利益(1)債務人(2)本人(3)為本人 管理財產或利益之人(4)生活費或教育費所收受之人。 4 要保人對於生活費或教育費所仰給之人有保險利 益。 者(3)有保險利益者且生存者(4)有行為能力者 為限。 2 依保險法之規定，受益人於請求保險金時，應以生 存者為限。", "answer": "", "explanation": ""}, {"num": 35, "chapter": "第一章", "question": "依保險法之規定，受益人於請求保險金時，應以(1)有保險利益者(2)生存 者(3)有保險利益者且生存者(4)有行為能力者 為限。 2 依保險法之規定，受益人於請求保險金時，應以生 存者為限。", "answer": "", "explanation": "人身保險契約僅適用保險利益原則、最大誠信原 則、主力近因原則。產險除了適用上述三項原則 外，另適用損害填補、分攤、保險代位原則。"}, {"num": 36, "chapter": "第一章", "question": "人壽保險契約是以人的生命或身體為保險標的，所以適用(1)損害填補原 則(2)分攤原則(3)保險代位原則(4)以上皆非。", "answer": "4", "explanation": "人身保險契約僅適用保險利益原則、最大誠信原 則、主力近因原則。產險除了適用上述三項原則 外，另適用損害填補、分攤、保險代位原則。 分攤原則：指保險人和保險人之間，在保險事故發 生後對理賠金額的分攤。除實支實付型的健康險商 品較適用損害填補原則及分攤原則外，在人壽保險 並不適用分攤原則。"}, {"num": 37, "chapter": "第一章", "question": "A 人壽保險；B 實支實付型的健康保險；C 年金保險；D 日額型健康保 險，以上何者適用分攤原則(1)AB(2)BD(3)ABCD(4)B。 何謂主力近因原則？(1)非民法中的因果關係(2)是指導致被保險人死亡或 受傷的最主要或最有效的原因(3)導致保險事故發生的主要近因不一定是 保險單上所保的危險，且保險人仍應負責(4)以上皆是。", "answer": "2", "explanation": "主力近因：指導致被保險人死亡或受傷的最主要或 最有效的原因，類似我國民法上的相當因果關係， 如果導致保險事故發生的主要近因為保單上所保的 危險，則保險人自應負責，反之則不必負責。"}, {"num": 38, "chapter": "第一章", "question": "", "answer": "2", "explanation": ""}, {"num": 39, "chapter": "第一章", "question": "受益人的產生方式 A 約定；B 指定；C 確定；D 法定 (1)AB(2)BCD(3)ABD(4)ABCD。 3 受益人的產生方式有約定、指定、法定3 種方式。 益人(3)被保險人(4)保險業務員。 1 處分保單保單權利，如受益人之指定與變更(需被 保險人書面同意)、保單貸款等。", "answer": "", "explanation": ""}, {"num": 40, "chapter": "第一章", "question": "要保人以契約或遺囑變更受益人時，非經通知，不得對抗(1)保險人(2)受 益人(3)被保險人(4)保險業務員。 1 處分保單保單權利，如受益人之指定與變更(需被 保險人書面同意)、保單貸款等。 有關分攤原則敘述何者正確？A 由保險代位原則延伸而來；B 又稱為攤派 原則；C 分攤原則指保險費之分攤應公平合理；D 人壽保險及年金保險不 適用分攤原則(1)ABD(2)BD(3)BC(4)ABC。", "answer": "2", "explanation": "A 是從損害填補原則延伸而來；B 對於理賠金額之 分攤。"}, {"num": 41, "chapter": "第一章", "question": "", "answer": "2", "explanation": "A 是從損害填補原則延伸而來；B 對於理賠金額之 分攤。 要保人對以下人有保險利益：本人或其家屬、生活 費或教育費仰給之人、債務人、為本人管理財產或 利益之人。"}, {"num": 42, "chapter": "第一章", "question": "甲提供生活費或教育費給乙，則(1)甲與乙互無保險利益(2)乙對甲有保險 利益(3)甲與乙互有保險利益(4)甲對乙有保險利益。", "answer": "2", "explanation": "要保人對以下人有保險利益：本人或其家屬、生活 費或教育費仰給之人、債務人、為本人管理財產或 利益之人。"}, {"num": 43, "chapter": "第一章", "question": "下列有關保險人之規定，何者為非？(1)目前國內之保險公司，均為股份 有限公司(2)非保險業不得兼營保險業務(3)保險法之規定，保險業之組織 以股份有限公司或合作社為限(4)人身保險人可為法人或自然人。", "answer": "4", "explanation": "全選。 (4)人身保險人僅能為法人。"}, {"num": 44, "chapter": "第一章", "question": "下列何者正確？(1)滿7 歲之未成年人皆為限制行為能力人，其所為意思 表示及所受意思表示應得法定代理人允許(2)法院依聲請權人聲請其家屬 有精神障礙致不能為意思表示者，得為監護宣告或輔助宣告(3)未滿7 歲 之未成年人投保時，僅由法定代理人在法定代理人欄位親簽同意已足(4) 限制行為能力人為日常生活必需之意思表示，仍應得法定代理人允許。", "answer": "2", "explanation": "(4)人身保險人僅能為法人。 (1)滿7 歲之未成年人為限制行為能力人，其所為 意思表示及所受意思表示應得法定代理人允許，惟 未成年人已婚者，有行為能力(3)子女未滿7 歲， 須由法定代理人代簽孩子姓名及在法定代理人簽名 欄位上親自簽名同意(4)限制行為能力人為日常生活 必需之意思表示，不須得法定代理人允許。"}, {"num": 45, "chapter": "第一章", "question": "下列敘述何者正確？(1)保險契約有效期間是要保人與保險公司約定，交 付保險費的期間(2)受益人是指保險事故發生時身體遭受損害，享有賠償 請求權之人(3)受益人是指經要保人指定，享有保險金請求權的人(4)團體 保險契約之死亡受益人由要保人指定。", "answer": "3", "explanation": "(1)保險契約有效期間是要保人交付保險費後，保險 公司應負保險責任期間(2)受益人是要保人指定或要 保人或被保險人約定，保險事故發生時或約定情況 發生時，享有賠償請求權之人(4)團體保險契約之死 亡受益人被保險人家屬或指定法定繼承人 。"}, {"num": 46, "chapter": "第一章", "question": "", "answer": "3", "explanation": ""}, {"num": 47, "chapter": "第一章", "question": "下列何者依保險法規定得代為交付保險費 A 信託業；B 被保險人；C 受 益人；D 保險業務員 (1)BCD (2)BC (3)ABCD (4)ABC。 4 保險業務員不可代為交付保險費。 下列有關保險代位原則之敘述，何者正確？(1)人壽保險與產物保險依法 均得代位行使請求權(2)人壽保險不得代位行使請求權(3)指事故發生時， 由保險人代位行使被保險對第三人之請求權(4)以上皆是。", "answer": "2", "explanation": "(1)僅產物保險得行使代位請求權(3)指保險人於給 付賠償後，保險人代位行使被保險對第三人之請求 權。"}, {"num": 48, "chapter": "第一章", "question": "有關保險利益原則敘述何者正確？A 又稱為可保利益；B 指要保人對於被 保險人生命身體因具有利害關係而可享有的合法及不合法的經濟利益；C 要保人對於為其管理財產或利益之人有保險利益；D 保險利益包含現有利 益及期待利益(1)ABCD(2)AC(3)ABC(4)ACD。", "answer": "4", "explanation": "B 保險利益指要保人應對於被保險人之生命或身體 因具有利害關係而可享有之合法經濟利益。"}, {"num": 49, "chapter": "第一章", "question": "", "answer": "4", "explanation": "B 保險利益指要保人應對於被保險人之生命或身體 因具有利害關係而可享有之合法經濟利益。"}, {"num": 50, "chapter": "第一章", "question": "保險利益須存在於(1)被保險人與受益人間(2)要保人與受益人間(3)要保人 與被保險人間(4)要保人與保險人間。 3 保險利益：指要保人應對於被保險人之生命或身體 因具有利害關係而可享有之合法經濟利益。", "answer": "", "explanation": "訂立契約之雙方當事人必須具有行為能力，若為限 制行為能力之人，須經法定代理人同意或於限制原 因消滅後自己承認。"}, {"num": 51, "chapter": "第一章", "question": "要保人訂立契約須(1)具有行為能力(2)不須具有行為能力(3)限制行為能力 於限制原因消滅後自己承認(4)僅1、3 為是。 要保人對下列何者應付通知保險人之義務(1)為保險人所知者(2)經保險人 聲明不必通知者(3)為被保險人所知者(4)依通常注意為保險人所應知，或 無法諉為不知者。", "answer": "3", "explanation": "訂立契約之雙方當事人必須具有行為能力，若為限 制行為能力之人，須經法定代理人同意或於限制原 因消滅後自己承認。 要保人對為被保險人所知者應付通知保險人之義 務。"}, {"num": 52, "chapter": "第一章", "question": "(3)使被保險人不致不當得利(4)以上皆非。 3 分攤原則其主要目的是使被保險人不致不當得利， 由損害填補原則延伸而來。", "answer": "3", "explanation": "要保人對為被保險人所知者應付通知保險人之義 務。"}, {"num": 53, "chapter": "第一章", "question": "分攤原則其主要目的是(1)確定保險人賠償責任(2)使要保人不致不當得利 (3)使被保險人不致不當得利(4)以上皆非。 3 分攤原則其主要目的是使被保險人不致不當得利， 由損害填補原則延伸而來。 對於損害填補原則之敘述何者正確？A 防止被保險人不當得利；B 需保險 人有二張以上保險單才可能發生；C 僅適用於人身保險；D 僅適用於財產 保險(1)AD(2)A(3)BD(4)ABC。", "answer": "2", "explanation": "B 僅一張即可發生；C 只適用於實支實付健康險； D 可適用於實施時付健康險。"}, {"num": 54, "chapter": "第一章", "question": "有關人身保險契約之保險費何者為非？ (1)信託業依信託契約有交付保險 費義務者， 由信託業代為交付 (2)僅應由要保人依保險契約交付 (3)保險 契約簽定時保險費能確 定者，應於保險契約生效前交付之 (4)可分一次 及分期交付兩種", "answer": "2", "explanation": "B 僅一張即可發生；C 只適用於實支實付健康險； D 可適用於實施時付健康險。 保險法第115 條規定：利害關係人，均得代要保 人交付保險費。"}, {"num": 55, "chapter": "第二章", "question": "定後不能恢復紙本 (3)保費費率應該反映成本 (4)以上皆是 2 約定保單型態為電子保單後，仍舊可以與保險公司 申請補發紙本保單", "answer": "2", "explanation": "保險法第115 條規定：利害關係人，均得代要保 人交付保險費。"}, {"num": 56, "chapter": "第二章", "question": "下列有關電子保單的敘述何者為非？ (1)保險人與要保人共同約定 (2)約 定後不能恢復紙本 (3)保費費率應該反映成本 (4)以上皆是 2 約定保單型態為電子保單後，仍舊可以與保險公司 申請補發紙本保單 有關受益人之一為維持契約效力代繳險費之規定，何者錯誤： (1)受益人 領取保險金仍 依保單所載順序及比例給付 (2)受益人待繳保險費屬民法 上無因管理 (3)受益人代繳 保費，不影響與其他受益人間對於保險金有 連帶債權之關係 (4)代繳保費之受益人得 要求保險人不得將保險金給付 給其他受益人", "answer": "4", "explanation": "受益人經指定後，要保人得於保險事故發生前，以 契約或遺囑處分。"}, {"num": 57, "chapter": "第二章", "question": "", "answer": "4", "explanation": "受益人經指定後，要保人得於保險事故發生前，以 契約或遺囑處分。"}, {"num": 58, "chapter": "第二章", "question": "有關「繳費期間」之敘述何者正確？ (1)於繳費期間屆滿後，保險契約持 續有效到保險 期間終了 (2)「繳費期間」和「保險期間」一定相同 (3)繳 費期間是要保人與保險公司 所約定之保險契約存續期 (4)要保人不得約 定交付保險費的繳費期間比保險期間短的 保險契約", "answer": "1", "explanation": "以上選項皆正確 (2)繳費期間與保險期間不一定相同 (3)要保人與保險公司所約定之保險契約存續期指的 是保險期間 (4)無此項規定"}, {"num": 59, "chapter": "第二章", "question": "契約之解除與契約之終止，對契約效力而言 (1)解除為自解除之日起消 滅，終止為自始不存在 (2)解除為自始不存在，終止為自終止之日起消滅 (3)自解除或終止之日起不存在 (4)皆為自始不存在", "answer": "2", "explanation": "契約解除一經解除則溯及訂立時自始無效，且保險 人無須退還保費。 契約終止指的是保險契約的當事人不願讓契約存 續，中途使之效力終止，因此終止之契約效力為自 終止日起消滅。契約終止前發生之保險事故，保險 人仍應付保險責任。"}, {"num": 60, "chapter": "第二章", "question": "住院醫療費用保險若包含保證續保條款，保險公司可按續保生效當時重新 計算保險費 A 陳報主管機關之費率：B 該險種之經驗費率：C 被保險人 年齡：D 被保險人身體狀況 (1)AC (2)BD (3)BCD (4)ACD", "answer": "1", "explanation": "根據住院醫療費用保險單示範條款第12 條規定： 保證續保適用時，續保時，按續保生效當時依規定 陳報主管機關之費率及被保險人年齡重新計算保險 費。"}, {"num": 61, "chapter": "第二章", "question": "要保人自停效日起6 個月後申請復效者，保險人得於要保人申請復效日起 A 日內要求提供可保證明，或於收到前項可保證明後B 日內不為拒絕視為 同意復效，請問A、B 應為(1)A 為5，B 為15(2)A 為5，B 為10(3)A 為 10，B 為30(4)A 為10，B 為15。", "answer": "1", "explanation": "要保人自停效日起6 個月後申請復效者，保險人得 於要保人申請復效日起5 日內要求提供可保證明， 或於收到前項可保證明後15 日內不為拒絕者，視 為同意復效。"}, {"num": 62, "chapter": "第二章", "question": "", "answer": "1", "explanation": ""}, {"num": 63, "chapter": "第二章", "question": "保戶以網址取代紙本保單條款之規定，何者正確？(1)保單條款是保險人 與被保險人共同遵守的約定(2)保戶同意後不能再向保險人申請紙本保單 (3)保險人因此節省的紙張印製成本需於附加費用反映(4)以上皆是。", "answer": "3", "explanation": "(1)保單條款是保險人與要保人共同遵守的約定(2) 保戶同意後能再向保險人申請紙本保單。"}, {"num": 64, "chapter": "第二章", "question": "甲以無體檢保件投保後，發覺保險內容非當初本意，故書面向保險人行使 契約撤銷權，其契約(1)自書面送達時起自始無效(2)自書面到達之翌日零 時起自始無效(3)因無體檢保件，故甲不得主張撤銷權(4)自書面到達之日 零時起自始無效。", "answer": "2", "explanation": "(1)保單條款是保險人與要保人共同遵守的約定(2) 保戶同意後能再向保險人申請紙本保單。 無論有無體檢，要保人得於收到保單翌日起十日內 以書面檢同保險單撤銷契約，自書面到達之翌日零 時起自始無效。"}, {"num": 65, "chapter": "第二章", "question": "何者為適用人身保險之法定無效事由？A 契約訂立時保險標的危險已發生 或已消滅；B 由第三人訂立之死亡保險契約，未經被保險人書面同意並約 定保險金額；C 被保險人以不實年齡投保，其真實年齡已超過保險人所定 保險年齡限度者；D 要保人意圖不當得利而為複保險 (1)ABD(2)BCD(3)ABCD(4)ABD", "answer": "3", "explanation": "ABCD 皆為法定無效事由。"}, {"num": 66, "chapter": "第二章", "question": "有關利率變動型年金之敘述，何者為非？(1)若採分紅方式設計應明訂計 算方式及給付方式(2)甲型於給付期間僅採不分紅方式設計(3)於累積期間 不論甲型或乙型，均無紅利給付(4)乙型於給付期間通常無紅利給付。", "answer": "2", "explanation": "ABCD 皆為法定無效事由。 (2)甲型於給付期間可採分紅或不分紅方式。"}, {"num": 67, "chapter": "第二章", "question": "下列何者正確？(1)保險契約因違反告知義務而解除時，保險人應返還所 收保費(2)保險契約因保險人破產而中止，其終止後之保費已交付者無須 返還(3)保險人對於要保人或被保險人因履行道德上之義務所致之損害， 不負賠償責任(4)訂立保險契約時僅要保人知悉危險已發生，保險人得請 求償還費用，其已收受之保費無須返還。", "answer": "4", "explanation": "(2)甲型於給付期間可採分紅或不分紅方式。 (1)保險契約因違反告知義務而解除時，保險人無須 返還所收保費。(2)保險契約因保險人破產而中止， 其終止後之保險費，已交付者，保險人應返還之。 (3)保險人對於要保人或被保險人因履行道德上之義 務所致之損害，負賠償責任。"}, {"num": 68, "chapter": "第二章", "question": "", "answer": "4", "explanation": ""}, {"num": 69, "chapter": "第二章", "question": "下列何者正確？A 要保人得於收到保單翌日起十日內以書面檢同保險單終 止契約；B 契約撤銷效力自要保人書面意思表示到達保險人翌日零時起生 效；C 契約撤銷效力自要保人郵寄郵戳當日零時起生效；D 撤銷生效前如 發生保險事故，保險人仍應應負保險責任(1)ACD(2)AB(3)BD(4)BCD", "answer": "3", "explanation": "保險契約法定終止事由有保險人破產時、保險標的 物非因保險契約所載之事故而完全滅失時。 A 要保人得於收到保單翌日起十日內以書面檢同保 險單撤銷契約；C 契約撤銷效力自要保人郵寄郵戳 翌日零時起生效。"}, {"num": 70, "chapter": "第二章", "question": "保險契約如約定事項顯失公平者，該部分之約定無效，下列何者非無效事 由？(1)免除或減輕保險人依保險法應負之義務(2)使要保人、受益人或被 保險人拋棄或限制其依保險法所享之權利(3)加重保險人之義務(4)其他於 要保人、受益人或被保險人有重大不利益之情事。", "answer": "3", "explanation": "加重保險人之義務非約定無效事由。"}, {"num": 71, "chapter": "第二章", "question": "有關年金保險敘述，何者為是？A 保險費不得以訴訟方式請求交付；B 利 害關係人得代要保人交付保險費；C 保險費到期未交付不適用寬限期間之 規定；D 由第三人訂立之契約，未經被保險人書面同意並約定保險金額者 契約無效(1)BCD(2)ABC(3)ABD(4)AB。", "answer": "2", "explanation": "加重保險人之義務非約定無效事由。 D 由第三人訂立之年金保險契約，未經被保險人書 面同意並約定保險金額者契約仍有效。"}, {"num": 72, "chapter": "第二章", "question": "有關保險契約之敘述，何者正確？(1)當事人一方違背特約條款時，即使 危險已發生，他方仍得解除契約(2)當事人一方對於他方應通知之事項怠 於通知者，僅於故意造成，他方始得據為解約之原因(3)非因要保人或被 保險人行為致危險增加時，要保人或被保險人如未及時通知，對於保險人 因此所受之損失，免負賠償責任(4)以上皆是。", "answer": "1", "explanation": "D 由第三人訂立之年金保險契約，未經被保險人書 面同意並約定保險金額者契約仍有效。 (2)當事人一方對於他方應通知之事項怠於通知者， 如為故意隱匿，或因過失，遺漏或為不實之說明， 他方始得據為解約之原因(3)非因要保人或被保險人 行為致危險增加時，要保人或被保險人如未及時通 知，對於保險人因此所受之損失，應負賠償責任"}, {"num": 73, "chapter": "第二章", "question": "依保險法規定，傷害保險之保險費(1)到期未交付不適用寬限期間之規定 (2)保險人不得以訴訟請求交付(3)利害關係人不得代要保人交付(4)以上皆 非。", "answer": "4", "explanation": "(1)到期未交付適用寬限期間之規定(2)保險人得以 訴訟請求交付(3)利害關係人得代要保人交付。"}, {"num": 74, "chapter": "第二章", "question": "", "answer": "4", "explanation": "(1)到期未交付適用寬限期間之規定(2)保險人得以 訴訟請求交付(3)利害關係人得代要保人交付。"}, {"num": 75, "chapter": "第二章", "question": "有關傷害醫療保險金之敘述，何者為非？(1)實支實付型之保險給付，保 險公司僅就符合意外傷害事故，且於登記合格的醫院或診所治療之實際醫 療費用，超過全民健康保險部分給付(2)保險公司基於審核保險金需要， 得對被保險人身體予以檢驗，另得徵詢其他醫師專業意見，所生費用由保 險公司負擔(3)日額型每次傷害給付日數不得超過180 日(4 對金融消費者之責任，不可預 先約定限制或免除(4)契約條款若有疑義時以有利金融消費者做解釋。", "answer": "2", "explanation": "保險契約撤銷、無效、解除時,應按與業務人員簽 訂之合約或其所適用之辦法規定追回已發放之酬金 金融服務業與金融消費者訂立之契約條款顯失公平 者，該部分條款無效，契約條款如有疑義時，應為 有利於金融消費者之解釋。金消法亦明定金融服務 業對金融消費者之責任，不得預先約定限制或免 除，如有違反者，該限制或免責之約定無效。金融 服務業亦不得藉金融教育宣導的方式，引薦個別金 融商品或服務，使消費者產生誤解。"}, {"num": 267, "chapter": "第四章", "question": "「保險業防制洗錢及打擊資恐最佳實務指引」第四點列舉保險業常見之低 風險交易情境，有哪些？A 投保微型保險；B 團體醫療保險；C 年金；D 客戶未有高洗錢集資恐風險之表徵，年繳費保費未逾一定金額三萬元 (1)ABCD(2)ABD(3)ABC(4)BCD", "answer": "2", "explanation": "列舉保險業常見之低風險交易清境，如：客戶投保 不具有保單價值準備金之保險商品者（短年期人壽 壽險、傷害保險、健康保險）；投保小額終老保 險、微型保險；投保團體年金保險、團體定期壽 險、團體傷害保險、團體健康保險、團體醫療保 險；客戶未有高洗錢及資恐風險之表徵，年繳保費 未逾一定金額（三萬元）或躉繳保費末逾一定金額 （七萬五千元）；投保強制汽車責任保險、農業保 險、小額財產保險（保險金額五萬元以下）及其他 經保險公司依風險基礎方法認定為低風險交易之情 形等，保險公司得進行簡化審査及持續監控措施。 【說明】低洗錢風險的特性：沒保單價值、團體 險、沒表徵且保費低（年繳3 萬以下、躉繳7 萬5 以下）。 C 應改成「團體年金」"}, {"num": 268, "chapter": "第四章", "question": "", "answer": "2", "explanation": ""}, {"num": 269, "chapter": "第四章", "question": "金融消費評議成立後且評議書經法院核可者，何者錯誤？A 當事人就該 事件得再行起 訴：B 當事人就該事件得再申請評議：C 評議書經法院核 可後有依法無效之原因，當事人不得提起宣告評議無效或撤銷評議之訴： D 評議書內容如有牴觸法令而未予核可者，法院應通知爭議處理機構及 當事人 (1)ABC (2)AB (3)ABCD (4)BC", "answer": "1", "explanation": "A、B 不可就該事件再行起訴或評議 C 評議書經法院核可後有依法無效之原因，當事 人得提起宣告評議無效或撤銷評議之訴"}, {"num": 270, "chapter": "第四章", "question": "有關定型化契約敘述，何者有誤？(1)消保法對其權利義務的履行訂有相 當完整的規範(2)是由企業經營者與消費者雙方面所共同議定(3)條款如有 疑義時，應為有利於消費者之解釋(4)消費者只有簽訂與否的權利。", "answer": "2", "explanation": "(2)是由企業經營者單方面所預先擬具。"}, {"num": 271, "chapter": "第四章", "question": "金管會列舉保險業常見之低風險交易情境，如：投保A 微型保險；B 具有 保單價值準備金之保險商品；C 團體年金保險；D 客戶無高洗錢及資恐風 險之表徵，年繳保費未逾三萬元(1)ABC(2)AC(3)ABCD(4)ACD，保險公司 得進行簡化審查及持續監控措施。", "answer": "4", "explanation": "(2)是由企業經營者單方面所預先擬具。 金管會列舉保險業常見之低風險交易情境，如：客 戶投保不具有保單價值準備金之保險商品、微型保 險、小額終老保險、團體年金/定期/傷害/健康/醫 療保險、客戶無高洗錢及資恐風險之表徵，年繳保 費未逾三萬元/躉繳未逾七萬五千元，強制汽車責 任險、農業保險、小額財產保險，保險公司得進行 簡化審查及持續監控措施。"}, {"num": 272, "chapter": "第四章", "question": "有關金融服務業公平待客原則，何者正確？(1)公司對商品銷售獎勵核 給，在酬金與業績衡平原則下應注意僅以業績目標達成做為計算基礎(2) 公司應於業務員一賣出商品就發給高額酬金以符合酬金與業績衡平原則 (3)公司應該將該原則納入教育訓練課程每年至少2 小時，業務員未完成 該訓練應辦理撤銷登錄(4)該原則共9 大指標，並增訂第10 項董事會重視 情況。", "answ   tabs.appendChild(allTab);
  
  chapters.forEach(ch => {
    const count = ALL_QUESTIONS.filter(q => q.chapter === ch).length;
    const opt = document.createElement('option');
    opt.value = ch; opt.textContent = `${ch} (${count}題)`;
    select.appendChild(opt);
    
    const tab = document.createElement('button');
    tab.className = 'tab';
    tab.textContent = `${ch} (${count})`;
    tab.dataset.chapter = ch;
    tab.onclick = () => setChapter(ch, tab);
    tabs.appendChild(tab);
  });
  
  document.getElementById('total-count').textContent = ALL_QUESTIONS.length;
  renderQuestions(ALL_QUESTIONS);
}

function setChapter(ch, el) {
  state.currentFilter = ch;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('chapter-filter').value = ch;
  filterQuestions();
}

function getFilteredQuestions() {
  let qs = ALL_QUESTIONS;
  if (state.currentFilter !== 'all') {
    qs = qs.filter(q => q.chapter === state.currentFilter);
  }
  const search = state.searchText.toLowerCase();
  if (search) {
    qs = qs.filter(q => q.question.toLowerCase().includes(search) || 
                        q.explanation.toLowerCase().includes(search));
  }
  return qs;
}

function filterQuestions() {
  state.currentFilter = document.getElementById('chapter-filter').value;
  state.searchText = document.getElementById('search-box').value;
  const tab = document.querySelector(`.tab[data-chapter="${state.currentFilter}"]`) || 
               document.querySelector('.tab');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tab) tab.classList.add('active');
  renderQuestions(getFilteredQuestions());
}

function randomMode() {
  const qs = getFilteredQuestions();
  const shuffled = [...qs].sort(() => Math.random() - 0.5);
  renderQuestions(shuffled);
}

function renderQuestions(qs) {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  
  if (qs.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>找不到符合條件的題目</p></div>';
    updateStats();
    return;
  }
  
  qs.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card visible';
    card.id = `q-${q.num}`;
    if (state.answered[q.num]) card.classList.add('answered');
    
    // Parse options from question text
    const stem = q.question;
    const optionMatch = stem.match(/[\(（]([1-4])[\)）]/g);
    const hasOptions = optionMatch && optionMatch.length >= 2;
    
    let optionsHtml = '';
    if (hasOptions) {
      const parts = stem.split(/(?=[\(（][1-4][\)）])/);
      const qStem = parts[0].replace(/[\(（][1-4][\)）]/g, '').trim();
      const opts = parts.slice(1);
      
      if (opts.length >= 2) {
        optionsHtml = '<div class="options">';
        opts.forEach(opt => {
          const numM = opt.match(/^[\(（]([1-4])[\)）](.*)/s);
          if (numM) {
            const num = numM[1];
            const txt = numM[2].trim();
            const isSelected = state.selected[q.num] === num;
            const isAnswered = state.answered[q.num];
            let cls = 'option';
            if (isAnswered) {
              if (num === q.answer) cls += ' correct';
              else if (isSelected && num !== q.answer) cls += ' wrong';
            } else if (isSelected) cls += ' selected';
            
            optionsHtml += `<div class="${cls}" onclick="selectOption(${q.num}, '${num}', this)">({${num}}) ${txt}</div>`;
          }
        });
        optionsHtml += '</div>';
      }
    }
    
    const answered = state.answered[q.num];
    const answerHtml = `
      <div class="answer-block${answered ? ' show' : ''}" id="ans-${q.num}">
        <div class="answer-label">✅ 正確答案：(${q.answer || '?'})</div>
        <div class="explanation">${q.explanation || '（無詳解）'}</div>
      </div>`;
    
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.num}</div>
        <div class="q-chapter">${q.chapter}</div>
        <div class="q-status" id="status-${q.num}">${answered ? '✅' : ''}</div>
      </div>
      <div class="q-text">${q.question || '（題目文字解析有誤，請參考原始 PDF）'}</div>
      ${optionsHtml}
      <button class="reveal-btn" onclick="toggleAnswer(${q.num})" id="btn-${q.num}">
        ${answered ? '🔽 隱藏答案' : '💡 顯示答案'}
      </button>
      ${answerHtml}
    `;
    
    container.appendChild(card);
  });
  
  updateStats();
}

function selectOption(qNum, optNum, el) {
  if (state.answered[qNum]) return;
  
  // Clear previous selection
  document.querySelectorAll(`#q-${qNum} .option`).forEach(o => {
    o.classList.remove('selected', 'correct', 'wrong');
  });
  
  const q = ALL_QUESTIONS.find(q => q.num === qNum);
  state.selected[qNum] = optNum;
  
  // Mark all options
  document.querySelectorAll(`#q-${qNum} .option`).forEach(o => {
    const oNum = o.textContent.match(/^\(([1-4])\)/)?.[1];
    if (oNum === q.answer) o.classList.add('correct');
    else if (oNum === optNum) o.classList.add('wrong');
  });
  
  state.answered[qNum] = optNum === q.answer ? 'correct' : 'wrong';
  document.getElementById(`status-${qNum}`).textContent = 
    optNum === q.answer ? '✅' : '❌';
  
  // Show answer
  document.getElementById(`ans-${qNum}`).classList.add('show');
  document.getElementById(`btn-${qNum}`).textContent = '🔽 隱藏答案';
  document.getElementById(`q-${qNum}`).classList.add('answered');
  
  updateStats();
}

function toggleAnswer(qNum) {
  const block = document.getElementById(`ans-${qNum}`);
  const btn = document.getElementById(`btn-${qNum}`);
  const isShown = block.classList.contains('show');
  
  if (isShown) {
    block.classList.remove('show');
    btn.textContent = '💡 顯示答案';
  } else {
    block.classList.add('show');
    btn.textContent = '🔽 隱藏答案';
    if (!state.answered[qNum]) {
      state.answered[qNum] = 'revealed';
      document.getElementById(`status-${qNum}`).textContent = '👁️';
      updateStats();
    }
  }
}

function showAll() {
  document.querySelectorAll('.answer-block').forEach(b => b.classList.add('show'));
  document.querySelectorAll('.reveal-btn').forEach(b => b.textContent = '🔽 隱藏答案');
}

function resetAll() {
  state.answered = {};
  state.selected = {};
  filterQuestions();
}

function updateStats() {
  const total = ALL_QUESTIONS.length;
  const answeredNums = Object.keys(state.answered).map(Number);
  const answeredCount = answeredNums.length;
  const correctCount = answeredNums.filter(n => state.answered[n] === 'correct').length;
  
  document.getElementById('answered-count').textContent = answeredCount;
  document.getElementById('correct-count').textContent = correctCount;
  
  const filtered = getFilteredQuestions();
  const filteredAnswered = filtered.filter(q => state.answered[q.num]).length;
  const pct = filtered.length > 0 ? Math.round(filteredAnswered / filtered.length * 100) : 0;
  
  document.getElementById('progress-text').textContent = `進度 ${filteredAnswered} / ${filtered.length}`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('bar-fill').style.width = pct + '%';
  
  if (answeredCount > 0) {
    const acc = Math.round(correctCount / answeredCount * 100);
    document.getElementById('accuracy-pct').textContent = acc + '%';
  }
  
  // Check if all done
  if (filtered.length > 0 && filteredAnswered === filtered.length) {
    const correctInFilter = filtered.filter(q => state.answered[q.num] === 'correct').length;
    const banner = document.getElementById('score-banner');
    banner.classList.add('show');
    document.getElementById('final-score').textContent = 
      `${correctInFilter} / ${filtered.length}`;
    const acc = Math.round(correctInFilter / filtered.length * 100);
    document.getElementById('final-msg').textContent = 
      acc >= 80 ? '🎊 太強了！準備上場！' : acc >= 60 ? '💪 再練幾遍，穩過！' : '📖 需要再複習一下';
  }
}

init();
</script>
</body>
</html>
