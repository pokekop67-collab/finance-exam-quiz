 "ABC。 金融服務業包括：銀行業、證券業、期貨業、保險業、電子支付業及其他經主 管機關公告之金融服務業；但不包括證交所、櫃買中心、集保事業、期交所及 其他經主管機關公告之事業等。"], "explanation": ""}, {"num": "343", "chapter": "第五章", "answer": 1, "question": "業務員因離職、轉任而異動時，所屬公司應向壽險公會申報", "options": ["註銷登錄", "停止招攬登錄", "變 更登錄", "撤銷登錄。 業務員因離職、轉任而異動時，所屬公司應向壽險公會申報註銷登錄。"], "explanation": ""}, {"num": "346", "chapter": "第五章", "answer": 1, "question": "申請登錄之業務員若曾受偽造文書、侵占、詐欺、背信等徒刑處分執行完畢或經赦免未滿", "options": ["三 年", "二年", "五年", "一年   者，不得申請登錄為業務員。 徒刑處分完畢、緩刑期滿或經赦免後未滿三年；組織犯罪五年。 371 附錄 3 保險業務員管理規則係由主管機關依保險法第177條訂定，並於民國"], "explanation": "(1)81年10月15日(2)80年 4月15日(3)82年4月15日(4)83年10月15日 起實施，自此保險業務員邁入一個新的里程碑。 保險業務員管理規則係由主管機關依保險法第177條訂定，民國81年10月15日 發布「保險業務員管理規則」，並於民國82年4月15日起實施。 385 附錄 1 下列何者不是團體保險條款規定被保險人請領失能保險金應檢具之文件(1)被保險人印鑑證明書 (2)保險金申請書(3)受益人身分證明(4)失能診斷書。 受益人申領失能保險金，應檢具下列文件：保險金申請書、受益人之身分證 件、失能診斷書，但必要時本公司得要求提供意外傷害事故證明文件。 389 附錄 4 我國保險法規定，保險業於完納一切稅捐後，分派盈餘時，應先提存多少為法定盈餘公積？ (1)5%(2)10%(3)15%(4)20% ，但法定盈餘公積已達其資本總額或基金總額時，不在此限。 保險業於完納一切稅捐後，分派盈餘時，應先提百分之二十為法定盈餘公積。"}];

let mode = 'quiz';
let cur = 0;
let answered = 0, correctCnt = 0;
let wrongIdxList = [];
let reviewQueue = [];
let reviewAnswered = 0, reviewCorrect = 0;

function setMode(m) {
  mode = m;
  document.getElementById('modeBadge').textContent = m === 'quiz' ? '📝 測驗模式' : '🔁 錯題練習';
}

function resetStats(total) {
  answered = 0; correctCnt = 0;
  document.getElementById('totalQ').textContent = total;
  document.getElementById('doneQ').textContent = 0;
  document.getElementById('correctQ').textContent = 0;
  document.getElementById('wrongQ').textContent = 0;
}

function updateProg(idx, total, done) {
  const pct = Math.round(done / total * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progText').textContent = `第 ${idx+1} / ${total} 題　完成 ${pct}%`;
}

// ── 取得當前 question ──
function getQ() {
  return mode === 'quiz' ? ALL_Q[cur] : ALL_Q[reviewQueue[cur]];
}

// ── 渲染題目（絕不放詳解到 DOM）──
function renderQ() {
  const q = getQ();
  const total = mode === 'quiz' ? ALL_Q.length : reviewQueue.length;
  const labels = ['(1)','(2)','(3)','(4)'];
  const reviewBadge = mode === 'review' ? '<span class="q-badge qb-review">🔁 錯題練習</span>' : '';

  const optsHtml = q.options.map((o, i) =>
    `<div class="opt" id="opt${i}" onclick="choose(${i+1})">
       <span class="opt-label">${labels[i]}</span><span>${o||'（選項）'}</span>
     </div>`
  ).join('');

  document.getElementById('mainWrap').innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-badge qb-num">題 ${q.num}</span>
        <span class="q-badge qb-ch">${q.chapter}</span>
        ${reviewBadge}
      </div>
      <div class="q-text">${q.question}</div>
      <div class="opts" id="opts">${optsHtml}</div>
      <div id="afterZone"></div>
    </div>`;

  updateProg(cur, total, mode === 'quiz' ? answered : reviewAnswered);
}

// ── 選答案 ──
function choose(sel) {
  const q = getQ();
  const corr = q.answer;
  document.querySelectorAll('.opt').forEach(o => o.classList.add('disabled'));
  document.getElementById('opt'+(sel-1)).classList.add(sel===corr ? 'correct' : 'wrong');
  if (sel !== corr) document.getElementById('opt'+(corr-1)).classList.add('show-correct');

  const zone = document.getElementById('afterZone');
  const total = mode === 'quiz' ? ALL_Q.length : reviewQueue.length;

  // 錯題練習才插詳解
  if (mode === 'review' && q.explanation) {
    const box = document.createElement('div');
    box.className = 'explain-box';
    box.textContent = q.explanation;
    zone.appendChild(box);
  }

  const row = document.createElement('div');
  row.className = 'btn-row';
  const isLast = cur >= total - 1;

  if (mode === 'quiz') {
    answered++; if (sel===corr) correctCnt++; else wrongIdxList.push(cur);
    document.getElementById('doneQ').textContent = answered;
    document.getElementById('correctQ').textContent = correctCnt;
    document.getElementById('wrongQ').textContent = wrongIdxList.length;
    updateProg(cur, total, answered);
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = isLast ? '查看成績 🏆' : '下一題 →';
    btn.onclick = () => { isLast ? showResult() : (cur++, renderQ()); };
    row.appendChild(btn);
  } else {
    reviewAnswered++; if (sel===corr) reviewCorrect++;
    document.getElementById('doneQ').textContent = reviewAnswered;
    document.getElementById('correctQ').textContent = reviewCorrect;
    document.getElementById('wrongQ').textContent = reviewAnswered - reviewCorrect;
    updateProg(cur, total, reviewAnswered);
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = isLast ? '查看成績 🏆' : '下一題 →';
    btn.onclick = () => { isLast ? showReviewResult() : (cur++, renderQ()); };
    row.appendChild(btn);
  }
  zone.appendChild(row);
}

// ── 成績頁 ──
function showResult() {
  const pct = Math.round(correctCnt / ALL_Q.length * 100);
  const [em, lbl] = pct>=90?['🏆','優秀！']:pct>=70?['👍','良好']:pct>=50?['📚','需加強']:['💪','繼續努力'];
  let wrongHtml = '';
  if (wrongIdxList.length) {
    wrongHtml = `<div class="wrong-section"><div class="wrong-title">❌ 答錯 ${wrongIdxList.length} 題</div>` +
      wrongIdxList.map(i => {
        const q = ALL_Q[i];
        return `<div class="wrong-item">
          <div class="wi-num">題 ${q.num} · ${q.chapter}</div>
          <div class="wi-q">${q.question.substring(0,80)}${q.question.length>80?'…':''}</div>
          <div class="wi-ans">✅ 正確：(${q.answer}) ${(q.options[q.answer-1]||'').substring(0,40)}</div>
        </div>`;
      }).join('') + '</div>';
  }
  document.getElementById('mainWrap').innerHTML = `
    <div class="result-card">
      <div class="result-score">${pct}%</div>
      <div class="result-label">${em} ${lbl}</div>
      <div class="result-sub">答對 ${correctCnt} / ${ALL_Q.length} 題</div>
      <div class="result-btns">
        <button class="btn btn-secondary" onclick="startQuiz()">🔄 重新測驗</button>
        ${wrongIdxList.length ? `<button class="btn btn-primary" onclick="startReview()">🔁 練習錯題（${wrongIdxList.length}題）</button>` : ''}
      </div>
      ${wrongHtml}
    </div>`;
}

function showReviewResult() {
  const pct = Math.round(reviewCorrect / reviewQueue.length * 100);
  const [em, lbl] = pct>=90?['🏆','全掌握了！']:pct>=70?['👍','大部分搞懂']:['📚','再練一次'];
  document.getElementById('mainWrap').innerHTML = `
    <div class="result-card">
      <div class="result-score">${pct}%</div>
      <div class="result-label">${em} ${lbl}</div>
      <div class="result-sub">錯題練習：答對 ${reviewCorrect} / ${reviewQueue.length} 題</div>
      <div class="result-btns">
        <button class="btn btn-secondary" onclick="startQuiz()">🔄 重頭測驗</button>
        <button class="btn btn-primary" onclick="startReview()">🔁 再練一次錯題</button>
      </div>
    </div>`;
}

// ── 入口 ──
function startQuiz() {
  setMode('quiz'); cur=0; wrongIdxList=[];
  resetStats(ALL_Q.length);
  renderQ();
}

function startReview() {
  reviewQueue = wrongIdxList.slice();
  setMode('review'); cur=0; reviewAnswered=0; reviewCorrect=0;
  resetStats(reviewQueue.length);
  renderQ();
}

startQuiz();
</script>
</body>
</html>
